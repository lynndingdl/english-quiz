<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词复习 - 第12轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        .progress { background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 24px; }
        .progress-bar { background: #4CAF50; height: 100%; border-radius: 8px; transition: width 0.3s; }
        .question { margin-bottom: 24px; padding: 16px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #2196F3; }
        .question-num { font-weight: bold; color: #2196F3; margin-bottom: 8px; }
        .sentence { font-size: 16px; line-height: 1.6; margin-bottom: 16px; }
        .blank { display: inline-block; min-width: 120px; border-bottom: 2px solid #333; text-align: center; color: #2196F3; font-weight: bold; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; }
        .option:hover { border-color: #2196F3; background: #e3f2fd; }
        .option.selected { border-color: #4CAF50; background: #e8f5e9; }
        .option.correct { border-color: #4CAF50; background: #c8e6c9; }
        .option.wrong { border-color: #f44336; background: #ffcdd2; }
        .submit-btn { display: block; width: 100%; padding: 16px; background: #4CAF50; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 24px; }
        .submit-btn:hover { background: #45a049; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        .result { display: none; text-align: center; padding: 24px; background: #f5f5f5; border-radius: 8px; margin-top: 24px; }
        .result.show { display: block; }
        .result h2 { margin-bottom: 16px; }
        .result-code { background: #333; color: #4CAF50; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 16px 0; }
        .copy-btn { padding: 12px 24px; background: #2196F3; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 英语单词复习 - 第12轮</h1>
        <p class="subtitle">共20题 | 选择题</p>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width: 0%"></div></div>
        
        <div id="questions"></div>
        
        <button class="submit-btn" id="submitBtn" onclick="submitQuiz()">提交答案</button>
        
        <div class="result" id="result">
            <h2>🎉 复习完成！</h2>
            <p>正确: <span id="correctCount">0</span> / 20</p>
            <p style="margin: 16px 0;">请复制以下结果码发回飞书：</p>
            <div class="result-code" id="resultCode"></div>
            <button class="copy-btn" onclick="copyResult()">📋 复制结果码</button>
        </div>
    </div>

    <script>
        const questions = [
            { id: 1, word: "likened", meaning: "比作，比拟", sentence: "Ryan Terao, PsyD, an esports and licensed clinical psychologist, ______ the power of esports and gaming to fire.", answer: "likened", options: ["likened", "prioritized", "mitigated", "merged"] },
            { id: 2, word: "literacy", meaning: "读写能力，素养", sentence: "Professionals within esports psychology perform roles that combine high-performance coaching, clinical or counseling skills, and deep game ______.", answer: "literacy", options: ["literacy", "norms", "pipeline", "pillars"] },
            { id: 3, word: "marginalized", meaning: "边缘化的", sentence: "Strobel views esports as widening accessibility for students who may be ______ in traditional sports, including neurodivergent youth.", answer: "marginalized", options: ["marginalized", "prioritized", "normalized", "navigated"] },
            { id: 4, word: "merge", meaning: "合并，融合", sentence: "I've been spending outside the game to learn all these skills and ______ them with my passion for the game.", answer: "merge", options: ["merge", "mitigate", "navigate", "prioritize"] },
            { id: 5, word: "mitigate", meaning: "减轻，缓解", sentence: "What we really need to do is track young people over their development to understand when gaming is good and when it is bad, and then how to ______ the bad and maximize the good.", answer: "mitigate", options: ["mitigate", "merge", "navigate", "prioritize"] },
            { id: 6, word: "mound", meaning: "投手丘（棒球）", sentence: "This would be akin to a player committing a flagrant foul in basketball or rushing the ______ in baseball.", answer: "mound", options: ["mound", "pillar", "pipeline", "off-ramp"] },
            { id: 7, word: "movember", meaning: "Movember（男性健康慈善机构）", sentence: "In 2024, the global men's health charity ______ recruited esports psychology researcher Dylan Poulus, PhD.", answer: "Movember", options: ["Movember", "multibillion-dollar", "nuanced", "normalizing"] },
            { id: 8, word: "multibillion-dollar", meaning: "数十亿美元的", sentence: "Esports are a fast-evolving ______ industry that draws hundreds of millions of competitive video game players worldwide.", answer: "multibillion-dollar", options: ["multibillion-dollar", "nuanced", "marginalized", "neurodivergent"] },
            { id: 9, word: "navigate", meaning: "导航，应对", sentence: "While elite players within formal organizational structures often have access to professional psychological services, non-elite players must rely on inconsistent online resources or ______ support systems on their own.", answer: "navigate", options: ["navigate", "mitigate", "merge", "prioritize"] },
            { id: 10, word: "neurodivergent", meaning: "神经多样性者", sentence: "Strobel views esports as widening accessibility for students who may be marginalized in traditional sports, including ______ youth.", answer: "neurodivergent", options: ["neurodivergent", "nuanced", "normalizing", "multibillion-dollar"] },
            { id: 11, word: "normalizing", meaning: "正常化", sentence: "Students gained access to an athletics-based sport psychologist, nutrition programming, and twice-weekly morning workouts aimed at ______ physical conditioning.", answer: "normalizing", options: ["normalizing", "neurodivergent", "nuanced", "marginalized"] },
            { id: 12, word: "norms", meaning: "规范，准则", sentence: "Teams were also encouraged to develop their own ______ around culture, accountability, and conflict management.", answer: "norms", options: ["norms", "literacy", "pillars", "pipeline"] },
            { id: 13, word: "nuanced", meaning: "细致入微的，微妙的", sentence: "However, a more ______ approach is necessary when esports competitors often require those hours to train and remain competitive.", answer: "nuanced", options: ["nuanced", "neurodivergent", "normalizing", "multibillion-dollar"] },
            { id: 14, word: "off-ramp", meaning: "退出通道，出路", sentence: "Many pros go straight from an anonymous position on a ladder to a contract, with no Little League, no college team, and no ______ when it ends.", answer: "off-ramp", options: ["off-ramp", "mound", "pipeline", "pillar"] },
            { id: 15, word: "pillars", meaning: "支柱，核心原则", sentence: "Poulus and colleagues convened game publishers, tournament organizers, International Olympic Committee representatives, and mental health experts to finalize nine ______ of mental health support.", answer: "pillars", options: ["pillars", "norms", "literacy", "pipeline"] },
            { id: 16, word: "pipeline", meaning: "管道，人才输送渠道", sentence: "Esports is a sport without a childhood ______.", answer: "pipeline", options: ["pipeline", "pillars", "literacy", "norms"] },
            { id: 17, word: "postgame", meaning: "赛后的", sentence: "He often prepares clients to expect a temporary dip in performance as they reconstruct habits around sleep, practice structure, and ______ review.", answer: "postgame", options: ["postgame", "pillars", "pipeline", "off-ramp"] },
            { id: 18, word: "prioritized", meaning: "优先考虑的", sentence: "Gardner and his team ______ exercise, sleep routines, and intrinsic motivation, helping the Immortals players build healthier daily structures.", answer: "prioritized", options: ["prioritized", "marginalized", "normalized", "navigated"] },
            { id: 19, word: "mindset-reappraisal", meaning: "心态重新评估", sentence: "A ______ intervention that encouraged players to view stress as beneficial lowered players' anxiety.", answer: "mindset-reappraisal", options: ["mindset-reappraisal", "multibillion-dollar", "postgame", "off-ramp"] },
            { id: 20, word: "navigating", meaning: "应对，穿越", sentence: "EPPIC addresses communication, teamwork, leadership, health and wellness, and ______ online toxicity and hate speech.", answer: "navigating", options: ["navigating", "normalizing", "neurodivergent", "nuanced"] }
        ];

        const answers = {};
        
        function renderQuestions() {
            const container = document.getElementById('questions');
            container.innerHTML = questions.map((q, idx) => `
                <div class="question" id="q${q.id}">
                    <div class="question-num">第 ${q.id} 题 (${idx + 1}/20)</div>
                    <div class="sentence">${q.sentence.replace('______', `<span class="blank">?</span>`)}</div>
                    <div class="options" data-qid="${q.id}">
                        ${q.options.map((opt, i) => `<div class="option" onclick="selectOption(${q.id}, '${opt}')">${String.fromCharCode(65 + i)}. ${opt}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        function selectOption(qid, option) {
            answers[qid] = option;
            const options = document.querySelectorAll(`#q${qid} .option`);
            options.forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
            updateProgress();
        }
        
        function updateProgress() {
            const answered = Object.keys(answers).length;
            document.getElementById('progressBar').style.width = `${answered / 20 * 100}%`;
        }
        
        function submitQuiz() {
            if (Object.keys(answers).length < 20) {
                alert('请完成所有题目后再提交！');
                return;
            }
            
            let correct = 0;
            const results = [];
            
            questions.forEach(q => {
                const isCorrect = answers[q.id] === q.answer;
                if (isCorrect) correct++;
                results.push({ word: q.word, correct: isCorrect });
                
                const options = document.querySelectorAll(`#q${qid} .option`);
                options.forEach(opt => {
                    if (opt.textContent.includes(q.answer)) {
                        opt.classList.add('correct');
                    } else if (opt.classList.contains('selected')) {
                        opt.classList.add('wrong');
                    }
                });
            });
            
            document.getElementById('correctCount').textContent = correct;
            
            const resultData = { round: 12, total: 20, correct, results };
            const resultCode = 'ENGRESULT:' + btoa(JSON.stringify(resultData));
            document.getElementById('resultCode').textContent = resultCode;
            
            document.getElementById('result').classList.add('show');
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = '已完成';
        }
        
        function copyResult() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('已复制！请粘贴到飞书发给我。');
            });
        }
        
        renderQuestions();
    </script>
</body>
</html>
