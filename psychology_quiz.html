<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学复习 - 挖空测验</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        
        .progress-bar { background: #e0e0e0; border-radius: 10px; height: 8px; margin-bottom: 20px; }
        .progress-fill { background: #4CAF50; height: 100%; border-radius: 10px; transition: width 0.3s; }
        
        .progress-text { text-align: center; color: #666; margin-bottom: 15px; font-size: 14px; }
        
        .question-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .question-type { display: inline-block; background: #e3f2fd; color: #1976D2; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 12px; }
        .question-title { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 20px; line-height: 1.5; }
        
        .sentence-box { background: #fafafa; border: 2px solid #e0e0e0; border-radius: 12px; padding: 20px; font-size: 18px; line-height: 2; text-align: center; }
        .blank { display: inline-block; background: #4CAF50; color: white; padding: 2px 16px; border-radius: 4px; min-width: 80px; margin: 0 4px; font-weight: 500; }
        
        .answer-section { margin-top: 20px; }
        .answer-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; resize: vertical; min-height: 100px; }
        .answer-input:focus { outline: none; border-color: #4CAF50; }
        
        .submit-btn { width: 100%; padding: 14px; background: #4CAF50; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .submit-btn:hover { background: #43a047; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        /* Result Page */
        .result-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .result-header { text-align: center; margin-bottom: 20px; }
        .result-icon { font-size: 48px; margin-bottom: 10px; }
        .result-title { font-size: 24px; font-weight: 600; color: #333; }
        
        .result-detail { background: #fafafa; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .result-question { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 10px; }
        .result-blank-answer { font-size: 16px; line-height: 1.8; }
        .result-correct { color: #4CAF50; font-weight: 600; }
        .result-wrong { color: #f44336; font-weight: 600; }
        
        .status-selector { display: flex; gap: 10px; margin-top: 15px; }
        .status-btn { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 14px; cursor: pointer; background: white; transition: all 0.2s; }
        .status-btn:hover { border-color: #4CAF50; }
        .status-btn.correct { border-color: #4CAF50; background: #e8f5e9; color: #4CAF50; }
        .status-btn.partial { border-color: #FF9800; background: #fff3e0; color: #FF9800; }
        .status-btn.wrong { border-color: #f44336; background: #ffebee; color: #f44336; }
        .status-btn.selected { transform: scale(1.02); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        
        .next-btn { width: 100%; padding: 14px; background: #2196F3; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .next-btn:hover { background: #1976D2; }
        
        /* Final Result */
        .final-result { text-align: center; }
        .final-stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 32px; font-weight: 700; }
        .stat-label { font-size: 14px; color: #666; }
        .correct-stat .stat-num { color: #4CAF50; }
        .partial-stat .stat-num { color: #FF9800; }
        .wrong-stat .stat-num { color: #f44336; }
        
        .result-code { background: #f5f5f5; padding: 15px 20px; border-radius: 8px; font-family: monospace; font-size: 14px; word-break: break-all; margin: 15px 0; text-align: left; }
        .copy-btn { background: #666; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .copy-btn:hover { background: #444; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Progress -->
        <div class="progress-text">第 <span id="currentNum">1</span> / <span id="totalNum">20</span> 题</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 5%"></div></div>
        
        <!-- Question Page -->
        <div id="questionPage" class="question-card">
            <span class="question-type" id="questionType">名词解释</span>
            <div class="question-title" id="questionTitle">内容效度</div>
            <div class="sentence-box" id="sentenceBox"></div>
            <div class="answer-section">
                <textarea class="answer-input" id="answerInput" placeholder="请在此输入你的答案..."></textarea>
                <button class="submit-btn" id="submitBtn" onclick="showResult()">提交答案</button>
            </div>
        </div>
        
        <!-- Result Page -->
        <div id="resultPage" class="result-card hidden">
            <div class="result-header">
                <div class="result-icon" id="resultIcon">✅</div>
                <div class="result-title" id="resultTitle">正确!</div>
            </div>
            <div class="result-detail">
                <div class="result-question" id="resultQuestion"></div>
                <div class="result-blank-answer" id="resultAnswer"></div>
            </div>
            <div id="userAnswerSection" class="result-detail hidden">
                <div style="font-size: 14px; color: #666; margin-bottom: 8px;">你的答案：</div>
                <div id="userAnswerText" style="font-size: 15px; line-height: 1.6;"></div>
            </div>
            <div style="font-size: 14px; color: #666; margin-bottom: 8px; margin-top: 15px;">请选择本題狀態：</div>
            <div class="status-selector">
                <button class="status-btn correct" onclick="selectStatus('correct', this)">✅ 正确</button>
                <button class="status-btn partial" onclick="selectStatus('partial', this)">⚠️ 部分正确</button>
                <button class="status-btn wrong" onclick="selectStatus('wrong', this)">❌ 错误</button>
            </div>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一题</button>
        </div>
        
        <!-- Final Result Page -->
        <div id="finalPage" class="result-card hidden">
            <div class="final-result">
                <div class="result-icon">🎉</div>
                <div class="result-title">测验完成！</div>
                <div class="final-stats">
                    <div class="stat-item correct-stat">
                        <div class="stat-num" id="correctCount">0</div>
                        <div class="stat-label">正确</div>
                    </div>
                    <div class="stat-item partial-stat">
                        <div class="stat-num" id="partialCount">0</div>
                        <div class="stat-label">部分正确</div>
                    </div>
                    <div class="stat-item wrong-stat">
                        <div class="stat-num" id="wrongCount">0</div>
                        <div class="stat-label">错误</div>
                    </div>
                </div>
                <div style="font-size: 14px; color: #666; margin-bottom: 10px;">结果码（复制发送给助手）：</div>
                <div class="result-code" id="resultCode"></div>
                <button class="copy-btn" onclick="copyCode()">复制结果码</button>
            </div>
        </div>
    </div>

        let currentIndex = 0;
        let results = [];
        let currentStatus = null;
        let startTime = new Date();

        // 创建挖空
        function createBlanks(text, numBlanks) {
            // 提取关键术语
            const keyTerms = [];
            
            // 按中英文标点和分号、逗号分割
            const parts = text.split(/(?<=[，。；；、：:；;,])(?=[^，，])/);
            
            // 过滤出适合挖空的短语（长度>=2且不包含空）
            for (let p of parts) {
                p = p.trim();
                if (p.length >= 2 && !keyTerms.includes(p)) {
                    keyTerms.push(p);
                }
            }
            
            // 如果分割出来的关键术语不够，随机从长句子里提取
            if (keyTerms.length < numBlanks) {
                const longMatches = text.match(/[^，。；；、：:；;,]{4,10}/g) || [];
                for (let m of longMatches) {
                    if (!keyTerms.includes(m) && keyTerms.length < numBlanks * 2) {
                        keyTerms.push(m);
                    }
                }
            }
            
            // 随机选择numBlanks个作为答案
            const shuffled = keyTerms.sort(() => Math.random() - 0.5);
            const blanks = shuffled.slice(0, Math.min(numBlanks, shuffled.length));
            
            // 创建挖空句子
            let sentence = text;
            const blankMap = {};
            blanks.forEach((b, i) => {
                const placeholder = `__BLANK${i}__`;
                blankMap[placeholder] = b;
                sentence = sentence.replace(b, placeholder);
            });
            
            // 替换占位符为HTML
            sentence = sentence.replace(/__BLANK(\d)__/g, '<span class="blank">_______</span>');
            
            return { sentence, blanks, blankMap };
        }

        function loadQuestion() {
            const item = quizData[currentIndex];
            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('progressFill').style.width = ((currentIndex + 1) / quizData.length * 100) + '%';
            document.getElementById('questionType').textContent = item.type;
            document.getElementById('questionTitle').textContent = item.title;
            
            // 根据答案长度决定挖空数量
            let numBlanks = 2;
            if (item.answer.length > 100) numBlanks = 3;
            if (item.answer.length > 200) numBlanks = 4;
            
            const { sentence } = createBlanks(item.answer, numBlanks);
            document.getElementById('sentenceBox').innerHTML = sentence;
            document.getElementById('answerInput').value = '';
            
            // Reset status
            currentStatus = null;
            document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('selected'));
            
            // Show question page
            document.getElementById('questionPage').classList.remove('hidden');
            document.getElementById('resultPage').classList.add('hidden');
            document.getElementById('finalPage').classList.add('hidden');
        }

        function showResult() {
            const userAnswer = document.getElementById('answerInput').value.trim();
            const item = quizData[currentIndex];
            
            // Store result with pending status
            results.push({
                id: item.id,
                title: item.title,
                answer: item.answer,
                userAnswer: userAnswer
            });
            
            // Show result page
            document.getElementById('questionPage').classList.add('hidden');
            document.getElementById('resultPage').classList.remove('hidden');
            document.getElementById('userAnswerSection').classList.remove('hidden');
            document.getElementById('userAnswerText').textContent = userAnswer || '(未填写)';
            
            // Show answer comparison with blanks highlighted
            const { sentence: answerSentence, blanks } = createBlanks(item.answer, blanks ? blanks.length : 2);
            const answerHtml = blanks.map((b, i) => `<span class="result-correct">${b}</span>`).join('；');
            document.getElementById('resultAnswer').innerHTML = answerHtml;
            
            // Update next button text
            document.getElementById('nextBtn').textContent = 
                currentIndex < quizData.length - 1 ? '下一题' : '查看结果';
        }

        function selectStatus(status, btn) {
            currentStatus = status;
            document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function nextQuestion() {
            if (!currentStatus) {
                alert('请先选择本题状态（正确/部分正确/错误）');
                return;
            }
            
            // Update the last result with status
            results[results.length - 1].status = currentStatus;
            
            currentIndex++;
            if (currentIndex >= quizData.length) {
                showFinalResult();
            } else {
                loadQuestion();
            }
        }

        function showFinalResult() {
            document.getElementById('questionPage').classList.add('hidden');
            document.getElementById('resultPage').classList.add('hidden');
            document.getElementById('finalPage').classList.remove('hidden');
            
            let correctCount = 0, partialCount = 0, wrongCount = 0;
            results.forEach(r => {
                if (r.status === 'correct') correctCount++;
                else if (r.status === 'partial') partialCount++;
                else wrongCount++;
            });
            
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('partialCount').textContent = partialCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            
            // Generate result code
            const endTime = new Date();
            const startStr = formatTime(startTime);
            const endStr = formatTime(endTime);
            
            let code = `第33轮|${correctCount}|${partialCount}|${wrongCount}|${startStr}|${endStr}|`;
            results.forEach(r => {
                code += `${r.title}:${r.status},`;
            });
            
            document.getElementById('resultCode').textContent = code;
        }

        function formatTime(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
        }

        function copyCode() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
