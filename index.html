<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词复习 - 第21轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 16px; color: #666; }
        .progress { background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 24px; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; border-radius: 8px; transition: width 0.3s; }
        .question { padding: 24px; background: #f8f9fa; border-radius: 12px; margin-bottom: 24px; }
        .question-num { font-weight: bold; color: #667eea; margin-bottom: 16px; font-size: 16px; }
        .sentence { font-size: 18px; line-height: 1.8; margin-bottom: 20px; }
        .blank { color: #667eea; font-weight: bold; text-decoration: underline; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .option:hover { border-color: #667eea; background: #f0f4ff; }
        .option.correct { border-color: #4CAF50; background: #c8e6c9; }
        .option.wrong { border-color: #f44336; background: #ffcdd2; }
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
        .next-btn { background: #4CAF50; color: white; }
        .next-btn:hover { background: #45a049; }
        .answer-box { display: none; padding: 24px; background: #f0f7f0; border-radius: 12px; margin-top: 20px; border-left: 4px solid #4CAF50; }
        .answer-box.show { display: block; }
        .answer-box.wrong-answer { background: #fff5f5; border-left-color: #f44336; }
        .answer-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .answer-title.correct { color: #4CAF50; }
        .answer-title.wrong { color: #f44336; }
        .answer-item { margin-bottom: 16px; line-height: 1.6; }
        .answer-label { color: #666; font-size: 14px; margin-bottom: 4px; }
        .answer-value { font-size: 16px; }
        .word-title { font-size: 20px; font-weight: bold; color: #667eea; }
        .full-sentence { font-size: 16px; line-height: 1.8; color: #333; background: #e8f5e9; padding: 12px; border-radius: 8px; }
        .full-sentence .answer-word { color: #4CAF50; font-weight: bold; text-decoration: underline; }
        .options-meaning { margin-top: 12px; }
        .option-meaning-item { padding: 8px 12px; margin: 6px 0; background: #fff; border-radius: 6px; font-size: 15px; }
        .option-meaning-item.correct-opt { background: #c8e6c9; border-left: 3px solid #4CAF50; }
        .option-label { font-weight: bold; color: #666; margin-right: 8px; }
        .option-word { font-weight: bold; color: #333; }
        .option-meaning { color: #666; margin-left: 8px; }
        .result { display: none; text-align: center; padding: 32px; }
        .result.show { display: block; }
        .result h2 { color: #333; margin-bottom: 16px; }
        .result-score { font-size: 48px; font-weight: bold; color: #667eea; margin: 16px 0; }
        .result-code { background: #333; color: #4CAF50; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 20px 0; font-size: 12px; }
        .copy-btn { padding: 14px 28px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .copy-btn:hover { background: #5a6fd6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 英语单词复习 - 第21轮</h1>
        <p class="subtitle">选择题（4选1）| 错题优先 + 新词 | 原句出题</p>
        
        <div class="progress-info">
            <span>进度: <span id="currentNum">1</span> / 15</span>
            <span>正确: <span id="correctCount">0</span></span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width: 6.67%"></div></div>
        
        <div id="questionArea"></div>
        
        <div class="result" id="result">
            <h2>🎉 第21轮复习完成！</h2>
            <div class="result-score"><span id="finalScore">0</span> / 15</div>
            <p>正确率: <span id="accuracy">0</span>%</p>
            <p style="margin: 16px 0; color: #666;">请复制以下结果码发回飞书：</p>
            <div class="result-code" id="resultCode"></div>
            <button class="copy-btn" onclick="copyResult()">📋 复制结果码</button>
        </div>
    </div>

    <script>
        const wordBank = {
            "boost": "提升，增强，促进",
            "hyperpersonalized": "超个性化的，高度定制化的",
            "installment": "分期付款",
            "barrage of temptation": "连珠炮般的诱惑",
            "gadgets": "电子设备，小器具",
            "schemes": "计划，方案，机制",
            "stack up": "堆积，累积",
            "unsecured debt": "无担保债务，信用债务",
            "collateral": "抵押品，担保物",
            "exacerbate": "加剧，使恶化",
            "strain": "压力，紧张，困境",
            "shedding light on": "阐明，揭示",
            "tempting": "诱人的，有吸引力的",
            "numerosity": "数量效应，数值感知",
            "internalizing": "内化"
        };

        const questions = [
            { word: "boost", meaning: "提升，增强，促进", sentence: "Psychology researchers are developing cognitive interventions to help adults ______ their brain health rather than being affected by harmful stereotypes about aging.", answer: "boost", options: ["boost", "exacerbate", "strain", "collateral"], translation: "心理学研究人员正在开发认知干预措施，帮助成年人提升大脑健康，而不是受到关于衰老的有害刻板印象的影响。" },
            { word: "hyperpersonalized", meaning: "超个性化的，高度定制化的", sentence: "Yet this objective can retreat to the background as consumers struggle with the high cost of living combined with a steady stream of ______ online ads.", answer: "hyperpersonalized", options: ["hyperpersonalized", "tempting", "numerosity", "internalizing"], translation: "然而，随着消费者努力应对高昂的生活成本和源源不断的超个性化在线广告，这一目标可能会退居次要地位。" },
            { word: "installment", meaning: "分期付款", sentence: "A prime example is buy now, pay later (BNPL) services, where a single click or tap lets shoppers purchase items by splitting up the payments into smaller, interest-free ______.", answer: "installment", options: ["installment", "schemes", "gadgets", "strain"], translation: "一个典型的例子是先买后付（BNPL）服务，只需单击或点击，购物者就可以通过将付款分成更小的无息分期付款来购买商品。" },
            { word: "barrage of temptation", meaning: "连珠炮般的诱惑", sentence: "Since AI models are better and better at predicting the products we want, targeted ads can create a constant ______.", answer: "barrage of temptation", options: ["barrage of temptation", "stack up", "unsecured debt", "shedding light on"], translation: "由于AI模型越来越擅长预测我们想要的产品，定向广告可以创造连珠炮般的诱惑。" },
            { word: "gadgets", meaning: "电子设备，小器具", sentence: "Clothing and fashion was the top category for this type of financing, followed by electronics and ______ and furniture and home decor.", answer: "gadgets", options: ["gadgets", "schemes", "strain", "numerosity"], translation: "服装和时尚是这类融资的首选类别，其次是电子产品和小器具以及家具和家居装饰。" },
            { word: "schemes", meaning: "计划，方案，机制", sentence: "Unlike credit cards, BNPL ______ do not require an official approval process.", answer: "schemes", options: ["schemes", "gadgets", "strain", "internalizing"], translation: "与信用卡不同，BNPL机制不需要官方审批流程。" },
            { word: "stack up", meaning: "堆积，累积", sentence: "While these loans can help with short-term budgeting for individuals who can make the payments on time, they can increase stress when users ______ multiple BNPL loans simultaneously and start missing payments.", answer: "stack up", options: ["stack up", "shedding light on", "barrage of temptation", "unsecured debt"], translation: "虽然这些贷款可以帮助能够按时付款的个人进行短期预算，但当用户同时累积多笔BNPL贷款并开始错过付款时，它们会增加压力。" },
            { word: "unsecured debt", meaning: "无担保债务，信用债务", sentence: "Researchers recently found that people with certain mental health conditions were more likely to use BNPL products, and ______—debt that is not backed by collateral—is correlated with worse mental health.", answer: "unsecured debt", options: ["unsecured debt", "barrage of temptation", "stack up", "shedding light on"], translation: "研究人员最近发现，患有某些心理健康状况的人更有可能使用BNPL产品，而无担保债务——没有抵押品支持的债务——与更差的心理健康相关。" },
            { word: "collateral", meaning: "抵押品，担保物", sentence: "Unsecured debt—debt that is not backed by ______—is correlated with worse mental health.", answer: "collateral", options: ["collateral", "exacerbate", "strain", "tempting"], translation: "无担保债务——没有抵押品支持的债务——与更差的心理健康相关。" },
            { word: "exacerbate", meaning: "加剧，使恶化", sentence: "Researchers are studying the psychological mechanisms that shape financial decision-making in the ecommerce environment and how to help people resist spending that may ______ financial stress.", answer: "exacerbate", options: ["exacerbate", "boost", "strain", "tempting"], translation: "研究人员正在研究塑造电子商务环境中财务决策的心理机制，以及如何帮助人们抵制可能加剧财务压力的消费。" },
            { word: "strain", meaning: "压力，紧张，困境", sentence: "When people are under economic ______, one of the challenges they face is that they have less room for error in financial decisions.", answer: "strain", options: ["strain", "boost", "collateral", "numerosity"], translation: "当人们处于经济困境时，他们面临的挑战之一是在财务决策中犯错的空间更小。" },
            { word: "shedding light on", meaning: "阐明，揭示", sentence: "After realizing how much they actually owed, 1 in 4 Americans say they've regretted using BNPL, and a new study is ______ why these plans are so tempting.", answer: "shedding light on", options: ["shedding light on", "stack up", "unsecured debt", "barrage of temptation"], translation: "在意识到他们实际欠了多少钱后，四分之一的美国人表示他们后悔使用BNPL，一项新研究正在揭示为什么这些计划如此诱人。" },
            { word: "tempting", meaning: "诱人的，有吸引力的", sentence: "A new study is shedding light on why these plans are so ______.", answer: "tempting", options: ["tempting", "numerosity", "internalizing", "hyperpersonalized"], translation: "一项新研究正在揭示为什么这些计划如此诱人。" },
            { word: "numerosity", meaning: "数量效应，数值感知", sentence: "Presenting an installment amount rather than the full price lowers a consumer's perception of the cost. This is due to the ______ effect.", answer: "numerosity", options: ["numerosity", "internalizing", "tempting", "hyperpersonalized"], translation: "呈现分期付款金额而不是全价会降低消费者对成本的感知。这是由于数量效应。" },
            { word: "internalizing", meaning: "内化", sentence: "With these installment plans, people may not be fully ______ the cost of a purchase when deciding whether to buy or how much to spend.", answer: "internalizing", options: ["internalizing", "numerosity", "tempting", "hyperpersonalized"], translation: "有了这些分期付款计划，人们在决定是否购买或花多少钱时可能没有完全内化购买的成本。" }
        ];

        let currentIndex = 0;
        let correctCount = 0;
        const results = [];
        let startTime = null;

        function renderQuestion() {
            if (currentIndex === 0 && !startTime) {
                startTime = new Date().toISOString();
            }
            
            const q = questions[currentIndex];
            const area = document.getElementById('questionArea');
            
            area.innerHTML = `
                <div class="question">
                    <div class="question-num">📖 第 ${currentIndex + 1} / ${questions.length} 题</div>
                    <div class="sentence">${q.sentence.replace('______', '<span class="blank">______</span>')}</div>
                    <div class="options" id="options">
                        ${q.options.map((opt, i) => `<div class="option" onclick="selectAndSubmit('${opt}')">${String.fromCharCode(65 + i)}. ${opt}</div>`).join('')}
                    </div>
                    
                    <div class="answer-box" id="answerBox">
                        <div class="answer-title" id="answerTitle"></div>
                        <div class="answer-item">
                            <div class="answer-label">单词</div>
                            <div class="answer-value word-title">${q.word}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">中文释义</div>
                            <div class="answer-value">${q.meaning}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">完整句子</div>
                            <div class="full-sentence">${q.sentence.replace('______', `<span class="answer-word">${q.answer}</span>`)}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">句子翻译</div>
                            <div class="answer-value">${q.translation}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">所有选项释义</div>
                            <div class="options-meaning">
                                ${q.options.map((opt, i) => {
                                    const isCorrect = opt === q.answer;
                                    return `<div class="option-meaning-item ${isCorrect ? 'correct-opt' : ''}">
                                        <span class="option-label">${String.fromCharCode(65 + i)}.</span>
                                        <span class="option-word">${opt}</span>
                                        <span class="option-meaning">- ${wordBank[opt] || '（释义缺失）'}</span>
                                        ${isCorrect ? '<span style="color: #4CAF50; margin-left: 8px;">✓ 正确答案</span>' : ''}
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn next-btn hidden" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
                </div>
            `;
            
            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('progressBar').style.width = `${(currentIndex + 1) / questions.length * 100}%`;
        }

        function selectAndSubmit(option) {
            const q = questions[currentIndex];
            const isCorrect = option === q.answer;
            if (isCorrect) correctCount++;
            
            results.push({ word: q.word, correct: isCorrect });
            
            document.getElementById('correctCount').textContent = correctCount;
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                const optText = opt.textContent.split('. ')[1];
                if (optText === q.answer) {
                    opt.classList.add('correct');
                } else if (optText === option && !isCorrect) {
                    opt.classList.add('wrong');
                }
                opt.onclick = null;
                opt.style.cursor = 'default';
            });
            
            const answerBox = document.getElementById('answerBox');
            const answerTitle = document.getElementById('answerTitle');
            
            if (isCorrect) {
                answerTitle.innerHTML = '✅ 回答正确！';
                answerTitle.className = 'answer-title correct';
            } else {
                answerTitle.innerHTML = '❌ 回答错误';
                answerTitle.className = 'answer-title wrong';
                answerBox.classList.add('wrong-answer');
            }
            
            answerBox.classList.add('show');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const endTime = new Date().toISOString();
            
            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('result').classList.add('show');
            document.getElementById('finalScore').textContent = correctCount;
            document.getElementById('accuracy').textContent = Math.round(correctCount / questions.length * 100);
            
            const resultData = { 
                round: 21, 
                total: questions.length, 
                correct: correctCount, 
                results,
                startTime,
                endTime
            };
            const resultCode = 'ENGRESULT:' + btoa(JSON.stringify(resultData));
            document.getElementById('resultCode').textContent = resultCode;
        }

        function copyResult() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ 已复制！请粘贴到飞书发给我。');
            });
        }

        renderQuestion();
    </script>
</body>
</html>
