    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 18px; margin-bottom: 8px; }
        .progress { font-size: 14px; opacity: 0.9; }
        .question { padding: 25px 15px; text-align: center; }
        .word { font-size: 28px; font-weight: bold; color: #333; margin-bottom: 8px; }
        .pos { font-size: 13px; color: #888; margin-bottom: 15px; }
        .options { padding: 0 15px 15px; }
        .option {
            display: block;
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            font-size: 15px;
            color: #333;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: left;
            line-height: 1.4;
        }
        .option:active { transform: scale(0.98); }
        .option:hover { border-color: #667eea; background: #f8f9ff; }
        .option.selected { background: #667eea; color: white; border-color: #667eea; }
        .know-btn {
            display: block;
            width: calc(100% - 30px);
            margin: 5px 15px 15px;
            padding: 14px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }
        .know-btn:active { background: #45a049; transform: scale(0.98); }
        
        /* 加载页面 */
        .loading-page { padding: 40px 20px; text-align: center; }
        .loading-page h2 { font-size: 18px; color: #333; margin-bottom: 20px; }
        .data-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            font-family: monospace;
        }
        .load-btn {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin: 5px;
        }
        .hint { font-size: 12px; color: #888; margin-top: 15px; line-height: 1.5; }
        
        /* 结果页面 */
        .result { padding: 30px 15px; text-align: center; }
        .result h2 { font-size: 20px; color: #333; margin-bottom: 20px; }
        .result-stats { display: flex; justify-content: space-around; margin-bottom: 20px; flex-wrap: wrap; }
        .stat { text-align: center; padding: 10px; min-width: 80px; }
        .stat-num { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 11px; color: #666; margin-top: 4px; }
        .stat-correct .stat-num { color: #4CAF50; }
        .stat-wrong .stat-num { color: #f44336; }
        .stat-known .stat-num { color: #2196F3; }
        .stat-mastered .stat-num { color: #9C27B0; }
        .result-btn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin: 5px;
        }
        .code-result {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin: 15px;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }
        .hidden { display: none !important; }
        
        /* 轮次选择 */
        .round-select {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }
        .round-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .round-btn.active { background: #667eea; color: white; }

        // 尝试从本地存储加载
        function loadData() {
            var stored = localStorage.getItem('vocabData');
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch(e) {}
            }
            return EMBEDDED_DATA;
        }
        
        var vocabData = loadData();
        var currentIndex = 0;
        var currentRound = 1;
        var results = [];
        var startTime = null;
        var currentBatch = [];
        
        function selectRound(n) {
            currentRound = n;
            document.querySelectorAll('.round-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i + 1 === n);
            });
        }
        
        function startTest() {
            // 检查是否有输入数据
            var input = document.getElementById('data-input').value.trim();
            if (input) {
                try {
                    vocabData = JSON.parse(input);
                    localStorage.setItem('vocabData', JSON.stringify(vocabData));
                } catch(e) {
                    alert('JSON格式不正确');
                    return;
                }
            }
            
            if (!vocabData || vocabData.length === 0) {
                alert('请先导入数据或等待数据加载');
                return;
            }
            
            // 计算本轮单词范围
            var BATCH_SIZE = 100;
            var startIdx = (currentRound - 1) * BATCH_SIZE;
            var endIdx = startIdx + BATCH_SIZE;
            
            if (startIdx >= vocabData.length) {
                alert('测试已完成所有轮次！');
                return;
            }
            
            // 提取当前轮单词
            currentBatch = vocabData.slice(startIdx, Math.min(endIdx, vocabData.length));
            
            // 打乱顺序
            shuffleArray(currentBatch);
            
            // 重置状态
            currentIndex = 0;
            results = [];
            startTime = Date.now();
            
            // 显示测试页面
            document.getElementById('loading-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            document.getElementById('progress').textContent = 
                '第' + (startIdx + 1) + '-' + Math.min(endIdx, vocabData.length) + '词';
            
            showQuestion();
        }
        
        function showQuestion() {
            if (currentIndex >= currentBatch.length) {
                showResult();
                return;
            }
            
            var word = currentBatch[currentIndex];
            document.getElementById('word').textContent = word.word || word[0];
            document.getElementById('pos').textContent = word.pos || word[2] || '';
            
            generateOptions(word);
            
            document.getElementById('progress').textContent = 
                '第' + ((currentRound-1)*100 + currentIndex + 1) + '题 / 共' + currentBatch.length + '题';
        }
        
        function generateOptions(correctWord) {
            var container = document.getElementById('options');
            container.innerHTML = '';
            
            var correctCn = correctWord.cn || correctWord[1];
            var correctPos = correctWord.pos || correctWord[2] || '';
            
            // 找相同词性的词作为干扰项
            var samePOS = vocabData.filter(function(w) {
                var pos = w.pos || w[2] || '';
                return pos === correctPos && (w.word || w[0]) !== (correctWord.word || correctWord[0]);
            });
            var otherPOS = vocabData.filter(function(w) {
                var pos = w.pos || w[2] || '';
                return pos !== correctPos;
            });
            
            shuffleArray(samePOS);
            shuffleArray(otherPOS);
            
            var options = [];
            
            // 先尝试找相同词性的
            var needWrong = 3;
            if (samePOS.length >= needWrong) {
                options = samePOS.slice(0, needWrong).map(function(w) {
                    return { text: w.cn || w[1], correct: false };
                });
            } else {
                // 相同词性不够，从其他补
                samePOS.forEach(function(w) {
                    options.push({ text: w.cn || w[1], correct: false });
                });
                var need = needWrong - options.length;
                otherPOS.slice(0, need).forEach(function(w) {
                    options.push({ text: w.cn || w[1], correct: false });
                });
            }
            
            // 添加正确答案
            options.push({ text: correctCn, correct: true });
            
            shuffleArray(options);
            
            options.forEach(function(opt) {
                var btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = opt.text;
                btn.onclick = function() { handleAnswer(opt.correct); };
                container.appendChild(btn);
            });
        }
        
        function handleAnswer(isCorrect) {
            var word = currentBatch[currentIndex];
            results.push({
                word: word.word || word[0],
                cn: word.cn || word[1],
                correct: isCorrect,
                known: false,
                pos: word.pos || word[2] || ''
            });
            
            currentIndex++;
            showQuestion();
        }
        
        function handleKnow() {
            var word = currentBatch[currentIndex];
            results.push({
                word: word.word || word[0],
                cn: word.cn || word[1],
                correct: true,
                known: true,
                pos: word.pos || word[2] || ''
            });
            
            currentIndex++;
            showQuestion();
        }
        
        function showResult() {
            var endTime = Date.now();
            
            var correctCount = 0, wrongCount = 0, knownCount = 0;
            var masteredCount = 0, unfamiliarCount = 0;
            
            // 获取第一轮结果
            var firstRoundResults = [];
            try {
                firstRoundResults = JSON.parse(localStorage.getItem('round' + currentRound + '_results') || '[]');
            } catch(e) {}
            
            // 保存当前轮结果
            localStorage.setItem('round' + currentRound + '_results', JSON.stringify(results));
            
            results.forEach(function(r) {
                if (r.known) {
                    knownCount++;
                    masteredCount++;
                } else if (r.correct) {
                    correctCount++;
                    // 检查第一轮结果（如果是第二轮）
                    var firstR = firstRoundResults.find(function(f) { return f.word === r.word; });
                    if (firstR && (firstR.correct || firstR.known)) {
                        masteredCount++;
                    } else if (currentRound === 1) {
                        // 第一轮答对，需要第二轮再确认
                        unfamiliarCount++;
                    } else {
                        masteredCount++;
                    }
                } else {
                    wrongCount++;
                    unfamiliarCount++;
                }
            });
            
            document.getElementById('result-round').textContent = currentRound;
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('wrong-count').textContent = wrongCount;
            document.getElementById('known-count').textContent = knownCount;
            document.getElementById('mastered-count').textContent = masteredCount;
            document.getElementById('unfamiliar-count').textContent = unfamiliarCount;
            
            // 生成结果码
            var resultCode = 'VOCABRESULT:' + currentRound + '|' + results.length + '|' + 
                correctCount + '|' + wrongCount + '|' + knownCount + '|' + 
                masteredCount + '|' + unfamiliarCount + '|' + 
                startTime + '|' + endTime + '|' + 
                results.map(function(r) { 
                    return r.word + ':' + (r.correct?'1':'0') + ':' + (r.known?'1':'0'); 
                }).join(',');
            
            document.getElementById('code-result').textContent = resultCode;
            
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
        }
        
        function copyResult() {
            var code = document.getElementById('code-result').textContent;
            navigator.clipboard.writeText(code).then(function() {
                alert('结果码已复制！请把结果码发给我，我来更新多维表格~');
            });
        }
        
        // 生成需要同步的数据（用于发给我更新表格）
        function generateSyncData() {
            var syncData = results.map(function(r) {
                var status = r.known ? '我认识' : (r.correct ? '正确' : '错误');
                return r.word + '|' + status;
            }).join('\n');
            
            var round = currentRound;
            var header = '【第' + round + '轮答题结果】\n';
            
            return header + syncData + '\n\n请把以上结果发给我，我来更新多维表格~';
        }
        
        function copyForSync() {
            var data = generateSyncData();
            navigator.clipboard.writeText(data).then(function() {
                alert('已复制！请直接发给我，我会自动更新表格~');
            });
        }
        
        function nextRound() {
            if (currentRound >= 22) {
                alert('所有轮次已完成！');
                return;
            }
            currentRound++;
            selectRound(currentRound);
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('loading-page').classList.remove('hidden');
            document.getElementById('progress').textContent = '第' + currentRound + '轮';
        }
        
        function shuffleArray(array) {
            for (var i = array.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = array[i];
                array[i] = array[j];
                array[j] = tmp;
            }
            return array;
        }
        
        // 初始化时尝试加载已有数据
        if (vocabData && vocabData.length > 0) {
            document.getElementById('progress').textContent = '数据已加载: ' + vocabData.length + '词';
        }
    </script>
