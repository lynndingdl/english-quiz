<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词复习 - 第23轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 16px; color: #666; }
        .progress { background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 24px; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; border-radius: 8px; transition: width 0.3s; }
        .question { padding: 24px; background: #f8f9fa; border-radius: 12px; margin-bottom: 24px; }
        .question-num { font-weight: bold; color: #667eea; margin-bottom: 16px; font-size: 16px; }
        .sentence { font-size: 18px; line-height: 1.8; margin-bottom: 20px; }
        .blank { color: #667eea; font-weight: bold; text-decoration: underline; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .option:hover { border-color: #667eea; background: #f0f4ff; }
        .option.correct { border-color: #4CAF50; background: #c8e6c9; }
        .option.wrong { border-color: #f44336; background: #ffcdd2; }
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
        .next-btn { background: #4CAF50; color: white; }
        .next-btn:hover { background: #45a049; }
        .answer-box { display: none; padding: 24px; background: #f0f7f0; border-radius: 12px; margin-top: 20px; border-left: 4px solid #4CAF50; }
        .answer-box.show { display: block; }
        .answer-box.wrong-answer { background: #fff5f5; border-left-color: #f44336; }
        .answer-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .answer-title.correct { color: #4CAF50; }
        .answer-title.wrong { color: #f44336; }
        .answer-item { margin-bottom: 16px; line-height: 1.6; }
        .answer-label { color: #666; font-size: 14px; margin-bottom: 4px; }
        .answer-value { font-size: 16px; }
        .word-title { font-size: 20px; font-weight: bold; color: #667eea; }
        .full-sentence { font-size: 16px; line-height: 1.8; color: #333; background: #e8f5e9; padding: 12px; border-radius: 8px; }
        .full-sentence .answer-word { color: #4CAF50; font-weight: bold; text-decoration: underline; }
        .options-meaning { margin-top: 12px; }
        .option-meaning-item { padding: 8px 12px; margin: 6px 0; background: #fff; border-radius: 6px; font-size: 15px; }
        .option-meaning-item.correct-opt { background: #c8e6c9; border-left: 3px solid #4CAF50; }
        .option-label { font-weight: bold; color: #666; margin-right: 8px; }
        .option-word { font-weight: bold; color: #333; }
        .option-meaning { color: #666; margin-left: 8px; }
        .result { display: none; text-align: center; padding: 32px; }
        .result.show { display: block; }
        .result h2 { color: #333; margin-bottom: 16px; }
        .result-score { font-size: 48px; font-weight: bold; color: #667eea; margin: 16px 0; }
        .result-code { background: #333; color: #4CAF50; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 20px 0; font-size: 12px; }
        .copy-btn { padding: 14px 28px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .copy-btn:hover { background: #5a6fd6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 英语单词复习 - 第23轮</h1>
        <p class="subtitle">选择题（4选1）| 全部错题 | 原句出题</p>

        <div class="progress-info">
            <span>进度: <span id="currentNum">1</span> / 20</span>
            <span>正确: <span id="correctCount">0</span></span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width: 5%"></div></div>

        <div id="questionArea"></div>

        <div class="result" id="result">
            <h2>🎉 第23轮复习完成！</h2>
            <div class="result-score"><span id="finalScore">0</span> / 20</div>
            <p>正确率: <span id="accuracy">0</span>%</p>
            <p style="margin: 16px 0; color: #666;">请复制以下结果码发回飞书：</p>
            <div class="result-code" id="resultCode"></div>
            <button class="copy-btn" onclick="copyResult()">📋 复制结果码</button>
        </div>
    </div>

    <script>
        const wordBank = {
            "obscure": "模糊的，不为人知的",
            "accuracy": "准确性，精确度",
            "compassionate": "富有同情心的，人道的",
            "prescribed": "开（药），处方的",
            "upstream": "上游的，从源头",
            "accountability": "问责制，责任",
            "finalize": "最终确定",
            "flagrant": "公然的，明目张胆的",
            "grappling": "努力解决，搏斗",
            "pervasive": "普遍的，无处不在的",
            "rebellious": "叛逆的，反抗的",
            "upfront": "预先的，事先的",
            "impairment": "损伤，障碍",
            "technophobic": "技术恐惧的",
            "adherent": "遵从的，坚持的",
            "cardiovascular": "心血管的",
            "meteoric": "迅速的，流星般的",
            "fringe": "边缘的，非主流的",
            "ubiquitous": "无处不在的，普遍存在的",
            "opaque": "晦涩难懂的，不透明的"
        };

        const questions = [
            { word: "obscure", meaning: "模糊的，不为人知的", sentence: "Originating from a somewhat ______ rap song in late 2024.", answer: "obscure", options: ["obscure", "pervasive", "fringe", "meteoric"], translation: "源于2024年底一首相对不为人知的说唱歌曲。" },
            { word: "accuracy", meaning: "准确性，精确度", sentence: "Getting players to reconceptualize stress as being beneficial improved shooting ______, attentional control, and cognitive effort during high-pressure performance.", answer: "accuracy", options: ["accuracy", "accountability", "pervasive", "upstream"], translation: "让选手重新认识压力的益处，提高了高压表现下的投篮准确性、注意力控制和认知努力。" },
            { word: "compassionate", meaning: "富有同情心的，人道的", sentence: "ERP is probably the most ______ thing you can do for someone who suffers from OCD.", answer: "compassionate", options: ["compassionate", "rebellious", "technophobic", "adherent"], translation: "暴露反应预防（ERP）可能是你能为强迫症患者做的最人道的事情。" },
            { word: "prescribed", meaning: "开（药），处方的", sentence: "They are typically ______ in higher doses than used to treat depression.", answer: "prescribed", options: ["prescribed", "finalize", "cardiovascular", "ubiquitous"], translation: "它们通常以比治疗抑郁症更高的剂量开处方。" },
            { word: "upstream", meaning: "上游的，从源头", sentence: "This metacognitive approach focuses ______ on how obsessions form.", answer: "upstream", options: ["upstream", "flagrant", "opaque", "impairment"], translation: "这种元认知方法从源头关注强迫观念是如何形成的。" },
            { word: "accountability", meaning: "问责制，责任", sentence: "Teams were also encouraged to develop their own norms around culture, ______, and conflict management, fostering self-sufficiency and leadership skills.", answer: "accountability", options: ["accountability", "accuracy", "grappling", "meteoric"], translation: "团队还被鼓励制定自己的文化、问责制和冲突管理规范，培养自给自足和领导技能。" },
            { word: "finalize", meaning: "最终确定", sentence: "In November 2025, Poulus and colleagues convened game publishers, tournament organizers, International Olympic Committee representatives, and mental health experts to ______ nine pillars of mental health support.", answer: "finalize", options: ["finalize", "upfront", "compassionate", "pervasive"], translation: "2025年11月，Poulus和同事召集游戏发行商、锦标赛组织者、国际奥委会代表和心理健康专家，最终确定了心理健康支持的九大支柱。" },
            { word: "flagrant", meaning: "公然的，明目张胆的", sentence: "This would be akin to a player committing a ______ foul in basketball or rushing the mound in baseball.", answer: "flagrant", options: ["flagrant", "obscure", "adherent", "fringe"], translation: "这类似于篮球运动员犯下公然犯规或棒球运动员冲向投手丘。" },
            { word: "grappling", meaning: "努力解决，搏斗", sentence: "Research shows that elite esports players often experience poor mental health outcomes while ______ with the pressures of competition.", answer: "grappling", options: ["grappling", "upstream", "technophobic", "ubiquitous"], translation: "研究表明，精英电竞选手在应对比赛压力时经常出现不良心理健康结果。" },
            { word: "pervasive", meaning: "普遍的，无处不在的", sentence: "The phrase has become so ______ that some schools have even banned its use.", answer: "pervasive", options: ["pervasive", "prescribed", "cardiovascular", "impairment"], translation: "这个短语已经如此普遍，以至于一些学校甚至禁止使用它。" },
            { word: "rebellious", meaning: "叛逆的，反抗的", sentence: "For young people, the appeal lies in its irreverent or ______ qualities while also remaining opaque to adults.", answer: "rebellious", options: ["rebellious", "finalize", "accuracy", "accountability"], translation: "对年轻人来说，吸引力在于它的不敬或叛逆品质，同时对成年人来说仍然难以理解。" },
            { word: "upfront", meaning: "预先的，事先的", sentence: "For older workers to overcome barriers to learning, they often need to know ______ how training will benefit them.", answer: "upfront", options: ["upfront", "compassionate", "meteoric", "flagrant"], translation: "为了让年长工人克服学习障碍，他们通常需要预先知道培训将如何使他们受益。" },
            { word: "impairment", meaning: "损伤，障碍", sentence: "Evidence also suggests that people are capable of mastering new skills even after they start experiencing declines in memory, attention, executive function, and other areas associated with mild cognitive ______.", answer: "impairment", options: ["impairment", "opaque", "grappling", "ubiquitous"], translation: "证据还表明，即使在开始经历记忆、注意力、执行功能和其他与轻度认知障碍相关领域的衰退后，人们仍然能够掌握新技能。" },
            { word: "technophobic", meaning: "技术恐惧的", sentence: "We found that the participants were not ______.", answer: "technophobic", options: ["technophobic", "pervasive", "adherent", "fringe"], translation: "我们发现参与者并不恐惧技术。" },
            { word: "adherent", meaning: "遵从的，坚持的", sentence: "They were very ______, and there was a low dropout rate.", answer: "adherent", options: ["adherent", "upstream", "prescribed", "obscure"], translation: "他们非常遵从，退出率很低。" },
            { word: "cardiovascular", meaning: "心血管的", sentence: "In Finland, researchers led a 2-year intervention for people at higher risk of dementia. Participants were educated and supported in areas of diet, physical activity, cognitive training, social activity, and monitoring of ______ risk factors.", answer: "cardiovascular", options: ["cardiovascular", "accuracy", "rebellious", "finalize"], translation: "在芬兰，研究人员为痴呆症高风险人群进行了为期2年的干预。参与者在饮食、身体活动、认知训练、社交活动和心血管风险因素监测方面得到了教育和支持。" },
            { word: "meteoric", meaning: "迅速的，流星般的", sentence: "Its ______ rise demonstrates the internet's power to propel fringe terms into the mainstream at warp speed.", answer: "meteoric", options: ["meteoric", "upfront", "impairment", "grappling"], translation: "它的迅速崛起展示了互联网以超光速将边缘词汇推向主流的力量。" },
            { word: "fringe", meaning: "边缘的，非主流的", sentence: "Its meteoric rise demonstrates the internet's power to propel ______ terms into the mainstream at warp speed.", answer: "fringe", options: ["fringe", "technophobic", "compassionate", "pervasive"], translation: "它的迅速崛起展示了互联网以超光速将边缘词汇推向主流的力量。" },
            { word: "ubiquitous", meaning: "无处不在的，普遍存在的", sentence: "Describing it as meaningless, ______, and nonsensical while acknowledging its usefulness to young users.", answer: "ubiquitous", options: ["ubiquitous", "flagrant", "accountability", "adherent"], translation: "将其描述为毫无意义、无处不在和荒谬可笑，同时承认它对年轻用户的实用性。" },
            { word: "opaque", meaning: "晦涩难懂的，不透明的", sentence: "For young people, the appeal lies in its irreverent or rebellious qualities while also remaining ______ to adults.", answer: "opaque", options: ["opaque", "finalize", "prescribed", "cardiovascular"], translation: "对年轻人来说，吸引力在于它的不敬或叛逆品质，同时对成年人来说仍然晦涩难懂。" }
        ];

        let currentIndex = 0;
        let correctCount = 0;
        const results = [];
        let startTime = null;

        function renderQuestion() {
            if (currentIndex === 0 && !startTime) {
                startTime = new Date().toISOString();
            }

            const q = questions[currentIndex];
            const area = document.getElementById('questionArea');

            area.innerHTML = `
                <div class="question">
                    <div class="question-num">📖 第 ${currentIndex + 1} / ${questions.length} 题</div>
                    <div class="sentence">${q.sentence.replace('______', '<span class="blank">______</span>')}</div>
                    <div class="options" id="options">
                        ${q.options.map((opt, i) => `<div class="option" onclick="selectAndSubmit('${opt}')">${String.fromCharCode(65 + i)}. ${opt}</div>`).join('')}
                    </div>

                    <div class="answer-box" id="answerBox">
                        <div class="answer-title" id="answerTitle"></div>
                        <div class="answer-item">
                            <div class="answer-label">单词</div>
                            <div class="answer-value word-title">${q.word}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">中文释义</div>
                            <div class="answer-value">${q.meaning}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">完整句子</div>
                            <div class="full-sentence">${q.sentence.replace('______', `<span class="answer-word">${q.answer}</span>`)}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">句子翻译</div>
                            <div class="answer-value">${q.translation}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">所有选项释义</div>
                            <div class="options-meaning">
                                ${q.options.map((opt, i) => {
                                    const isCorrect = opt === q.answer;
                                    return `<div class="option-meaning-item ${isCorrect ? 'correct-opt' : ''}">
                                        <span class="option-label">${String.fromCharCode(65 + i)}.</span>
                                        <span class="option-word">${opt}</span>
                                        <span class="option-meaning">- ${wordBank[opt] || '（释义缺失）'}</span>
                                        ${isCorrect ? '<span style="color: #4CAF50; margin-left: 8px;">✓ 正确答案</span>' : ''}
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>

                    <button class="btn next-btn hidden" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
                </div>
            `;

            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('progressBar').style.width = `${(currentIndex + 1) / questions.length * 100}%`;
        }

        function selectAndSubmit(option) {
            const q = questions[currentIndex];
            const isCorrect = option === q.answer;
            if (isCorrect) correctCount++;

            results.push({ word: q.word, correct: isCorrect });

            document.getElementById('correctCount').textContent = correctCount;

            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                const optText = opt.textContent.split('. ')[1];
                if (optText === q.answer) {
                    opt.classList.add('correct');
                } else if (optText === option && !isCorrect) {
                    opt.classList.add('wrong');
                }
                opt.onclick = null;
                opt.style.cursor = 'default';
            });

            const answerBox = document.getElementById('answerBox');
            const answerTitle = document.getElementById('answerTitle');

            if (isCorrect) {
                answerTitle.innerHTML = '✅ 回答正确！';
                answerTitle.className = 'answer-title correct';
            } else {
                answerTitle.innerHTML = '❌ 回答错误';
                answerTitle.className = 'answer-title wrong';
                answerBox.classList.add('wrong-answer');
            }

            answerBox.classList.add('show');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const endTime = new Date().toISOString();

            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('result').classList.add('show');
            document.getElementById('finalScore').textContent = correctCount;
            document.getElementById('accuracy').textContent = Math.round(correctCount / questions.length * 100);

            const resultData = {
                round: 23,
                total: questions.length,
                correct: correctCount,
                results,
                startTime,
                endTime
            };
            const resultCode = 'ENGRESULT:' + btoa(JSON.stringify(resultData));
            document.getElementById('resultCode').textContent = resultCode;
        }

        function copyResult() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ 已复制！请粘贴到飞书发给我。');
            });
        }

        renderQuestion();
    </script>
</body>
</html>
