<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词复习 - 第15轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 16px; color: #666; }
        .progress { background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 24px; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; border-radius: 8px; transition: width 0.3s; }
        .question { padding: 24px; background: #f8f9fa; border-radius: 12px; margin-bottom: 24px; }
        .question-num { font-weight: bold; color: #667eea; margin-bottom: 16px; font-size: 16px; }
        .sentence { font-size: 18px; line-height: 1.8; margin-bottom: 20px; }
        .blank { color: #667eea; font-weight: bold; text-decoration: underline; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .option:hover { border-color: #667eea; background: #f0f4ff; }
        .option.correct { border-color: #4CAF50; background: #c8e6c9; }
        .option.wrong { border-color: #f44336; background: #ffcdd2; }
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
        .next-btn { background: #4CAF50; color: white; }
        .next-btn:hover { background: #45a049; }
        .answer-box { display: none; padding: 24px; background: #f0f7f0; border-radius: 12px; margin-top: 20px; border-left: 4px solid #4CAF50; }
        .answer-box.show { display: block; }
        .answer-box.wrong-answer { background: #fff5f5; border-left-color: #f44336; }
        .answer-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .answer-title.correct { color: #4CAF50; }
        .answer-title.wrong { color: #f44336; }
        .answer-item { margin-bottom: 16px; line-height: 1.6; }
        .answer-label { color: #666; font-size: 14px; margin-bottom: 4px; }
        .answer-value { font-size: 16px; }
        .word-title { font-size: 20px; font-weight: bold; color: #667eea; }
        .full-sentence { font-size: 16px; line-height: 1.8; color: #333; background: #e8f5e9; padding: 12px; border-radius: 8px; }
        .full-sentence .answer-word { color: #4CAF50; font-weight: bold; text-decoration: underline; }
        .options-meaning { margin-top: 12px; }
        .option-meaning-item { padding: 8px 12px; margin: 6px 0; background: #fff; border-radius: 6px; font-size: 15px; }
        .option-meaning-item.correct-opt { background: #c8e6c9; border-left: 3px solid #4CAF50; }
        .option-label { font-weight: bold; color: #666; margin-right: 8px; }
        .option-word { font-weight: bold; color: #333; }
        .option-meaning { color: #666; margin-left: 8px; }
        .result { display: none; text-align: center; padding: 32px; }
        .result.show { display: block; }
        .result h2 { color: #333; margin-bottom: 16px; }
        .result-score { font-size: 48px; font-weight: bold; color: #667eea; margin: 16px 0; }
        .result-code { background: #333; color: #4CAF50; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 20px 0; font-size: 12px; }
        .copy-btn { padding: 14px 28px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .copy-btn:hover { background: #5a6fd6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 英语单词复习 - 第15轮</h1>
        <p class="subtitle">选择题（4选1）| 错题优先</p>
        
        <div class="progress-info">
            <span>进度: <span id="currentNum">1</span> / 20</span>
            <span>正确: <span id="correctCount">0</span></span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width: 5%"></div></div>
        
        <div id="questionArea"></div>
        
        <div class="result" id="result">
            <h2>🎉 第15轮复习完成！</h2>
            <div class="result-score"><span id="finalScore">0</span> / 20</div>
            <p>正确率: <span id="accuracy">0</span>%</p>
            <p style="margin: 16px 0; color: #666;">请复制以下结果码发回飞书：</p>
            <div class="result-code" id="resultCode"></div>
            <button class="copy-btn" onclick="copyResult()">📋 复制结果码</button>
        </div>
    </div>

    <script>
        const wordBank = {
            "suboptimal": "次优的，不理想的",
            "toughness": "坚韧，强硬",
            "underway": "进行中的",
            "unsupervised": "无人监管的",
            "obscure": "模糊的，不为人知的",
            "momentum": "势头，动力",
            "cropped up": "突然出现，冒出来",
            "pervasive": "普遍的，无处不在的",
            "meteoric": "迅速的，流星般的",
            "fringe": "边缘的，非主流的",
            "warp": "极快的速度",
            "ubiquitous": "无处不在的，普遍存在的",
            "nonsensical": "荒谬的，无意义的",
            "rebellious": "叛逆的，反抗的",
            "opaque": "晦涩难懂的，不透明的",
            "formation": "形成，构成",
            "affiliation": "归属，从属关系",
            "itinerants": "流动人员，流浪者",
            "shorthand": "简写，速记",
            "jargon": "行话，术语"
        };

        const questions = [
            { word: "suboptimal", meaning: "次优的，不理想的", sentence: "Researchers are examining tilt—strong negative emotions that lead to ______ decisions during games.", answer: "suboptimal", options: ["suboptimal", "meteoric", "fringe", "warp"], translation: "研究人员正在研究情绪失控——强烈的负面情绪导致游戏中的次优决策。" },
            { word: "toughness", meaning: "坚韧，强硬", sentence: "Traditional sport psychology measures, like mental ______, do not significantly predict competitive achievement in esports.", answer: "toughness", options: ["toughness", "momentum", "affiliation", "formation"], translation: "传统的运动心理学指标，如心理坚韧，并不能显著预测电竞的竞技成就。" },
            { word: "underway", meaning: "进行中的", sentence: "A major effort is ______ to develop international mental health guidelines tailored to esports.", answer: "underway", options: ["underway", "underway", "unsupervised", "ubiquitous"], translation: "一项重大努力正在进行中，旨在制定针对电竞的国际心理健康指南。" },
            { word: "unsupervised", meaning: "无人监管的", sentence: "At the same time, if left ______, it can burn you and your house down.", answer: "unsupervised", options: ["unsupervised", "obscure", "pervasive", "nonsensical"], translation: "同时，如果无人监管，它可能会烧毁你和你的房子。" },
            { word: "obscure", meaning: "模糊的，不为人知的", sentence: "Originating from a somewhat ______ rap song in late 2024.", answer: "obscure", options: ["obscure", "pervasive", "ubiquitous", "rebellious"], translation: "起源于2024年底一首颇为冷门的说唱歌曲。" },
            { word: "momentum", meaning: "势头，动力", sentence: "It quickly gained ______ on TikTok and other social media platforms.", answer: "momentum", options: ["momentum", "formation", "affiliation", "shorthand"], translation: "它很快在TikTok和其他社交媒体平台上获得了关注。" },
            { word: "cropped up", meaning: "突然出现，冒出来", sentence: "Evolving into a chant shouted in response whenever the numbers 6 or 7 ______ in casual conversation.", answer: "cropped up", options: ["cropped up", "momentum", "shorthand", "jargon"], translation: "演变成一种口号，每当数字6或7在日常对话中出现时就喊出来。" },
            { word: "pervasive", meaning: "普遍的，无处不在的", sentence: "The phrase has become so ______ that some schools have even banned its use.", answer: "pervasive", options: ["pervasive", "obscure", "fringe", "opaque"], translation: "这个短语已经如此普遍，以至于一些学校甚至禁止使用它。" },
            { word: "meteoric", meaning: "迅速的，流星般的", sentence: "Its ______ rise demonstrates the internet's power to propel fringe terms into the mainstream.", answer: "meteoric", options: ["meteoric", "unsupervised", "cropped up", "itinerants"], translation: "它的迅速崛起展示了互联网将边缘术语推入主流的力量。" },
            { word: "fringe", meaning: "边缘的，非主流的", sentence: "Its meteoric rise demonstrates the internet's power to propel ______ terms into the mainstream.", answer: "fringe", options: ["fringe", "pervasive", "ubiquitous", "nonsensical"], translation: "它的迅速崛起展示了互联网将边缘术语推入主流的力量。" },
            { word: "warp", meaning: "极快的速度", sentence: "Its meteoric rise demonstrates the internet's power to propel fringe terms into the mainstream at ______ speed.", answer: "warp", options: ["warp", "momentum", "formation", "shorthand"], translation: "它的迅速崛起展示了互联网以极快的速度将边缘术语推入主流的力量。" },
            { word: "ubiquitous", meaning: "无处不在的，普遍存在的", sentence: "Describing it as meaningless, ______, and nonsensical while acknowledging its usefulness to young users.", answer: "ubiquitous", options: ["ubiquitous", "obscure", "opaque", "fringe"], translation: "将其描述为无意义、无处不在和荒谬的，同时承认其对年轻用户的有用性。" },
            { word: "nonsensical", meaning: "荒谬的，无意义的", sentence: "Describing it as meaningless, ubiquitous, and ______ while acknowledging its usefulness to young users.", answer: "nonsensical", options: ["nonsensical", "rebellious", "meteoric", "warp"], translation: "将其描述为无意义、无处不在和荒谬的，同时承认其对年轻用户的有用性。" },
            { word: "rebellious", meaning: "叛逆的，反抗的", sentence: "For young people, the appeal lies in its irreverent or ______ qualities while also remaining opaque to adults.", answer: "rebellious", options: ["rebellious", "ubiquitous", "pervasive", "fringe"], translation: "对于年轻人来说，吸引力在于其不敬或叛逆的品质，同时对成年人来说仍然晦涩难懂。" },
            { word: "opaque", meaning: "晦涩难懂的，不透明的", sentence: "For young people, the appeal lies in its irreverent or rebellious qualities while also remaining ______ to adults.", answer: "opaque", options: ["opaque", "obscure", "nonsensical", "cropped up"], translation: "对于年轻人来说，吸引力在于其不敬或叛逆的品质，同时对成年人来说仍然晦涩难懂。" },
            { word: "formation", meaning: "形成，构成", sentence: "It functions as a dynamic social code that can offer insight into the complexity of identity ______ and belonging.", answer: "formation", options: ["formation", "momentum", "warp", "shorthand"], translation: "它作为一个动态的社会代码，可以洞察身份形成和归属感的复杂性。" },
            { word: "affiliation", meaning: "归属，从属关系", sentence: "It serves as lexical metadata that enables listeners to determine the speaker's ______.", answer: "affiliation", options: ["affiliation", "formation", "itinerants", "jargon"], translation: "它作为词汇元数据，使听众能够确定说话者的归属。" },
            { word: "itinerants", meaning: "流动人员，流浪者", sentence: "The word slang originated in the 18th century as speech associated with an underclass of thieves, beggars, and the ______ connected with them.", answer: "itinerants", options: ["itinerants", "affiliation", "formation", "shorthand"], translation: "俚语一词起源于18世纪，作为与下层阶级的小偷、乞丐和与他们有关的流动人员相关的语言。" },
            { word: "shorthand", meaning: "简写，速记", sentence: "That verbal ______ persists in modern professional settings as jargon.", answer: "shorthand", options: ["shorthand", "jargon", "itinerants", "warp"], translation: "这种语言速记在现代专业环境中作为行话持续存在。" },
            { word: "jargon", meaning: "行话，术语", sentence: "That verbal shorthand persists in modern professional settings as ______.", answer: "jargon", options: ["jargon", "shorthand", "itinerants", "formation"], translation: "这种语言速记在现代专业环境中作为行话持续存在。" }
        ];

        let currentIndex = 0;
        let correctCount = 0;
        const results = [];
        let startTime = null;

        function renderQuestion() {
            if (currentIndex === 0 && !startTime) {
                startTime = new Date().toISOString();
            }
            
            const q = questions[currentIndex];
            const area = document.getElementById('questionArea');
            
            area.innerHTML = `
                <div class="question">
                    <div class="question-num">📖 第 ${currentIndex + 1} / ${questions.length} 题</div>
                    <div class="sentence">${q.sentence.replace('______', '<span class="blank">______</span>')}</div>
                    <div class="options" id="options">
                        ${q.options.map((opt, i) => `<div class="option" onclick="selectAndSubmit('${opt}')">${String.fromCharCode(65 + i)}. ${opt}</div>`).join('')}
                    </div>
                    
                    <div class="answer-box" id="answerBox">
                        <div class="answer-title" id="answerTitle"></div>
                        <div class="answer-item">
                            <div class="answer-label">单词</div>
                            <div class="answer-value word-title">${q.word}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">中文释义</div>
                            <div class="answer-value">${q.meaning}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">完整句子</div>
                            <div class="full-sentence">${q.sentence.replace('______', `<span class="answer-word">${q.answer}</span>`)}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">句子翻译</div>
                            <div class="answer-value">${q.translation}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">所有选项释义</div>
                            <div class="options-meaning">
                                ${q.options.map((opt, i) => {
                                    const isCorrect = opt === q.answer;
                                    return `<div class="option-meaning-item ${isCorrect ? 'correct-opt' : ''}">
                                        <span class="option-label">${String.fromCharCode(65 + i)}.</span>
                                        <span class="option-word">${opt}</span>
                                        <span class="option-meaning">- ${wordBank[opt] || '（释义缺失）'}</span>
                                        ${isCorrect ? '<span style="color: #4CAF50; margin-left: 8px;">✓ 正确答案</span>' : ''}
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn next-btn hidden" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
                </div>
            `;
            
            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('progressBar').style.width = `${(currentIndex + 1) / questions.length * 100}%`;
        }

        function selectAndSubmit(option) {
            const q = questions[currentIndex];
            const isCorrect = option === q.answer;
            if (isCorrect) correctCount++;
            
            results.push({ word: q.word, correct: isCorrect });
            
            document.getElementById('correctCount').textContent = correctCount;
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                const optText = opt.textContent.split('. ')[1];
                if (optText === q.answer) {
                    opt.classList.add('correct');
                } else if (optText === option && !isCorrect) {
                    opt.classList.add('wrong');
                }
                opt.onclick = null;
                opt.style.cursor = 'default';
            });
            
            const answerBox = document.getElementById('answerBox');
            const answerTitle = document.getElementById('answerTitle');
            
            if (isCorrect) {
                answerTitle.innerHTML = '✅ 回答正确！';
                answerTitle.className = 'answer-title correct';
            } else {
                answerTitle.innerHTML = '❌ 回答错误';
                answerTitle.className = 'answer-title wrong';
                answerBox.classList.add('wrong-answer');
            }
            
            answerBox.classList.add('show');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const endTime = new Date().toISOString();
            
            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('result').classList.add('show');
            document.getElementById('finalScore').textContent = correctCount;
            document.getElementById('accuracy').textContent = Math.round(correctCount / questions.length * 100);
            
            const resultData = { 
                round: 15, 
                total: questions.length, 
                correct: correctCount, 
                results,
                startTime,
                endTime
            };
            const resultCode = 'ENGRESULT:' + btoa(JSON.stringify(resultData));
            document.getElementById('resultCode').textContent = resultCode;
        }

        function copyResult() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ 已复制！请粘贴到飞书发给我。');
            });
        }

        renderQuestion();
    </script>
</body>
</html>
