<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词复习 - 第20轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 16px; color: #666; }
        .progress { background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 24px; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; border-radius: 8px; transition: width 0.3s; }
        .question { padding: 24px; background: #f8f9fa; border-radius: 12px; margin-bottom: 24px; }
        .question-num { font-weight: bold; color: #667eea; margin-bottom: 16px; font-size: 16px; }
        .sentence { font-size: 18px; line-height: 1.8; margin-bottom: 20px; }
        .blank { color: #667eea; font-weight: bold; text-decoration: underline; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .option:hover { border-color: #667eea; background: #f0f4ff; }
        .option.correct { border-color: #4CAF50; background: #c8e6c9; }
        .option.wrong { border-color: #f44336; background: #ffcdd2; }
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
        .next-btn { background: #4CAF50; color: white; }
        .next-btn:hover { background: #45a049; }
        .answer-box { display: none; padding: 24px; background: #f0f7f0; border-radius: 12px; margin-top: 20px; border-left: 4px solid #4CAF50; }
        .answer-box.show { display: block; }
        .answer-box.wrong-answer { background: #fff5f5; border-left-color: #f44336; }
        .answer-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .answer-title.correct { color: #4CAF50; }
        .answer-title.wrong { color: #f44336; }
        .answer-item { margin-bottom: 16px; line-height: 1.6; }
        .answer-label { color: #666; font-size: 14px; margin-bottom: 4px; }
        .answer-value { font-size: 16px; }
        .word-title { font-size: 20px; font-weight: bold; color: #667eea; }
        .full-sentence { font-size: 16px; line-height: 1.8; color: #333; background: #e8f5e9; padding: 12px; border-radius: 8px; }
        .full-sentence .answer-word { color: #4CAF50; font-weight: bold; text-decoration: underline; }
        .options-meaning { margin-top: 12px; }
        .option-meaning-item { padding: 8px 12px; margin: 6px 0; background: #fff; border-radius: 6px; font-size: 15px; }
        .option-meaning-item.correct-opt { background: #c8e6c9; border-left: 3px solid #4CAF50; }
        .option-label { font-weight: bold; color: #666; margin-right: 8px; }
        .option-word { font-weight: bold; color: #333; }
        .option-meaning { color: #666; margin-left: 8px; }
        .result { display: none; text-align: center; padding: 32px; }
        .result.show { display: block; }
        .result h2 { color: #333; margin-bottom: 16px; }
        .result-score { font-size: 48px; font-weight: bold; color: #667eea; margin: 16px 0; }
        .result-code { background: #333; color: #4CAF50; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 20px 0; font-size: 12px; }
        .copy-btn { padding: 14px 28px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .copy-btn:hover { background: #5a6fd6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 英语单词复习 - 第20轮</h1>
        <p class="subtitle">选择题（4选1）| 全部新词 | 原句出题</p>
        
        <div class="progress-info">
            <span>进度: <span id="currentNum">1</span> / 20</span>
            <span>正确: <span id="correctCount">0</span></span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width: 5%"></div></div>
        
        <div id="questionArea"></div>
        
        <div class="result" id="result">
            <h2>🎉 第20轮复习完成！</h2>
            <div class="result-score"><span id="finalScore">0</span> / 20</div>
            <p>正确率: <span id="accuracy">0</span>%</p>
            <p style="margin: 16px 0; color: #666;">请复制以下结果码发回飞书：</p>
            <div class="result-code" id="resultCode"></div>
            <button class="copy-btn" onclick="copyResult()">📋 复制结果码</button>
        </div>
    </div>

    <script>
        const wordBank = {
            "recruit": "调动，招募，利用",
            "are poised to": "准备好，即将",
            "portals": "门户，平台，入口",
            "bypasses": "绕过，避开",
            "practitioners": "从业者，实践者",
            "underlying": "潜在的，根本的",
            "deferred": "延期的，递延的",
            "frictionless": "无摩擦的，顺畅的",
            "dismantle": "拆除，瓦解，消除",
            "converging technologies": "融合技术，汇聚的技术",
            "rewiring": "重塑，重新连接",
            "exacerbating": "加剧，恶化",
            "precarious": "不稳定的，岌岌可危的",
            "Wearied by years of inflation": "因多年的通货膨胀而疲惫不堪",
            "stagnant": "停滞的，不景气的",
            "pessimism": "悲观情绪，悲观主义",
            "blame": "归咎于，责怪",
            "inflation": "通货膨胀",
            "stopgap": "权宜之计，临时措施",
            "most commonly cited goal": "最常被提及的目标"
        };

        const questions = [
            { word: "recruit", meaning: "调动，招募，利用", sentence: "We can ______ cognitive mechanisms to focus on remembering what is important and interesting.", answer: "recruit", options: ["recruit", "bypasses", "dismantle", "blame"], translation: "我们可以调动认知机制来专注于记住重要和有趣的事情。" },
            { word: "are poised to", meaning: "准备好，即将", sentence: "Clinical psychologists ______ help older adults identify their curiosities and what matters most to them and then take steps to acquire new skills in these areas.", answer: "are poised to", options: ["are poised to", "underlying", "deferred", "stagnant"], translation: "临床心理学家准备好帮助老年人识别他们的好奇心和最重要的事情，然后采取步骤在这些领域获得新技能。" },
            { word: "portals", meaning: "门户，平台，入口", sentence: "Some of these older partners are struggling not only to learn how to support a family member with a neurocognitive disorder, but also to navigate health care ______, telehealth visits, transportation, and other details for the loved one.", answer: "portals", options: ["portals", "practitioners", "stopgap", "inflation"], translation: "这些老年伴侣中的一些人不仅在努力学习如何支持患有神经认知障碍的家庭成员，还要为亲人应对医疗保健门户、远程医疗访问、交通和其他细节。" },
            { word: "bypasses", meaning: "绕过，避开", sentence: "Buy now, pay later financing ______ a number of cognitive and physical barriers to impulse buying, heightening the risk of financial and psychological stress for many people.", answer: "bypasses", options: ["bypasses", "recruit", "dismantle", "blame"], translation: "先买后付融资绕过了许多冲动购物的认知和物理障碍，增加了许多人面临财务和心理压力的风险。" },
            { word: "practitioners", meaning: "从业者，实践者", sentence: "Behavioral scientists and applied ______ can help by continuing to research the real-world impacts of the cognitive mechanisms underlying these behaviors.", answer: "practitioners", options: ["practitioners", "portals", "stopgap", "inflation"], translation: "行为科学家和应用实践者可以通过继续研究这些行为背后的认知机制的现实世界影响来提供帮助。" },
            { word: "underlying", meaning: "潜在的，根本的", sentence: "Behavioral scientists and applied practitioners can help by continuing to research the real-world impacts of the cognitive mechanisms ______ these behaviors.", answer: "underlying", options: ["underlying", "deferred", "stagnant", "frictionless"], translation: "行为科学家和应用实践者可以通过继续研究这些行为背后的认知机制的现实世界影响来提供帮助。" },
            { word: "deferred", meaning: "延期的，递延的", sentence: "A single tap, a purchase made, a payment ______.", answer: "deferred", options: ["deferred", "underlying", "stagnant", "frictionless"], translation: "一次点击，一次购买，一次延期付款。" },
            { word: "frictionless", meaning: "无摩擦的，顺畅的", sentence: "As AI algorithms predict consumers' desires and new ______ payment methods dismantle the traditional pain of paying.", answer: "frictionless", options: ["frictionless", "precarious", "rewiring", "pessimism"], translation: "随着AI算法预测消费者的欲望，新的无摩擦支付方式消除了传统的支付痛苦。" },
            { word: "dismantle", meaning: "拆除，瓦解，消除", sentence: "New frictionless payment methods ______ the traditional pain of paying.", answer: "dismantle", options: ["dismantle", "bypasses", "recruit", "blame"], translation: "新的无摩擦支付方式消除了传统的支付痛苦。" },
            { word: "converging technologies", meaning: "融合技术，汇聚的技术", sentence: "Cognitive psychologists are stepping in to reveal how these ______ are rewiring financial decision-making.", answer: "converging technologies", options: ["converging technologies", "portals", "stopgap", "inflation"], translation: "认知心理学家正在介入，揭示这些融合技术如何重塑财务决策。" },
            { word: "rewiring", meaning: "重塑，重新连接", sentence: "Cognitive psychologists are stepping in to reveal how these converging technologies are ______ financial decision-making.", answer: "rewiring", options: ["rewiring", "exacerbating", "stagnant", "pessimism"], translation: "认知心理学家正在介入，揭示这些融合技术如何重塑财务决策。" },
            { word: "exacerbating", meaning: "加剧，恶化", sentence: "Cognitive psychologists are stepping in to reveal how these converging technologies are rewiring financial decision-making and ______ debt-related mental health concerns.", answer: "exacerbating", options: ["exacerbating", "rewiring", "precarious", "deferred"], translation: "认知心理学家正在介入，揭示这些融合技术如何重塑财务决策并加剧与债务相关的心理健康问题。" },
            { word: "precarious", meaning: "不稳定的，岌岌可危的", sentence: "This work comes at a ______ time.", answer: "precarious", options: ["precarious", "stagnant", "frictionless", "pessimism"], translation: "这项工作正处于一个岌岌可危的时期。" },
            { word: "Wearied by years of inflation", meaning: "因多年的通货膨胀而疲惫不堪", sentence: "______, stagnant income, and elevated personal debt, many Americans believe their finances will worsen in 2026.", answer: "Wearied by years of inflation", options: ["Wearied by years of inflation", "exacerbating", "rewiring", "deferred"], translation: "因多年的通货膨胀、停滞的收入和高企的个人债务而疲惫不堪，许多美国人认为他们的财务状况将在2026年恶化。" },
            { word: "stagnant", meaning: "停滞的，不景气的", sentence: "Wearied by years of inflation, ______ income, and elevated personal debt, many Americans believe their finances will worsen in 2026.", answer: "stagnant", options: ["stagnant", "precarious", "frictionless", "pessimism"], translation: "因多年的通货膨胀、停滞的收入和高企的个人债务而疲惫不堪，许多美国人认为他们的财务状况将在2026年恶化。" },
            { word: "pessimism", meaning: "悲观情绪，悲观主义", sentence: "A 2025 Bankrate survey found that ______ about personal finances is at the highest level since 2018.", answer: "pessimism", options: ["pessimism", "stagnant", "precarious", "frictionless"], translation: "2025年Bankrate调查发现，对个人财务的悲观情绪处于2018年以来的最高水平。" },
            { word: "blame", meaning: "归咎于，责怪", sentence: "A 2025 Bankrate survey found that pessimism about personal finances is at the highest level since 2018, with price increases primarily to ______.", answer: "blame", options: ["blame", "recruit", "bypasses", "dismantle"], translation: "2025年Bankrate调查发现，对个人财务的悲观情绪处于2018年以来的最高水平，价格上升是主要原因。" },
            { word: "inflation", meaning: "通货膨胀", sentence: "A Gallup survey published in April 2025 found similar attitudes, with nearly 30% of Americans reporting that ______ is the most important financial problem facing their family today.", answer: "inflation", options: ["inflation", "portals", "practitioners", "stopgap"], translation: "2025年4月发布的盖洛普调查发现类似的态度，近30%的美国人报告通货膨胀是他们的家庭今天面临的最重要财务问题。" },
            { word: "stopgap", meaning: "权宜之计，临时措施", sentence: "As a result, debt has shifted from a ______ to a way of life for many people.", answer: "stopgap", options: ["stopgap", "inflation", "portals", "practitioners"], translation: "结果，债务已从权宜之计转变为许多人的生活方式。" },
            { word: "most commonly cited goal", meaning: "最常被提及的目标", sentence: "As a result, debt has shifted from a stopgap to a way of life for many people, with paying down debt the ______ in the Bankrate survey.", answer: "most commonly cited goal", options: ["most commonly cited goal", "stopgap", "inflation", "portals"], translation: "结果，债务已从权宜之计转变为许多人的生活方式，偿还债务成为Bankrate调查中最常被提及的目标。" }
        ];

        let currentIndex = 0;
        let correctCount = 0;
        const results = [];
        let startTime = null;

        function renderQuestion() {
            if (currentIndex === 0 && !startTime) {
                startTime = new Date().toISOString();
            }
            
            const q = questions[currentIndex];
            const area = document.getElementById('questionArea');
            
            area.innerHTML = `
                <div class="question">
                    <div class="question-num">📖 第 ${currentIndex + 1} / ${questions.length} 题</div>
                    <div class="sentence">${q.sentence.replace('______', '<span class="blank">______</span>')}</div>
                    <div class="options" id="options">
                        ${q.options.map((opt, i) => `<div class="option" onclick="selectAndSubmit('${opt}')">${String.fromCharCode(65 + i)}. ${opt}</div>`).join('')}
                    </div>
                    
                    <div class="answer-box" id="answerBox">
                        <div class="answer-title" id="answerTitle"></div>
                        <div class="answer-item">
                            <div class="answer-label">单词</div>
                            <div class="answer-value word-title">${q.word}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">中文释义</div>
                            <div class="answer-value">${q.meaning}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">完整句子</div>
                            <div class="full-sentence">${q.sentence.replace('______', `<span class="answer-word">${q.answer}</span>`)}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">句子翻译</div>
                            <div class="answer-value">${q.translation}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">所有选项释义</div>
                            <div class="options-meaning">
                                ${q.options.map((opt, i) => {
                                    const isCorrect = opt === q.answer;
                                    return `<div class="option-meaning-item ${isCorrect ? 'correct-opt' : ''}">
                                        <span class="option-label">${String.fromCharCode(65 + i)}.</span>
                                        <span class="option-word">${opt}</span>
                                        <span class="option-meaning">- ${wordBank[opt] || '（释义缺失）'}</span>
                                        ${isCorrect ? '<span style="color: #4CAF50; margin-left: 8px;">✓ 正确答案</span>' : ''}
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn next-btn hidden" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
                </div>
            `;
            
            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('progressBar').style.width = `${(currentIndex + 1) / questions.length * 100}%`;
        }

        function selectAndSubmit(option) {
            const q = questions[currentIndex];
            const isCorrect = option === q.answer;
            if (isCorrect) correctCount++;
            
            results.push({ word: q.word, correct: isCorrect });
            
            document.getElementById('correctCount').textContent = correctCount;
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                const optText = opt.textContent.split('. ')[1];
                if (optText === q.answer) {
                    opt.classList.add('correct');
                } else if (optText === option && !isCorrect) {
                    opt.classList.add('wrong');
                }
                opt.onclick = null;
                opt.style.cursor = 'default';
            });
            
            const answerBox = document.getElementById('answerBox');
            const answerTitle = document.getElementById('answerTitle');
            
            if (isCorrect) {
                answerTitle.innerHTML = '✅ 回答正确！';
                answerTitle.className = 'answer-title correct';
            } else {
                answerTitle.innerHTML = '❌ 回答错误';
                answerTitle.className = 'answer-title wrong';
                answerBox.classList.add('wrong-answer');
            }
            
            answerBox.classList.add('show');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const endTime = new Date().toISOString();
            
            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('result').classList.add('show');
            document.getElementById('finalScore').textContent = correctCount;
            document.getElementById('accuracy').textContent = Math.round(correctCount / questions.length * 100);
            
            const resultData = { 
                round: 20, 
                total: questions.length, 
                correct: correctCount, 
                results,
                startTime,
                endTime
            };
            const resultCode = 'ENGRESULT:' + btoa(JSON.stringify(resultData));
            document.getElementById('resultCode').textContent = resultCode;
        }

        function copyResult() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ 已复制！请粘贴到飞书发给我。');
            });
        }

        renderQuestion();
    </script>
</body>
</html>
