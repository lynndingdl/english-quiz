<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词测验 - 第8轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .progress { font-size: 14px; color: #666; margin-bottom: 16px; }
        .word { font-size: 32px; font-weight: bold; text-align: center; margin: 20px 0; color: #333; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 16px 20px; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-size: 18px; text-align: center; }
        .option:hover { border-color: #667eea; background: #f5f5ff; }
        .option.correct { background: #d4edda; border-color: #28a745; }
        .option.wrong { background: #f8d7da; border-color: #dc3545; }
        .result { text-align: center; padding: 20px; border-radius: 12px; margin: 20px 0; }
        .result.correct { background: #d4edda; color: #155724; }
        .result.wrong { background: #f8d7da; color: #721c24; }
        .result-word { font-size: 24px; font-weight: bold; margin-bottom: 8px; }
        .result-meaning { font-size: 18px; color: #666; margin-bottom: 16px; }
        .example { background: #f8f9fa; padding: 16px; border-radius: 8px; margin: 16px 0; text-align: left; }
        .example-sentence { font-size: 16px; line-height: 1.6; }
        .highlight { background: #fff3cd; padding: 2px 4px; border-radius: 4px; }
        .options-list { text-align: left; margin-top: 16px; }
        .options-list li { padding: 8px 0; border-bottom: 1px solid #eee; }
        .options-list li:last-child { border-bottom: none; }
        .correct-mark { color: #28a745; font-weight: bold; }
        .next-btn { width: 100%; padding: 16px; background: #667eea; color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        .next-btn:hover { background: #5568d3; }
        .result-code { background: #f0f0f0; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="quiz-card">
            <div class="progress" id="progress">第1题 / 100</div>
            <div class="word" id="question-word">limelight</div>
            <div class="options" id="options"></div>
        </div>
        <div class="card hidden" id="result-card">
            <div class="result" id="result-banner">
                <div class="result-word" id="result-word"></div>
                <div class="result-meaning" id="result-meaning"></div>
            </div>
            <div class="example">
                <div class="example-sentence" id="example-sentence"></div>
            </div>
            <ul class="options-list" id="options-list"></ul>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一题</button>
        </div>
        <div class="card hidden" id="finish-card">
            <h2>🎉 完成！</h2>
            <p id="score-text"></p>
            <p>请复制以下结果码发送给我：</p>
            <div class="result-code" id="result-code"></div>
        </div>
    </div>

    <script>
    const vocabData = [
        {"word": "limelight", "meaning": "聚光灯；公众瞩目的中心", "pos": "n.", "sentence": "The actor was in the limelight after the successful performance."},
        {"word": "lineage", "meaning": "血统；世系", "pos": "n.", "sentence": "She traced her lineage back to the 18th century."},
        {"word": "masterpiece", "meaning": "杰作", "pos": "n.", "sentence": "The painting is considered a masterpiece of Renaissance art."},
        {"word": "mastery", "meaning": "掌握；精通", "pos": "n.", "sentence": "His mastery of the language impressed everyone."},
        {"word": "materialism", "meaning": "唯物主义；享乐主义", "pos": "n.", "sentence": "Modern society is often criticized for its materialism."},
        {"word": "maturity", "meaning": "成熟", "pos": "n.", "sentence": "The wine improves with maturity."},
        {"word": "meager", "meaning": "贫乏的；瘦的", "pos": "adj.", "sentence": "They survived on a meager diet."},
        {"word": "measurable", "meaning": "可测量的；显著的", "pos": "adj.", "sentence": "There has been a measurable improvement in his condition."},
        {"word": "mechanic", "meaning": "技工", "pos": "n.", "sentence": "The mechanic fixed the car quickly."},
        {"word": "mediate", "meaning": "调解；居中", "pos": "v.", "sentence": "The teacher mediated the conflict between the students."},
        {"word": "medication", "meaning": "药物治疗；药物", "pos": "n.", "sentence": "She takes medication for her allergies."},
        {"word": "medicine", "meaning": "医学；内服药", "pos": "n.", "sentence": "Modern medicine has advanced greatly."},
        {"word": "medieval", "meaning": "中世纪的", "pos": "adj.", "sentence": "The castle dates back to medieval times."},
        {"word": "mediocre", "meaning": "平庸的", "pos": "adj.", "sentence": "The food was mediocre at best."},
        {"word": "meditate", "meaning": "沉思；冥想", "pos": "v.", "sentence": "She meditates for twenty minutes every morning."},
        {"word": "membrane", "meaning": "膜", "pos": "n.", "sentence": "The cell membrane protects the cell."},
        {"word": "memorable", "meaning": "值得纪念的", "pos": "adj.", "sentence": "It was a memorable experience for all of us."},
        {"word": "memorandum", "meaning": "备忘录", "pos": "n.", "sentence": "Please read the memorandum carefully."},
        {"word": "memorial", "meaning": "纪念碑；纪念的", "pos": "n./adj.", "sentence": "They built a memorial to honor the soldiers."},
        {"word": "menace", "meaning": "威胁", "pos": "v./n.", "sentence": "The storm posed a menace to the coastal villages."},
        {"word": "mentality", "meaning": "心理；心态", "pos": "n.", "sentence": "She has a positive mentality toward life."},
        {"word": "merchandise", "meaning": "商品；买卖", "pos": "n./v.", "sentence": "The store merchandise is displayed in the window."},
        {"word": "merciful", "meaning": "仁慈的", "pos": "adj.", "sentence": "The judge was merciful in his sentencing."},
        {"word": "merely", "meaning": "仅仅", "pos": "adv.", "sentence": "It is merely a suggestion, not a requirement."},
        {"word": "merge", "meaning": "合并", "pos": "v.", "sentence": "The two companies decided to merge."},
        {"word": "merit", "meaning": "优点；功劳", "pos": "n./v.", "sentence": "The proposal has considerable merit."},

        {"word": "metaphor", "meaning": "暗喻", "pos": "n.", "sentence": "She used a metaphor to describe her feelings."},
        {"word": "meticulous", "meaning": "细心的；极注意细节的", "pos": "adj.", "sentence": "He is meticulous about his work."},
        {"word": "metric", "meaning": "公制的", "pos": "adj.", "sentence": "The metric system is used in most countries."},
        {"word": "metropolis", "meaning": "大都市", "pos": "n.", "sentence": "Tokyo is a bustling metropolis."},
        {"word": "microscope", "meaning": "显微镜", "pos": "n.", "sentence": "Scientists use a microscope to observe cells."},
        {"word": "midst", "meaning": "中间", "pos": "n.", "sentence": "In the midst of the forest, they found a cabin."},
        {"word": "migrate", "meaning": "迁移；移居", "pos": "v.", "sentence": "Birds migrate south in winter."},
        {"word": "militant", "meaning": "好战的", "pos": "adj.", "sentence": "The militant group claimed responsibility."},
        {"word": "military", "meaning": "军事的", "pos": "adj.", "sentence": "He served in the military for five years."},
        {"word": "millennium", "meaning": "一千年", "pos": "n.", "sentence": "The new millennium began in 2000."},
        {"word": "mimic", "meaning": "模仿", "pos": "v.", "sentence": "The child mimics his father's gestures."},
        {"word": "miniature", "meaning": "微型的；缩影", "pos": "adj./n.", "sentence": "She collects miniature dolls."},
        {"word": "minimum", "meaning": "最小值", "pos": "adj./n.", "sentence": "The minimum age for voting is 18."},
        {"word": "minister", "meaning": "部长；大臣", "pos": "n.", "sentence": "The Minister of Education announced new policies."},
        {"word": "ministry", "meaning": "（政府的）部", "pos": "n.", "sentence": "She works at the Ministry of Health."},
        {"word": "minority", "meaning": "少数；少数民族", "pos": "n.", "sentence": "Minority groups deserve equal rights."},
        {"word": "miraculous", "meaning": "奇迹般的", "pos": "adj.", "sentence": "Her recovery was miraculous."},
        {"word": "miscarriage", "meaning": "流产；失败", "pos": "n.", "sentence": "The project ended in a miscarriage."},
        {"word": "mischievous", "meaning": "顽皮的；有害的", "pos": "adj.", "sentence": "The mischievous child broke the window."},
        {"word": "miserable", "meaning": "痛苦的；可怜的", "pos": "adj.", "sentence": "She felt miserable after the bad news."},
        {"word": "misery", "meaning": "苦难", "pos": "n.", "sentence": "The war brought great misery to the people."},
        {"word": "mislead", "meaning": "误导", "pos": "v.", "sentence": "The advertisement misled consumers."},
        {"word": "missionary", "meaning": "传教士", "pos": "n.", "sentence": "The missionary traveled to remote areas."},
        {"word": "mistaken", "meaning": "错误的", "pos": "adj.", "sentence": "I was mistaken about his intentions."},
        {"word": "mitigate", "meaning": "减轻；缓和", "pos": "v.", "sentence": "Measures were taken to mitigate the effects."},
        {"word": "mixture", "meaning": "混合物", "pos": "n.", "sentence": "The mixture of colors created a beautiful effect."},
        {"word": "mobilize", "meaning": "动员", "pos": "v.", "sentence": "The government mobilized resources for relief."},
        {"word": "moderate", "meaning": "适度的；温和的；缓和", "pos": "adj./v.", "sentence": "We need moderate temperatures for the experiment."},
        {"word": "modest", "meaning": "谦虚的；适度的", "pos": "adj.", "sentence": "She remained modest despite her success."},
        {"word": "modesty", "meaning": "谦虚", "pos": "n.", "sentence": "His modesty made him popular."},
        {"word": "modification", "meaning": "修改", "pos": "n.", "sentence": "The modification was approved by the committee."},
        {"word": "moist", "meaning": "潮湿的", "pos": "adj.", "sentence": "The air is moist near the river."},
        {"word": "moisture", "meaning": "水分；湿度", "pos": "n.", "sentence": "The moisture in the air caused problems."},
        {"word": "molecule", "meaning": "分子", "pos": "n.", "sentence": "A water molecule consists of two hydrogen atoms."},
        {"word": "momentary", "meaning": "瞬间的", "pos": "adj.", "sentence": "There was a momentary pause in the conversation."},
        {"word": "monetary", "meaning": "货币的；金融的", "pos": "adj.", "sentence": "The monetary policy was adjusted."},
        {"word": "monopoly", "meaning": "垄断", "pos": "n.", "sentence": "The company has a monopoly on the product."},
        {"word": "monotonous", "meaning": "单调的", "pos": "adj.", "sentence": "The work became monotonous after a while."},
        {"word": "monotony", "meaning": "单调；枯燥", "pos": "n.", "sentence": "She hated the monotony of daily routine."},
        {"word": "monument", "meaning": "纪念碑；历史遗迹", "pos": "n.", "sentence": "The monument commemorates the historic event."},
        {"word": "moral", "meaning": "道德的；寓意", "pos": "adj./n.", "sentence": "The moral of the story is clear."},
        {"word": "morale", "meaning": "士气", "pos": "n.", "sentence": "The victory boosted the team's morale."},
        {"word": "morality", "meaning": "道德", "pos": "n.", "sentence": "Questions of morality are often debated."},
        {"word": "mortal", "meaning": "致命的；凡人", "pos": "adj./n.", "sentence": "All mortals will face death someday."},
        {"word": "mortality", "meaning": "死亡率", "pos": "n.", "sentence": "The mortality rate has decreased significantly."},
        {"word": "mortgage", "meaning": "抵押", "pos": "n./v.", "sentence": "They paid off their mortgage after 20 years."},
        {"word": "mosquito", "meaning": "蚊子", "pos": "n.", "sentence": "The mosquito transmitted the disease."},
        {"word": "motif", "meaning": "主题；动机", "pos": "n.", "sentence": "The musical motif appears throughout the piece."},
        {"word": "motivate", "meaning": "激励；激发", "pos": "v.", "sentence": "The coach motivated the team to win."},
        {"word": "motorway", "meaning": "高速公路", "pos": "n.", "sentence": "The motorway was closed due to the accident."},
        {"word": "mould", "meaning": "模具；性格；塑造", "pos": "n./v.", "sentence": "The mould shaped the clay into a beautiful vase."},
        {"word": "mount", "meaning": "登上；增长；山峰", "pos": "v./n.", "sentence": "They plan to mount the expedition next month."},
        {"word": "mourn", "meaning": "哀悼", "pos": "v.", "sentence": "The family mourned the loss of their loved one."},
        {"word": "multidisciplinary", "meaning": "多学科的", "pos": "adj.", "sentence": "The team takes a multidisciplinary approach."},
        {"word": "multigenerational", "meaning": "多代人的；代际的", "pos": "adj.", "sentence": "The family live in a multigenerational household."},
        {"word": "multimedia", "meaning": "多媒体", "pos": "n.", "sentence": "The presentation uses multimedia elements."},
        {"word": "multiple", "meaning": "多样的；复合的", "pos": "adj.", "sentence": "She has multiple sclerosis."},
        {"word": "multiply", "meaning": "乘；繁殖；增加", "pos": "v.", "sentence": "The bacteria multiply rapidly."},
        {"word": "multitude", "meaning": "大量", "pos": "n.", "sentence": "A multitude of people attended the concert."},
        {"word": "municipal", "meaning": "市政的；地方自治的", "pos": "adj.", "sentence": "The municipal government provides services."},
        {"word": "muscular", "meaning": "肌肉的；强壮的", "pos": "adj.", "sentence": "He has a muscular build from years of training."},
        {"word": "mutual", "meaning": "相互的；共同的", "pos": "adj.", "sentence": "They have a mutual respect for each other."},
        {"word": "myriad", "meaning": "无数的", "pos": "adj.", "sentence": "Myriad stars filled the night sky."},
        {"word": "naked", "meaning": "裸体的；明显的", "pos": "adj.", "sentence": "The naked truth was hard to accept."},
        {"word": "namely", "meaning": "即；也就是", "pos": "adv.", "sentence": "Only one student passed, namely John."},
        {"word": "nasty", "meaning": "令人厌恶的；下流的", "pos": "adj.", "sentence": "The weather turned nasty in the afternoon."},
        {"word": "nationality", "meaning": "国籍；民族", "pos": "n.", "sentence": "What is your nationality?"},
        {"word": "native", "meaning": "本地的；天赋的", "pos": "adj.", "sentence": "She is a native speaker of English."},
        {"word": "nature", "meaning": "自然；性质；本性", "pos": "n.", "sentence": "It's in human nature to seek knowledge."},
        {"word": "naughty", "meaning": "淘气的", "pos": "adj.", "sentence": "The naughty boy hid his sister's toys."},
        {"word": "naval", "meaning": "海军的", "pos": "adj.", "sentence": "He served in the naval forces."},
        {"word": "navigate", "meaning": "航行；导航", "pos": "v.", "sentence": "The captain navigated the ship through the storm."}
    ];

    // 按词性分组用于生成干扰选项
    const nouns = vocabData.filter(w => w.pos.includes('n.')).map(w => ({word: w.word, meaning: w.meaning}));
    const adjectives = vocabData.filter(w => w.pos.includes('adj.')).map(w => ({word: w.word, meaning: w.meaning}));
    const verbs = vocabData.filter(w => w.pos.includes('v.')).map(w => ({word: w.word, meaning: w.meaning}));
    const adverbs = vocabData.filter(w => w.pos.includes('adv.')).map(w => ({word: w.word, meaning: w.meaning}));

    let currentIndex = 0;
    let results = [];
    let startTime = null;

    function getDistractors(correctWord, pos) {
        let pool;
        if (pos.includes('n.') && !pos.includes('adj.')) pool = nouns;
        else if (pos.includes('adj.')) pool = adjectives;
        else if (pos.includes('v.')) pool = verbs;
        else if (pos.includes('adv.')) pool = adverbs;
        else pool = nouns;

        const others = pool.filter(w => w.word !== correctWord);
        const shuffled = others.sort(() => Math.random() - 0.5).slice(0, 3);
        const options = [...shuffled, {word: vocabData.find(v => v.word === correctWord).word, meaning: vocabData.find(v => v.word === correctWord).meaning}];
        return options.sort(() => Math.random() - 0.5);
    }

    function showQuestion() {
        if (currentIndex >= vocabData.length) {
            showFinish();
            return;
        }

        const wordData = vocabData[currentIndex];
        document.getElementById('progress').textContent = `第${currentIndex + 1}题 / ${vocabData.length}`;
        document.getElementById('question-word').textContent = wordData.word;

        const options = getDistractors(wordData.word, wordData.pos);
        const optionsHtml = options.map((opt, i) => 
            `<div class="option" onclick="checkAnswer('${opt.word}', '${wordData.word}', '${opt.meaning}', '${wordData.meaning}', this)">${opt.meaning}</div>`
        ).join('');
        document.getElementById('options').innerHTML = optionsHtml;

        document.getElementById('quiz-card').classList.remove('hidden');
        document.getElementById('result-card').classList.add('hidden');
    }

    function checkAnswer(selectedWord, correctWord, selectedMeaning, correctMeaning, element) {
        const isCorrect = selectedWord === correctWord;
        results.push({word: correctWord, correct: isCorrect});

        const options = element.parentElement.children;
        for (let opt of options) {
            const meaning = opt.textContent;
            if (vocabData.find(w => w.meaning === meaning)?.word === correctWord) {
                opt.classList.add('correct');
            } else if (opt === element && !isCorrect) {
                opt.classList.add('wrong');
            }
        }

        setTimeout(() => showResult(selectedWord, correctWord, isCorrect), 500);
    }

    function showResult(selectedWord, correctWord, isCorrect) {
        const wordData = vocabData.find(v => v.word === correctWord);
        const banner = document.getElementById('result-banner');
        banner.className = 'result ' + (isCorrect ? 'correct' : 'wrong');
        banner.innerHTML = isCorrect ? '✅ 正确！' : '❌ 错误！';

        document.getElementById('result-word').textContent = wordData.word;
        document.getElementById('result-meaning').textContent = wordData.meaning;

        // 高亮句子中的正确答案
        const highlightedSentence = wordData.sentence.replace(
            new RegExp(`\\b${wordData.word}\\b`, 'gi'),
            `<span class="highlight">${wordData.word}</span>`
        );
        document.getElementById('example-sentence').innerHTML = `<strong>例句：</strong>${highlightedSentence}`;

        // 显示所有选项
        let pool;
        if (wordData.pos.includes('n.') && !wordData.pos.includes('adj.')) pool = nouns;
        else if (wordData.pos.includes('adj.')) pool = adjectives;
        else if (wordData.pos.includes('v.')) pool = verbs;
        else if (wordData.pos.includes('adv.')) pool = adverbs;
        else pool = nouns;

        const others = pool.filter(w => w.word !== correctWord);
        const allOptions = [...others.sort(() => Math.random() - 0.5).slice(0, 3), {word: wordData.word, meaning: wordData.meaning}];
        const shuffledOptions = allOptions.sort(() => Math.random() - 0.5);

        const optionsHtml = shuffledOptions.map(opt => {
            const isCorrect = opt.word === correctWord;
            return `<li>${isCorrect ? '<span class="correct-mark">✓ </span>' : ''}${opt.word} - ${opt.meaning}</li>`;
        }).join('');
        document.getElementById('options-list').innerHTML = optionsHtml;

        document.getElementById('quiz-card').classList.add('hidden');
        document.getElementById('result-card').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        showQuestion();
    }

    function showFinish() {
        const correct = results.filter(r => r.correct).length;
        const incorrect = results.length - correct;

        document.getElementById('score-text').textContent = `你答对了 ${correct} 题，答错了 ${incorrect} 题`;

        const endTime = new Date().toISOString();
        const resultStr = `8|${correct}|${incorrect}|${startTime}|${endTime}|` + results.map(r => `${r.word}:${r.correct}`).join(',');
        document.getElementById('result-code').textContent = resultStr;

        document.getElementById('quiz-card').classList.add('hidden');
        document.getElementById('result-card').classList.add('hidden');
        document.getElementById('finish-card').classList.remove('hidden');
    }

    startTime = new Date().toISOString();
    showQuestion();
    </script>
</body>
</html>
