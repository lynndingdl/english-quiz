<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第23轮英语单词复习 - 50题</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 32px; max-width: 600px; width: 100%; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .title { font-size: 22px; font-weight: 700; color: #333; }
    .progress { font-size: 14px; color: #666; background: #f0f0f0; padding: 6px 14px; border-radius: 20px; }
    .question-box { background: #f8f9fa; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .sentence { font-size: 18px; line-height: 1.8; color: #333; word-break: break-word; }
    .blank { display: inline-block; background: #4a90d9; color: white; padding: 2px 12px; border-radius: 4px; min-width: 80px; text-align: center; font-weight: 600; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; cursor: pointer; transition: all 0.2s; background: white; text-align: left; }
    .option:hover:not(.disabled) { border-color: #4a90d9; background: #f0f7ff; }
    .option.correct { border-color: #28a745; background: #d4edda; color: #155724; }
    .option.wrong { border-color: #dc3545; background: #f8d7da; color: #721c24; }
    .option.disabled { cursor: default; opacity: 0.7; }
    .option.disabled.correct { opacity: 1; }
    .hidden { display: none; }
    .result-box { text-align: center; }
    .result-icon { font-size: 64px; margin-bottom: 16px; }
    .result-word { font-size: 28px; font-weight: 700; color: #333; margin-bottom: 8px; }
    .result-meaning { font-size: 16px; color: #666; margin-bottom: 20px; }
    .result-sentence { font-size: 17px; line-height: 1.7; color: #333; margin-bottom: 12px; word-break: break-word; }
    .result-sentence .highlight { background: #fff3cd; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
    .result-cn { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.6; }
    .options-review { text-align: left; margin-bottom: 20px; }
    .options-review-title { font-size: 14px; color: #666; margin-bottom: 10px; }
    .option-review { padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; font-size: 15px; background: #f0f0f0; }
    .option-review.correct { background: #d4edda; color: #155724; }
    .option-review .check { margin-right: 6px; }
    .btn { display: inline-block; padding: 14px 32px; background: #4a90d9; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #3a7bc8; }
    .speaker-btn { background: none; border: none; cursor: pointer; font-size: 20px; padding: 8px; margin-bottom: 16px; }
    .end-screen { text-align: center; }
    .end-title { font-size: 26px; font-weight: 700; color: #333; margin-bottom: 20px; }
    .end-stats { font-size: 18px; color: #666; margin-bottom: 24px; line-height: 1.8; }
    .end-stats strong { color: #4a90d9; }
    .copy-btn { background: #28a745; margin-right: 12px; }
    .copy-btn:hover { background: #218838; }
  </style>
</head>
<body>
  <div class="container">
    <div id="quiz">
      <div class="header">
        <div class="title">📝 第23轮英语单词复习</div>
        <div class="progress" id="progress">1/50</div>
      </div>
      <div class="question-box">
        <div class="sentence" id="sentence"></div>
      </div>
      <div class="options" id="options"></div>
    </div>
    <div id="result" class="hidden">
      <div class="result-box">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-word" id="resultWord"></div>
        <div class="result-meaning" id="resultMeaning"></div>
        <button class="speaker-btn" id="speakerBtn" title="播放发音">🔊</button>
        <div class="result-sentence" id="resultSentence"></div>
        <div class="result-cn" id="resultCn"></div>
        <div class="options-review" id="optionsReview"></div>
        <div>
          <button class="btn" id="nextBtn">下一题</button>
        </div>
      </div>
    </div>
    <div id="endScreen" class="hidden end-screen">
      <div class="end-title">🎉 测验完成！</div>
      <div class="end-stats" id="endStats"></div>
      <div>
        <button class="btn copy-btn" id="copyBtn">复制结果码</button>
        <button class="btn" id="restartBtn">重新开始</button>
      </div>
    </div>
  </div>
<script>

  {"word": "catalog", "meaning": "目录；为……编目", "pos": "n./v.", "sentence": "The library catalog is now available online, making it easier for students to find books.", "sentenceCn": "图书馆目录现在可以在网上访问，让学生更容易找到书籍。"},

  {"word": "democracy", "meaning": "民主；民主国家", "pos": "n.", "sentence": "Democracy gives citizens the right to participate in decisions that affect their lives.", "sentenceCn": "民主赋予公民参与影响他们生活的决策的权利。"},
  {"word": "demolish", "meaning": "拆除；推翻；破坏", "pos": "v.", "sentence": "The city plans to demolish the old factory to make way for a modern shopping center.", "sentenceCn": "该市计划拆除旧工厂，为建设现代化购物中心让路。"},
  {"word": "dense", "meaning": "密集的；浓厚的", "pos": "adj.", "sentence": "The dense fog reduced visibility on the highway to less than 50 meters.", "sentenceCn": "浓雾将高速公路上的能见度降低到不足50米。"},
  {"word": "deny", "meaning": "否认；拒绝给予", "pos": "v.", "sentence": "Despite mounting evidence, he continued to deny any involvement in the scandal.", "sentenceCn": "尽管证据越来越多，他仍继续否认参与这起丑闻。"}

// Initialize AudioContext early for speech synthesis
let audioContext = null;
window.speechSynthesis.cancel();

// Ensure AudioContext resumes on first user interaction
document.addEventListener('click', function initAudio() {
    if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
    }
}, { once: true });

let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let results = {};
let startTime = new Date();
let currentOptions = [];
let selectedAnswer = null;
let answered = false;

function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function getActualWord(item) {
    return item.actualWord || item.word;
}

function getDisplayWord(item) {
    return item.actualWord ? item.word : item.word;
}

function generateOptions(correctItem) {
    const options = [];
    const correctWord = getActualWord(correctItem);
    options.push({ word: correctWord, meaning: correctItem.meaning, isCorrect: true });
    
    const otherWords = vocabData
        .filter(item => getActualWord(item) !== correctWord)
        .map(item => ({ word: getActualWord(item), meaning: item.meaning, isCorrect: false }));
    
    const shuffled = shuffle(otherWords).slice(0, 3);
    options.push(...shuffled);
    
    return shuffle(options);
}

function speakWord(word) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = 'en-US';
    utterance.rate = 0.8;
    utterance.pitch = 1;
    window.speechSynthesis.speak(utterance);
}

function displayQuestion() {
    const item = vocabData[currentIndex];
    const actualWord = getActualWord(item);
    const sentence = item.sentence;
    
    // Create blank by replacing the actual word
    const regex = new RegExp('\\b' + actualWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
    const displaySentence = sentence.replace(regex, '<span class="blank">_______</span>');
    
    document.getElementById('sentence').innerHTML = displaySentence;
    document.getElementById('progress').textContent = `${currentIndex + 1}/50`;
    
    currentOptions = generateOptions(item);
    const optionsContainer = document.getElementById('options');
    optionsContainer.innerHTML = '';
    
    currentOptions.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = opt.word;
        btn.dataset.index = idx;
        btn.addEventListener('click', () => selectOption(idx));
        optionsContainer.appendChild(btn);
    });
    
    document.getElementById('quiz').classList.remove('hidden');
    document.getElementById('result').classList.add('hidden');
    document.getElementById('endScreen').classList.add('hidden');
    
    answered = false;
    selectedAnswer = null;
}

function selectOption(index) {
    if (answered) return;
    answered = true;
    
    const item = vocabData[currentIndex];
    const correctWord = getActualWord(item);
    selectedAnswer = index;
    
    // Immediately speak the correct answer
    speakWord(correctWord);
    
    const isCorrect = currentOptions[index].isCorrect;
    if (isCorrect) {
        correctCount++;
    } else {
        wrongCount++;
    }
    results[currentIndex] = isCorrect;
    
    // Disable all options
    const buttons = document.querySelectorAll('.option');
    buttons.forEach((btn, idx) => {
        btn.classList.add('disabled');
        if (currentOptions[idx].isCorrect) {
            btn.classList.add('correct');
        } else if (idx === index && !isCorrect) {
            btn.classList.add('wrong');
        }
    });
    
    setTimeout(() => showResult(isCorrect), 300);
}

function showResult(isCorrect) {
    const item = vocabData[currentIndex];
    const correctWord = getActualWord(item);
    
    document.getElementById('quiz').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');
    
    document.getElementById('resultIcon').textContent = isCorrect ? '✅' : '❌';
    document.getElementById('resultWord').textContent = correctWord + ' ' + item.pos;
    document.getElementById('resultMeaning').textContent = item.meaning;
    
    // Highlight correct answer in sentence
    const sentence = item.sentence;
    const regex = new RegExp('(' + correctWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    document.getElementById('resultSentence').innerHTML = sentence.replace(regex, '<span class="highlight">$1</span>');
    document.getElementById('resultCn').textContent = item.sentenceCn;
    
    // Options review with both English and Chinese
    const optionsReview = document.getElementById('optionsReview');
    optionsReview.innerHTML = '<div class="options-review-title">选项</div>';
    currentOptions.forEach((opt, idx) => {
        const div = document.createElement('div');
        div.className = 'option-review' + (opt.isCorrect ? ' correct' : '');
        const checkMark = opt.isCorrect ? '✓' : '';
        div.innerHTML = `<span class="check">${checkMark}</span>${opt.word} - ${opt.meaning}`;
        optionsReview.appendChild(div);
    });
    
    // Speaker button for result page
    document.getElementById('speakerBtn').onclick = () => speakWord(correctWord);
    
    // Double保险：确保发音播放
    setTimeout(() => speakWord(correctWord), 100);
}

function showEndScreen() {
    const endTime = new Date();
    const duration = Math.round((endTime - startTime) / 1000);
    const minutes = Math.floor(duration / 60);
    const seconds = duration % 60;
    
    document.getElementById('quiz').classList.add('hidden');
    document.getElementById('result').classList.add('hidden');
    document.getElementById('endScreen').classList.remove('hidden');
    
    document.getElementById('endStats').innerHTML = `
        正确率：<strong>${correctCount}/50</strong><br>
        用时：<strong>${minutes}分${seconds}秒</strong>
    `;
    
    // Generate result code
    const resultCode = `23|${correctCount}|${wrongCount}|${startTime.toISOString()}|${endTime.toISOString()}|${Object.entries(results).map(([k, v]) => `${k}:${v}`).join(',')}`;
    document.getElementById('copyBtn').dataset.code = resultCode;
}

document.getElementById('nextBtn').addEventListener('click', () => {
    currentIndex++;
    if (currentIndex >= vocabData.length) {
        showEndScreen();
    } else {
        displayQuestion();
    }
});

document.getElementById('copyBtn').addEventListener('click', function() {
    const code = this.dataset.code;
    navigator.clipboard.writeText(code).then(() => {
        const original = this.textContent;
        this.textContent = '已复制!';
        setTimeout(() => this.textContent = original, 1500);
    });
});

document.getElementById('restartBtn').addEventListener('click', () => {
    currentIndex = 0;
    correctCount = 0;
    wrongCount = 0;
    results = {};
    startTime = new Date();
    displayQuestion();
});

// Start
displayQuestion();
</script>
