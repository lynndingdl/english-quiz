<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词第4轮例句式测验（最终版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .progress-info {
            color: #666;
            font-size: 16px;
        }
        
        /* 题目页面样式 */
        .question-container {
            margin-bottom: 30px;
        }
        
        .question-number {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .sentence {
            font-size: 20px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .blank {
            display: inline-block;
            min-width: 120px;
            border-bottom: 2px solid #667eea;
            margin: 0 5px;
            text-align: center;
            font-weight: bold;
            color: #667eea;
        }
        
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .option-btn {
            padding: 18px 25px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 500;
        }
        
        .option-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateY(-2px);
        }
        
        .option-btn:active {
            transform: translateY(0);
        }
        
        /* 结果页面样式 */
        .result-page {
            display: none;
            padding: 30px;
            background: white;
            border-radius: 15px;
        }
        
        .result-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .result-icon.correct {
            color: #28a745;
        }
        
        .result-icon.wrong {
            color: #dc3545;
        }
        
        .result-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        
        .result-title.correct {
            color: #28a745;
        }
        
        .result-title.wrong {
            color: #dc3545;
        }
        
        .correct-answer {
            text-align: center;
            font-size: 22px;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .correct-answer .word {
            font-weight: bold;
            color: #667eea;
        }
        
        .correct-answer .pos {
            color: #666;
            font-size: 16px;
            margin-left: 10px;
        }
        
        .full-sentence {
            font-size: 18px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .full-sentence .highlight {
            color: #28a745;
            font-weight: bold;
            background: #d4edda;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .translation {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            padding: 10px 15px;
            background: #fff3cd;
            border-radius: 8px;
        }
        
        .options-review {
            margin-bottom: 25px;
        }
        
        .options-review h4 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        
        .option-item {
            font-size: 16px;
            line-height: 1.8;
            color: #666;
            margin-bottom: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .option-item.correct {
            color: #28a745;
            font-weight: bold;
            background: #d4edda;
            border: 1px solid #28a745;
        }
        
        .option-item.selected-wrong {
            color: #dc3545;
            background: #f8d7da;
            border: 1px solid #dc3545;
        }
        
        .checkmark {
            margin-left: 5px;
            color: #28a745;
            font-weight: bold;
        }
        
        .next-btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        /* 最终结果页面样式 */
        .final-result-container {
            display: none;
        }
        
        .final-result-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .final-result-header h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .score-info {
            font-size: 18px;
            color: #666;
        }
        
        .score-info strong {
            color: #667eea;
            font-size: 24px;
        }
        
        .answer-detail {
            margin-bottom: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .answer-detail.wrong {
            border-left-color: #dc3545;
        }
        
        .restart-btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
        }
        
        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .sentence, .full-sentence {
                font-size: 16px;
            }
            
            .options {
                grid-template-columns: 1fr;
            }
            
            .option-btn {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>英语单词第4轮例句式测验（最终版）</h1>
            <div class="progress-info" id="progressInfo">题目：0/50</div>
        </div>
        
        <!-- 题目页面 -->
        <div class="question-container" id="questionContainer">
            <!-- 题目内容将通过JavaScript动态生成 -->
        </div>
        
        <!-- 单题结果页面 -->
        <div class="result-page" id="resultPage">
            <!-- 结果页内容将通过JavaScript动态生成 -->
        </div>
        
        <!-- 最终结果页面 -->
        <div class="final-result-container" id="finalResultContainer">
            <div class="final-result-header">
                <h2>测验完成！</h2>
                <div class="score-info">
                    答对 <strong id="correctCount">0</strong> 题，共 50 题
                </div>
            </div>
            <div id="answerDetails">
                <!-- 答案详情将通过JavaScript动态生成 -->
            </div>
            <button class="restart-btn" onclick="restartQuiz()">重新开始</button>
        </div>
    </div>
    
    <script src="vocab_data.js?v=4-final"></script>
    <script>
        let currentQuestion = 0;
        let correctAnswers = 0;
        let startTime = null;
        let endTime = null;
        let answers = [];
        let questions = [];
        let currentOptions = [];
        
        // 初始化
        function init() {
            startTime = new Date();
            generateQuestions();
            showQuestion();
        }
        
        // 生成题目（随机打乱）
        function generateQuestions() {
            questions = [...vocabData];
            // 随机打乱题目顺序
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }
        }
        
        // 显示题目
        function showQuestion() {
            const container = document.getElementById('questionContainer');
            const progressInfo = document.getElementById('progressInfo');
            
            if (currentQuestion >= questions.length) {
                showFinalResult();
                return;
            }
            
            const question = questions[currentQuestion];
            progressInfo.textContent = `题目：${currentQuestion + 1}/${questions.length}`;
            
            // 生成选项（正确答案 + 3个干扰项）
            currentOptions = generateOptions(question);
            
            // 生成挖空句子
            const blankSentence = createBlankSentence(question);
            
            container.innerHTML = `
                <div class="question-number">第 ${currentQuestion + 1} 题</div>
                <div class="sentence">${blankSentence}</div>
                <div class="options">
                    ${currentOptions.map((opt, idx) => `
                        <button class="option-btn" onclick="selectOption(${idx})">
                            ${opt.word}
                        </button>
                    `).join('')}
                </div>
            `;
            
            // 显示题目页面
            container.style.display = 'block';
            document.getElementById('resultPage').style.display = 'none';
        }
        
        // 生成挖空句子
        function createBlankSentence(question) {
            const targetWord = question.actualWord || question.word;
            const regex = new RegExp(`\\b${targetWord}\\b`, 'gi');
            return question.example.replace(regex, '<span class="blank">______</span>');
        }
        
        // 生成选项
        function generateOptions(correctQuestion) {
            const options = [{ word: correctQuestion.word, meaning: correctQuestion.meaning }];
            
            // 从其他题目中随机选择3个单词作为干扰项
            const otherWords = vocabData.filter(q => q.word !== correctQuestion.word);
            for (let i = otherWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [otherWords[i], otherWords[j]] = [otherWords[j], otherWords[i]];
            }
            
            for (let i = 0; i < 3; i++) {
                options.push({ word: otherWords[i].word, meaning: otherWords[i].meaning });
            }
            
            // 随机打乱选项顺序
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            
            return options;
        }
        
        // 选择答案
        function selectOption(optionIndex) {
            const question = questions[currentQuestion];
            const selectedWord = currentOptions[optionIndex].word;
            const isCorrect = selectedWord === question.word;
            
            // 记录答案
            answers.push({
                question: question,
                selected: selectedWord,
                isCorrect: isCorrect,
                options: currentOptions
            });
            
            if (isCorrect) {
                correctAnswers++;
            }
            
            // 显示单题结果页
            showQuestionResult(question, selectedWord, isCorrect, currentOptions);
        }
        
        // 显示单题结果页
        function showQuestionResult(question, selectedWord, isCorrect, options) {
            const resultPage = document.getElementById('resultPage');
            const targetWord = question.actualWord || question.word;
            
            // 高亮句子中的答案
            const highlightedSentence = question.example.replace(
                new RegExp(`\\b${targetWord}\\b`, 'gi'),
                `<span class="highlight">${targetWord}</span>`
            );
            
            // 生成选项对照列表
            const optionsList = options.map(opt => {
                const isCorrectOption = opt.word === question.word;
                const isSelectedOption = opt.word === selectedWord;
                let className = 'option-item';
                if (isCorrectOption) {
                    className += ' correct';
                } else if (isSelectedOption && !isCorrect) {
                    className += ' selected-wrong';
                }
                return `
                    <div class="${className}">
                        ${opt.word}（${opt.meaning}）${isCorrectOption ? '<span class="checkmark">✓</span>' : ''}
                    </div>
                `;
            }).join('');
            
            resultPage.innerHTML = `
                <div class="result-icon ${isCorrect ? 'correct' : 'wrong'}">
                    ${isCorrect ? '✅' : '❌'}
                </div>
                <div class="result-title ${isCorrect ? 'correct' : 'wrong'}">
                    ${isCorrect ? '正确！' : '错误！'}
                </div>
                
                <div class="correct-answer">
                    <span class="word">${question.word}</span>
                    <span class="pos">（${question.pos} ${question.meaning}）</span>
                </div>
                
                <div class="full-sentence">
                    <strong>完整句子：</strong><br>
                    ${highlightedSentence}
                </div>
                
                <div class="translation">
                    <strong>句子翻译：</strong><br>
                    ${question.exampleCn}
                </div>
                
                <div class="options-review">
                    <h4>选项对照：</h4>
                    ${optionsList}
                </div>
                
                <button class="next-btn" onclick="nextQuestion()">
                    ${currentQuestion < questions.length - 1 ? '下一题' : '查看结果'}
                </button>
            `;
            
            // 显示结果页面
            document.getElementById('questionContainer').style.display = 'none';
            resultPage.style.display = 'block';
            
            // 自动播放正确答案单词的发音
            speakWord(question.word);
        }
        
        // 下一题
        function nextQuestion() {
            currentQuestion++;
            showQuestion();
        }
        
        // 播放单词发音
        function speakWord(word) {
            if ('speechSynthesis' in window) {
                // 取消之前的播放
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }
        }
        
        // 显示最终结果
        function showFinalResult() {
            endTime = new Date();
            
            document.getElementById('questionContainer').style.display = 'none';
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('finalResultContainer').style.display = 'block';
            document.getElementById('correctCount').textContent = correctAnswers;
            
            const answerDetails = document.getElementById('answerDetails');
            answerDetails.innerHTML = answers.map((answer, idx) => {
                const q = answer.question;
                const targetWord = q.actualWord || q.word;
                const highlightedSentence = q.example.replace(
                    new RegExp(`\\b${targetWord}\\b`, 'gi'),
                    `<span class="highlight">${targetWord}</span>`
                );
                
                return `
                    <div class="answer-detail ${answer.isCorrect ? '' : 'wrong'}">
                        <div style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">
                            第 ${idx + 1} 题：${answer.isCorrect ? '✅ 正确' : '❌ 错误'}
                        </div>
                        <div style="font-size: 16px; margin-bottom: 10px;">
                            <strong>正确答案：</strong>${q.word}（${q.pos} ${q.meaning}）
                        </div>
                        <div class="full-sentence">${highlightedSentence}</div>
                        <div class="translation">${q.exampleCn}</div>
                        ${!answer.isCorrect ? `
                            <div style="margin-top: 10px; color: #dc3545;">
                                <strong>你的答案：</strong>${answer.selected}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            // 生成结果码
            generateResultCode();
        }
        
        // 生成结果码
        function generateResultCode() {
            const wrongCount = questions.length - correctAnswers;
            const startTimeStr = startTime.toISOString();
            const endTimeStr = endTime.toISOString();
            
            const answerDetails = answers.map(a => 
                `${a.question.word}:${a.isCorrect}`
            ).join(',');
            
            const resultCode = `4|${correctAnswers}|${wrongCount}|${startTimeStr}|${endTimeStr}|${answerDetails}`;
            console.log('结果码：', resultCode);
        }
        
        // 重新开始
        function restartQuiz() {
            currentQuestion = 0;
            correctAnswers = 0;
            answers = [];
            startTime = new Date();
            
            document.getElementById('finalResultContainer').style.display = 'none';
            document.getElementById('questionContainer').style.display = 'block';
            
            generateQuestions();
            showQuestion();
        }
        
        // 页面加载时初始化
        window.onload = init;
    </script>
</body>
</html>
