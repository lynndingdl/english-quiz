<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词复习 - 第19轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 16px; color: #666; }
        .progress { background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 24px; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; border-radius: 8px; transition: width 0.3s; }
        .question { padding: 24px; background: #f8f9fa; border-radius: 12px; margin-bottom: 24px; }
        .question-num { font-weight: bold; color: #667eea; margin-bottom: 16px; font-size: 16px; }
        .sentence { font-size: 18px; line-height: 1.8; margin-bottom: 20px; }
        .blank { color: #667eea; font-weight: bold; text-decoration: underline; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .option:hover { border-color: #667eea; background: #f0f4ff; }
        .option.correct { border-color: #4CAF50; background: #c8e6c9; }
        .option.wrong { border-color: #f44336; background: #ffcdd2; }
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
        .next-btn { background: #4CAF50; color: white; }
        .next-btn:hover { background: #45a049; }
        .answer-box { display: none; padding: 24px; background: #f0f7f0; border-radius: 12px; margin-top: 20px; border-left: 4px solid #4CAF50; }
        .answer-box.show { display: block; }
        .answer-box.wrong-answer { background: #fff5f5; border-left-color: #f44336; }
        .answer-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .answer-title.correct { color: #4CAF50; }
        .answer-title.wrong { color: #f44336; }
        .answer-item { margin-bottom: 16px; line-height: 1.6; }
        .answer-label { color: #666; font-size: 14px; margin-bottom: 4px; }
        .answer-value { font-size: 16px; }
        .word-title { font-size: 20px; font-weight: bold; color: #667eea; }
        .full-sentence { font-size: 16px; line-height: 1.8; color: #333; background: #e8f5e9; padding: 12px; border-radius: 8px; }
        .full-sentence .answer-word { color: #4CAF50; font-weight: bold; text-decoration: underline; }
        .options-meaning { margin-top: 12px; }
        .option-meaning-item { padding: 8px 12px; margin: 6px 0; background: #fff; border-radius: 6px; font-size: 15px; }
        .option-meaning-item.correct-opt { background: #c8e6c9; border-left: 3px solid #4CAF50; }
        .option-label { font-weight: bold; color: #666; margin-right: 8px; }
        .option-word { font-weight: bold; color: #333; }
        .option-meaning { color: #666; margin-left: 8px; }
        .result { display: none; text-align: center; padding: 32px; }
        .result.show { display: block; }
        .result h2 { color: #333; margin-bottom: 16px; }
        .result-score { font-size: 48px; font-weight: bold; color: #667eea; margin: 16px 0; }
        .result-code { background: #333; color: #4CAF50; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 20px 0; font-size: 12px; }
        .copy-btn { padding: 14px 28px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .copy-btn:hover { background: #5a6fd6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 英语单词复习 - 第19轮</h1>
        <p class="subtitle">选择题（4选1）| 全部新词 | 原句出题</p>
        
        <div class="progress-info">
            <span>进度: <span id="currentNum">1</span> / 20</span>
            <span>正确: <span id="correctCount">0</span></span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width: 5%"></div></div>
        
        <div id="questionArea"></div>
        
        <div class="result" id="result">
            <h2>🎉 第19轮复习完成！</h2>
            <div class="result-score"><span id="finalScore">0</span> / 20</div>
            <p>正确率: <span id="accuracy">0</span>%</p>
            <p style="margin: 16px 0; color: #666;">请复制以下结果码发回飞书：</p>
            <div class="result-code" id="resultCode"></div>
            <button class="copy-btn" onclick="copyResult()">📋 复制结果码</button>
        </div>
    </div>

    <script>
        const wordBank = {
            "anecdotally": "据传闻，根据轶事证据",
            "stick figure": "火柴人画，简笔画",
            "Compounding": "加重，使复杂化",
            "juggle responsibilities": "同时应对多项责任",
            "upfront": "预先的，事先的",
            "gig economy": "零工经济，临时工经济",
            "displaced": "被取代的，被淘汰的",
            "Tech-savvy": "精通技术的，技术娴熟的",
            "impairment": "损伤，障碍",
            "technophobic": "技术恐惧的",
            "adherent": "遵从的，坚持的",
            "dementia": "痴呆症",
            "shedding light": "阐明，揭示",
            "cardiovascular": "心血管的",
            "psychomotor": "精神运动的，心理运动的",
            "facilitated": "促成的，协助的",
            "executive function": "执行功能",
            "holistic": "整体的，全面的",
            "intensive": "强化的，密集的",
            "Metacognition": "元认知"
        };

        const questions = [
            { word: "anecdotally", meaning: "据传闻，根据轶事证据", sentence: "After the classes had ended, Wu heard ______ that many participants went on to take online courses, private lessons, or classes through community groups to pursue their interests.", answer: "anecdotally", options: ["anecdotally", "upfront", "holistic", "intensive"], translation: "课程结束后，Wu据传闻听说许多参与者继续参加在线课程、私人课程或社区团体的课程来追求他们的兴趣。" },
            { word: "stick figure", meaning: "火柴人画，简笔画", sentence: "There were people who had never drawn anything but a ______, and later they were selling their art and getting commissions.", answer: "stick figure", options: ["stick figure", "dementia", "impairment", "adherent"], translation: "有些人以前只画过火柴人画，后来他们开始出售自己的艺术作品并接受委托。" },
            { word: "Compounding", meaning: "加重，使复杂化", sentence: "______ the challenge is the time pressures faced by many middle-aged and older workers who must also juggle responsibilities related to children, aging parents, or other commitments, meaning less time for learning.", answer: "Compounding", options: ["Compounding", "facilitated", "shedding light", "Metacognition"], translation: "加重这一挑战的是许多中年和老年工人面临的时间压力，他们还必须同时应对与孩子、年迈父母或其他承诺相关的责任，这意味着学习时间更少。" },
            { word: "juggle responsibilities", meaning: "同时应对多项责任", sentence: "Compounding the challenge is the time pressures faced by many middle-aged and older workers who must also ______ related to children, aging parents, or other commitments, meaning less time for learning.", answer: "juggle responsibilities", options: ["juggle responsibilities", "gig economy", "executive function", "Tech-savvy"], translation: "加重这一挑战的是许多中年和老年工人面临的时间压力，他们还必须同时应对与孩子、年迈父母或其他承诺相关的责任，这意味着学习时间更少。" },
            { word: "upfront", meaning: "预先的，事先的", sentence: "For older workers to overcome barriers to learning, they often need to know ______ how training will benefit them.", answer: "upfront", options: ["upfront", "anecdotally", "holistic", "intensive"], translation: "老年工人要克服学习障碍，通常需要预先知道培训将如何使他们受益。" },
            { word: "gig economy", meaning: "零工经济，临时工经济", sentence: "Beier also worries about people who are under or unemployed or contractors in the ______, who may not have access to on-the-job training or practice with current technologies.", answer: "gig economy", options: ["gig economy", "executive function", "juggle responsibilities", "Tech-savvy"], translation: "Beier还担心那些就业不足或失业的人或零工经济中的承包商，他们可能无法获得在职培训或当前技术的实践。" },
            { word: "displaced", meaning: "被取代的，被淘汰的", sentence: "We need to find better ways for them to learn new things to stay employable, or I worry that they will be ______ because of technology and innovation.", answer: "displaced", options: ["displaced", "facilitated", "adherent", "intensive"], translation: "我们需要找到更好的方法让他们学习新事物以保持就业能力，否则我担心他们会因技术和创新而被取代。" },
            { word: "Tech-savvy", meaning: "精通技术的，技术娴熟的", sentence: "______ older adults: Evidence also suggests that people are capable of mastering new skills even after they start experiencing declines in memory, attention, executive function, and other areas associated with mild cognitive impairment.", answer: "Tech-savvy", options: ["Tech-savvy", "technophobic", "gig economy", "displaced"], translation: "精通技术的老年人：证据还表明，即使在开始出现与轻度认知障碍相关的记忆、注意力、执行功能和其他领域的下降后，人们也能够掌握新技能。" },
            { word: "impairment", meaning: "损伤，障碍", sentence: "Evidence also suggests that people are capable of mastering new skills even after they start experiencing declines in memory, attention, executive function, and other areas associated with mild cognitive ______.", answer: "impairment", options: ["impairment", "dementia", "adherent", "stick figure"], translation: "证据还表明，即使在开始出现与轻度认知障碍相关的记忆、注意力、执行功能和其他领域的下降后，人们也能够掌握新技能。" },
            { word: "technophobic", meaning: "技术恐惧的", sentence: "We found that the participants were not ______.", answer: "technophobic", options: ["technophobic", "Tech-savvy", "displaced", "holistic"], translation: "我们发现参与者并不恐惧技术。" },
            { word: "adherent", meaning: "遵从的，坚持的", sentence: "They were very ______, and there was a low dropout rate.", answer: "adherent", options: ["adherent", "displaced", "intensive", "upfront"], translation: "他们非常坚持，退出率很低。" },
            { word: "dementia", meaning: "痴呆症", sentence: "A recent study of more than 13,500 adults age 50 and older revealed that increased isolation was associated with increased risk of mortality, disability, and ______.", answer: "dementia", options: ["dementia", "impairment", "stick figure", "adherent"], translation: "最近一项针对13,500多名50岁及以上成年人的研究显示，隔离增加与死亡率、残疾和痴呆症风险增加相关。" },
            { word: "shedding light", meaning: "阐明，揭示", sentence: "The latest studies are also ______ on cognitive health's connection to other lifestyle factors beyond social connectedness.", answer: "shedding light", options: ["shedding light", "facilitated", "Compounding", "Metacognition"], translation: "最新的研究也在阐明认知健康与社会联系之外的其他生活方式因素之间的联系。" },
            { word: "cardiovascular", meaning: "心血管的", sentence: "In Finland, researchers led a 2-year intervention for people at higher risk of dementia. Participants were educated and supported in areas of diet, physical activity, cognitive training, social activity, and monitoring of ______ risk factors.", answer: "cardiovascular", options: ["cardiovascular", "psychomotor", "executive function", "holistic"], translation: "在芬兰，研究人员为痴呆症风险较高的人群进行了为期2年的干预。参与者在饮食、体育活动、认知训练、社交活动和心血管风险因素监测等领域接受教育和支持。" },
            { word: "psychomotor", meaning: "精神运动的，心理运动的", sentence: "The people in the intervention group experienced significantly greater improvements than the control group in executive function, complex memory tasks, and ______ control.", answer: "psychomotor", options: ["psychomotor", "cardiovascular", "holistic", "intensive"], translation: "干预组的人在执行功能、复杂记忆任务和精神运动控制方面比对照组有显著更大的改善。" },
            { word: "facilitated", meaning: "促成的，协助的", sentence: "In a similar study in the United States, participants in the structured intervention attended 38 ______ peer team meetings over 2 years with education, goal setting, and accountability.", answer: "facilitated", options: ["facilitated", "shedding light", "Compounding", "Metacognition"], translation: "在美国的一项类似研究中，结构化干预的参与者在2年内参加了38次协助的同龄人团队会议，包括教育、目标设定和问责。" },
            { word: "executive function", meaning: "执行功能", sentence: "The people in the intervention group experienced significantly greater improvements than the control group in ______, complex memory tasks, and psychomotor control.", answer: "executive function", options: ["executive function", "cardiovascular", "gig economy", "juggle responsibilities"], translation: "干预组的人在执行功能、复杂记忆任务和精神运动控制方面比对照组有显著更大的改善。" },
            { word: "holistic", meaning: "整体的，全面的", sentence: "While these findings build the case for a ______ approach to brain health, many people do not have access to intensive, in-person support to make lifestyle changes.", answer: "holistic", options: ["holistic", "intensive", "upfront", "anecdotally"], translation: "虽然这些发现为大脑健康的整体方法提供了依据，但许多人无法获得强化、面对面的支持来进行生活方式改变。" },
            { word: "intensive", meaning: "强化的，密集的", sentence: "While these findings build the case for a holistic approach to brain health, many people do not have access to ______, in-person support to make lifestyle changes.", answer: "intensive", options: ["intensive", "holistic", "upfront", "anecdotally"], translation: "虽然这些发现为大脑健康的整体方法提供了依据，但许多人无法获得强化、面对面的支持来进行生活方式改变。" },
            { word: "Metacognition", meaning: "元认知", sentence: "______, which is the awareness of our own abilities, improves with age.", answer: "Metacognition", options: ["Metacognition", "shedding light", "facilitated", "Compounding"], translation: "元认知，即对我们自己能力的认知，随着年龄的增长而提高。" }
        ];

        let currentIndex = 0;
        let correctCount = 0;
        const results = [];
        let startTime = null;

        function renderQuestion() {
            if (currentIndex === 0 && !startTime) {
                startTime = new Date().toISOString();
            }
            
            const q = questions[currentIndex];
            const area = document.getElementById('questionArea');
            
            area.innerHTML = `
                <div class="question">
                    <div class="question-num">📖 第 ${currentIndex + 1} / ${questions.length} 题</div>
                    <div class="sentence">${q.sentence.replace('______', '<span class="blank">______</span>')}</div>
                    <div class="options" id="options">
                        ${q.options.map((opt, i) => `<div class="option" onclick="selectAndSubmit('${opt}')">${String.fromCharCode(65 + i)}. ${opt}</div>`).join('')}
                    </div>
                    
                    <div class="answer-box" id="answerBox">
                        <div class="answer-title" id="answerTitle"></div>
                        <div class="answer-item">
                            <div class="answer-label">单词</div>
                            <div class="answer-value word-title">${q.word}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">中文释义</div>
                            <div class="answer-value">${q.meaning}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">完整句子</div>
                            <div class="full-sentence">${q.sentence.replace('______', `<span class="answer-word">${q.answer}</span>`)}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">句子翻译</div>
                            <div class="answer-value">${q.translation}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">所有选项释义</div>
                            <div class="options-meaning">
                                ${q.options.map((opt, i) => {
                                    const isCorrect = opt === q.answer;
                                    return `<div class="option-meaning-item ${isCorrect ? 'correct-opt' : ''}">
                                        <span class="option-label">${String.fromCharCode(65 + i)}.</span>
                                        <span class="option-word">${opt}</span>
                                        <span class="option-meaning">- ${wordBank[opt] || '（释义缺失）'}</span>
                                        ${isCorrect ? '<span style="color: #4CAF50; margin-left: 8px;">✓ 正确答案</span>' : ''}
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn next-btn hidden" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
                </div>
            `;
            
            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('progressBar').style.width = `${(currentIndex + 1) / questions.length * 100}%`;
        }

        function selectAndSubmit(option) {
            const q = questions[currentIndex];
            const isCorrect = option === q.answer;
            if (isCorrect) correctCount++;
            
            results.push({ word: q.word, correct: isCorrect });
            
            document.getElementById('correctCount').textContent = correctCount;
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                const optText = opt.textContent.split('. ')[1];
                if (optText === q.answer) {
                    opt.classList.add('correct');
                } else if (optText === option && !isCorrect) {
                    opt.classList.add('wrong');
                }
                opt.onclick = null;
                opt.style.cursor = 'default';
            });
            
            const answerBox = document.getElementById('answerBox');
            const answerTitle = document.getElementById('answerTitle');
            
            if (isCorrect) {
                answerTitle.innerHTML = '✅ 回答正确！';
                answerTitle.className = 'answer-title correct';
            } else {
                answerTitle.innerHTML = '❌ 回答错误';
                answerTitle.className = 'answer-title wrong';
                answerBox.classList.add('wrong-answer');
            }
            
            answerBox.classList.add('show');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const endTime = new Date().toISOString();
            
            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('result').classList.add('show');
            document.getElementById('finalScore').textContent = correctCount;
            document.getElementById('accuracy').textContent = Math.round(correctCount / questions.length * 100);
            
            const resultData = { 
                round: 19, 
                total: questions.length, 
                correct: correctCount, 
                results,
                startTime,
                endTime
            };
            const resultCode = 'ENGRESULT:' + btoa(JSON.stringify(resultData));
            document.getElementById('resultCode').textContent = resultCode;
        }

        function copyResult() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ 已复制！请粘贴到飞书发给我。');
            });
        }

        renderQuestion();
    </script>
</body>
</html>
