<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词第4轮例句式测验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .progress-info {
            color: #666;
            font-size: 16px;
        }
        
        .question-container {
            margin-bottom: 30px;
        }
        
        .question-number {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .sentence {
            font-size: 20px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .blank {
            display: inline-block;
            min-width: 120px;
            border-bottom: 2px solid #667eea;
            margin: 0 5px;
            text-align: center;
            font-weight: bold;
            color: #667eea;
        }
        
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .option-btn {
            padding: 18px 25px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 500;
        }
        
        .option-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateY(-2px);
        }
        
        .option-btn:active {
            transform: translateY(0);
        }
        
        .option-btn.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        
        .option-btn.wrong {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        
        .result-container {
            display: none;
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .result-header h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .score-info {
            font-size: 18px;
            color: #666;
        }
        
        .score-info strong {
            color: #667eea;
            font-size: 24px;
        }
        
        .answer-detail {
            margin-bottom: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .answer-detail .word-info {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        
        .answer-detail .word-info .pos {
            font-size: 16px;
            color: #666;
            margin-left: 10px;
        }
        
        .answer-detail .full-sentence {
            font-size: 18px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 10px;
        }
        
        .answer-detail .highlight {
            color: #28a745;
            font-weight: bold;
            background: #d4edda;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .answer-detail .translation {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .answer-detail .options-review {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .answer-detail .options-review h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .answer-detail .options-review .option-item {
            font-size: 15px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 5px;
        }
        
        .answer-detail .options-review .option-item.correct {
            color: #28a745;
            font-weight: bold;
        }
        
        .answer-detail .options-review .option-item .checkmark {
            margin-left: 5px;
        }
        
        .speech-indicator {
            display: inline-block;
            margin-left: 10px;
            color: #667eea;
            font-size: 16px;
        }
        
        .restart-btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
        }
        
        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .sentence {
                font-size: 18px;
            }
            
            .options {
                grid-template-columns: 1fr;
            }
            
            .option-btn {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>英语单词第4轮例句式测验</h1>
            <div class="progress-info" id="progressInfo">题目：0/50</div>
        </div>
        
        <div class="question-container" id="questionContainer">
            <!-- 题目内容将通过JavaScript动态生成 -->
        </div>
        
        <div class="result-container" id="resultContainer">
            <div class="result-header">
                <h2>测验完成！</h2>
                <div class="score-info">
                    答对 <strong id="correctCount">0</strong> 题，共 50 题
                </div>
            </div>
            <div id="answerDetails">
                <!-- 答案详情将通过JavaScript动态生成 -->
            </div>
            <button class="restart-btn" onclick="restartQuiz()">重新开始</button>
        </div>
    </div>
    
    <script src="vocab_data.js?v=4"></script>
    <script>
        let currentQuestion = 0;
        let correctAnswers = 0;
        let startTime = null;
        let endTime = null;
        let answers = [];
        let questions = [];
        
        // 初始化
        function init() {
            startTime = new Date();
            generateQuestions();
            showQuestion();
        }
        
        // 生成题目（随机打乱）
        function generateQuestions() {
            questions = [...vocabData];
            // 随机打乱题目顺序
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }
        }
        
        // 显示题目
        function showQuestion() {
            const container = document.getElementById('questionContainer');
            const progressInfo = document.getElementById('progressInfo');
            
            if (currentQuestion >= questions.length) {
                showResult();
                return;
            }
            
            const question = questions[currentQuestion];
            progressInfo.textContent = `题目：${currentQuestion + 1}/${questions.length}`;
            
            // 生成选项（正确答案 + 3个干扰项）
            const options = generateOptions(question);
            
            // 生成挖空句子
            const blankSentence = createBlankSentence(question);
            
            container.innerHTML = `
                <div class="question-number">第 ${currentQuestion + 1} 题</div>
                <div class="sentence">${blankSentence}</div>
                <div class="options">
                    ${options.map((opt, idx) => `
                        <button class="option-btn" onclick="selectOption('${opt.word}', '${question.word}')">
                            ${opt.word}
                        </button>
                    `).join('')}
                </div>
            `;
        }
        
        // 生成挖空句子
        function createBlankSentence(question) {
            const targetWord = question.actualWord || question.word;
            const englishSentence = question.sentence.split('。')[0];
            const regex = new RegExp(`\\b${targetWord}\\b`, 'gi');
            return englishSentence.replace(regex, '<span class="blank">______</span>');
        }
        
        // 生成选项
        function generateOptions(correctQuestion) {
            const options = [{ word: correctQuestion.word }];
            
            // 从其他题目中随机选择3个单词作为干扰项
            const otherWords = vocabData.filter(q => q.word !== correctQuestion.word);
            for (let i = otherWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [otherWords[i], otherWords[j]] = [otherWords[j], otherWords[i]];
            }
            
            for (let i = 0; i < 3; i++) {
                options.push({ word: otherWords[i].word });
            }
            
            // 随机打乱选项顺序
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            
            return options;
        }
        
        // 选择答案
        function selectOption(selectedWord, correctWord) {
            const isCorrect = selectedWord === correctWord;
            answers.push({
                question: questions[currentQuestion],
                selected: selectedWord,
                correct: correctWord,
                isCorrect: isCorrect
            });
            
            if (isCorrect) {
                correctAnswers++;
            }
            
            currentQuestion++;
            showQuestion();
        }
        
        // 显示结果
        function showResult() {
            endTime = new Date();
            
            document.getElementById('questionContainer').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'block';
            document.getElementById('correctCount').textContent = correctAnswers;
            
            const answerDetails = document.getElementById('answerDetails');
            answerDetails.innerHTML = answers.map((answer, idx) => {
                const q = answer.question;
                const targetWord = q.actualWord || q.word;
                const englishSentence = q.sentence.split('。')[0];
                const chineseSentence = q.sentence.split('。')[1] || '';
                const highlightedSentence = englishSentence.replace(
                    new RegExp(`\\b${targetWord}\\b`, 'gi'),
                    `<span class="highlight">${targetWord}</span>`
                );
                
                // 生成所有选项的对照
                const allOptions = vocabData
                    .filter(v => v.word === answer.correct || 
                                 answers.some(a => a.selected === v.word && a.question.word === q.word))
                    .slice(0, 4)
                    .map(v => {
                        const isCorrect = v.word === answer.correct;
                        const isSelected = v.word === answer.selected;
                        return `
                            <div class="option-item ${isCorrect ? 'correct' : ''}">
                                ${v.word} (${v.chinese.split('；')[0]})${isCorrect ? '<span class="checkmark">✓</span>' : ''}
                            </div>
                        `;
                    }).join('');
                
                // 语音播放指示器
                const speechIcon = answer.isCorrect ? '<span class="speech-indicator">🎵 已播放发音</span>' : '';
                
                return `
                    <div class="answer-detail">
                        <div class="word-info">
                            ${q.word} <span class="pos">${q.pos}</span> ${q.chinese}${speechIcon}
                        </div>
                        <div class="full-sentence">${highlightedSentence}</div>
                        <div class="translation">${chineseSentence}</div>
                        <div class="options-review">
                            <h4>选项对照：</h4>
                            ${allOptions}
                        </div>
                    </div>
                `;
            }).join('');
            
            // 自动播放正确答案单词的发音
            playCorrectAnswers();
            
            // 生成结果码
            generateResultCode();
        }
        
        // 播放正确答案单词的发音
        function playCorrectAnswers() {
            if ('speechSynthesis' in window) {
                answers.forEach((answer, idx) => {
                    if (answer.isCorrect) {
                        setTimeout(() => {
                            const utterance = new SpeechSynthesisUtterance(answer.correct);
                            utterance.lang = 'en-US';
                            utterance.rate = 0.8;
                            window.speechSynthesis.speak(utterance);
                        }, idx * 1000); // 每隔1秒播放一个
                    }
                });
            }
        }
        
        // 生成结果码
        function generateResultCode() {
            const wrongCount = questions.length - correctAnswers;
            const startTimeStr = startTime.toISOString();
            const endTimeStr = endTime.toISOString();
            
            const answerDetails = answers.map(a => 
                `${a.question.word}:${a.isCorrect}`
            ).join(',');
            
            const resultCode = `4|${correctAnswers}|${wrongCount}|${startTimeStr}|${endTimeStr}|${answerDetails}`;
            console.log('结果码：', resultCode);
            
            // 可以将结果码显示在页面上或复制到剪贴板
            // alert('结果码已生成：' + resultCode);
        }
        
        // 重新开始
        function restartQuiz() {
            currentQuestion = 0;
            correctAnswers = 0;
            answers = [];
            startTime = new Date();
            
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('questionContainer').style.display = 'block';
            
            generateQuestions();
            showQuestion();
        }
        
        // 页面加载时初始化
        window.onload = init;
    </script>
</body>
</html>
