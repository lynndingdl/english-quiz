<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词测验 - 第3轮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header .progress {
            font-size: 16px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .question-number {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .sentence {
            font-size: 18px;
            line-height: 1.8;
            color: #2d3748;
            margin-bottom: 30px;
        }

        .blank {
            display: inline-block;
            min-width: 120px;
            border-bottom: 2px solid #667eea;
            margin: 0 5px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px 20px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            text-align: center;
        }

        .option:hover {
            background: #edf2f7;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option.correct {
            background: #48bb78;
            color: white;
            border-color: #48bb78;
        }

        .option.wrong {
            background: #f56565;
            color: white;
            border-color: #f56565;
        }

        .result-card {
            display: none;
        }

        .result-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .result-title.correct {
            color: #48bb78;
        }

        .result-title.wrong {
            color: #f56565;
        }

        .result-detail {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .result-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .result-word {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .result-word.target {
            color: #667eea;
        }

        .result-meaning {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
        }

        .result-sentence {
            margin-top: 20px;
            padding: 15px;
            background: #edf2f7;
            border-radius: 8px;
            color: #4a5568;
            font-size: 14px;
            line-height: 1.8;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .final-card {
            display: none;
            text-align: center;
        }

        .final-title {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }

        .final-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #2d3748;
        }

        .stat-label {
            font-size: 14px;
            color: #718096;
            margin-top: 5px;
        }

        .result-code {
            background: #f7fafc;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #4a5568;
            text-align: left;
        }

        .copy-btn {
            background: #48bb78;
            margin-bottom: 15px;
        }

        .restart-btn {
            background: #718096;
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .header h1 {
                font-size: 24px;
            }

            .card {
                padding: 20px;
            }

            .sentence {
                font-size: 16px;
            }

            .option {
                padding: 14px 16px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>英语单词测验</h1>
            <div class="progress" id="progress">第 1 题 / 共 50 题</div>
        </div>

        <!-- 答题卡片 -->
        <div class="card" id="question-card">
            <div class="question-number" id="question-number">Question 1</div>
            <div class="sentence" id="sentence"></div>
            <div class="options" id="options"></div>
        </div>

        <!-- 结果卡片 -->
        <div class="card result-card" id="result-card">
            <div class="result-title" id="result-title"></div>
            <div class="result-detail" id="result-detail"></div>
            <div class="result-sentence" id="result-sentence"></div>
            <button class="btn" onclick="nextQuestion()">下一题</button>
        </div>

        <!-- 最终结果卡片 -->
        <div class="card final-card" id="final-card">
            <div class="final-title">🎉 测验完成！</div>
            <div class="final-stats">
                <div class="stat-item">
                    <div class="stat-value" id="correct-count">0</div>
                    <div class="stat-label">答对</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="wrong-count">0</div>
                    <div class="stat-label">答错</div>
                </div>
            </div>
            <div class="result-code" id="result-code"></div>
            <button class="btn copy-btn" onclick="copyResult()">📋 复制结果码</button>
            <button class="btn restart-btn" onclick="restart()">重新开始</button>
        </div>
    </div>

    <script src="vocab_data.js?v=3"></script>
    <script>
        let currentIndex = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let startTime;
        let endTime;
        let results = [];
        let answered = false;
        let currentOptions = []; // 保存当前题目的选项

        // 按词性分组单词
        const wordsByPos = {};
        vocabData.forEach(item => {
            const pos = item.pos.split('/')[0].trim(); // 取第一个词性
            if (!wordsByPos[pos]) {
                wordsByPos[pos] = [];
            }
            wordsByPos[pos].push(item);
        });

        // 获取相同词性的干扰选项
        function getDistractors(targetWord, count = 3) {
            const pos = targetWord.pos.split('/')[0].trim();
            const candidates = wordsByPos[pos] ? wordsByPos[pos].filter(w => w.word !== targetWord.word) : [];
            
            // 如果同词性单词不够，从所有单词中随机选
            if (candidates.length < count) {
                const allOthers = vocabData.filter(w => w.word !== targetWord.word);
                const shuffled = allOthers.sort(() => Math.random() - 0.5);
                return shuffled.slice(0, count);
            }
            
            // 随机打乱并选择
            const shuffled = candidates.sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        // 创建题目
        function createQuestion() {
            answered = false;
            const current = vocabData[currentIndex];
            
            // 更新进度
            document.getElementById('progress').textContent = `第 ${currentIndex + 1} 题 / 共 ${vocabData.length} 题`;
            document.getElementById('question-number').textContent = `Question ${currentIndex + 1}`;
            
            // 显示例句（挖空目标单词）
            const sentence = current.sentence;
            const wordToBlank = current.actualWord || current.word; // 优先使用actualWord
            const blankSentence = sentence.replace(new RegExp(wordToBlank, 'gi'), '<span class="blank">_______</span>');
            document.getElementById('sentence').innerHTML = blankSentence;
            
            // 生成选项
            const distractors = getDistractors(current);
            const options = [...distractors, current].sort(() => Math.random() - 0.5);
            currentOptions = options; // 保存选项，供结果页使用
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = option.word;
                optionDiv.onclick = () => selectOption(optionDiv, option, current);
                optionsDiv.appendChild(optionDiv);
            });
            
            // 显示答题卡片
            document.getElementById('question-card').style.display = 'block';
            document.getElementById('result-card').style.display = 'none';
        }

        // 选择选项
        function selectOption(element, selected, target) {
            if (answered) return;
            answered = true;
            
            const isCorrect = selected.word === target.word;
            
            // 记录结果
            results.push({
                word: target.word,
                correct: isCorrect
            });
            
            if (isCorrect) {
                correctCount++;
                element.classList.add('correct');
            } else {
                wrongCount++;
                element.classList.add('wrong');
                
                // 高亮正确答案
                const options = document.querySelectorAll('.option');
                options.forEach(opt => {
                    if (opt.textContent === target.word) {
                        opt.classList.add('correct');
                    }
                });
            }
            
            // 延迟显示结果页
            setTimeout(() => showResult(selected, target, isCorrect), 800);
        }

        // 显示结果
        function showResult(selected, target, isCorrect) {
            document.getElementById('question-card').style.display = 'none';
            document.getElementById('result-card').style.display = 'block';
            
            // 结果标题
            const resultTitle = document.getElementById('result-title');
            resultTitle.textContent = isCorrect ? '✅ 回答正确！' : '❌ 回答错误';
            resultTitle.className = 'result-title ' + (isCorrect ? 'correct' : 'wrong');
            
            // 使用保存的选项，而不是重新生成
            const allOptions = currentOptions;
            
            // 显示所有选项的中文释义
            const resultDetail = document.getElementById('result-detail');
            resultDetail.innerHTML = allOptions.map(option => `
                <div class="result-item">
                    <div class="result-word ${option.word === target.word ? 'target' : ''}">${option.word} ${option.pos}</div>
                    <div class="result-meaning">${option.meaning}</div>
                </div>
            `).join('');
            
            // 显示例句翻译
            document.getElementById('result-sentence').innerHTML = `
                <strong>例句：</strong>${target.sentence}<br><br>
                <strong>翻译：</strong>${target.sentenceCn}
            `;
        }

        // 下一题
        function nextQuestion() {
            currentIndex++;
            
            if (currentIndex >= vocabData.length) {
                showFinalResult();
            } else {
                createQuestion();
            }
        }

        // 显示最终结果
        function showFinalResult() {
            endTime = new Date();
            
            document.getElementById('result-card').style.display = 'none';
            document.getElementById('final-card').style.display = 'block';
            
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('wrong-count').textContent = wrongCount;
            
            // 生成结果码
            const round = 1;
            const startTimeStr = formatTime(startTime);
            const endTimeStr = formatTime(endTime);
            const resultsStr = results.map(r => `${r.word}:${r.correct}`).join(',');
            
            const resultCode = `${round}|${correctCount}|${wrongCount}|${startTimeStr}|${endTimeStr}|${resultsStr}`;
            document.getElementById('result-code').textContent = resultCode;
        }

        // 格式化时间
        function formatTime(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            const second = String(date.getSeconds()).padStart(2, '0');
            return `${year}${month}${day}${hour}${minute}${second}`;
        }

        // 复制结果
        function copyResult() {
            const resultCode = document.getElementById('result-code').textContent;
            navigator.clipboard.writeText(resultCode).then(() => {
                alert('结果码已复制到剪贴板！');
            }).catch(err => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = resultCode;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('结果码已复制到剪贴板！');
            });
        }

        // 重新开始
        function restart() {
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            results = [];
            answered = false;
            currentOptions = [];
            
            document.getElementById('final-card').style.display = 'none';
            startTime = new Date();
            createQuestion();
        }

        // 初始化
        startTime = new Date();
        createQuestion();
    </script>
</body>
</html>
