<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词复习 - 第12轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 16px; color: #666; }
        .progress { background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 24px; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; border-radius: 8px; transition: width 0.3s; }
        .question { padding: 24px; background: #f8f9fa; border-radius: 12px; margin-bottom: 24px; }
        .question-num { font-weight: bold; color: #667eea; margin-bottom: 12px; font-size: 14px; }
        .meaning { color: #666; font-size: 14px; margin-bottom: 12px; }
        .sentence { font-size: 18px; line-height: 1.8; margin-bottom: 20px; }
        .blank { color: #667eea; font-weight: bold; text-decoration: underline; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .option:hover { border-color: #667eea; background: #f0f4ff; }
        .option.selected { border-color: #667eea; background: #e8edff; }
        .option.correct { border-color: #4CAF50; background: #c8e6c9; }
        .option.wrong { border-color: #f44336; background: #ffcdd2; }
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
        .submit-btn { background: linear-gradient(90deg, #667eea, #764ba2); color: white; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .next-btn { background: #4CAF50; color: white; }
        .next-btn:hover { background: #45a049; }
        .answer-box { display: none; padding: 20px; background: #e8f5e9; border-radius: 10px; margin-top: 16px; }
        .answer-box.show { display: block; }
        .answer-box h3 { color: #4CAF50; margin-bottom: 8px; }
        .result { display: none; text-align: center; padding: 32px; }
        .result.show { display: block; }
        .result h2 { color: #333; margin-bottom: 16px; }
        .result-score { font-size: 48px; font-weight: bold; color: #667eea; margin: 16px 0; }
        .result-code { background: #333; color: #4CAF50; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 20px 0; font-size: 12px; }
        .copy-btn { padding: 14px 28px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .copy-btn:hover { background: #5a6fd6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 英语单词复习 - 第12轮</h1>
        <p class="subtitle">选择题（4选1）</p>
        
        <div class="progress-info">
            <span>进度: <span id="currentNum">1</span> / 20</span>
            <span>正确: <span id="correctCount">0</span></span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width: 5%"></div></div>
        
        <div id="questionArea"></div>
        
        <div class="result" id="result">
            <h2>🎉 第12轮复习完成！</h2>
            <div class="result-score"><span id="finalScore">0</span> / 20</div>
            <p>正确率: <span id="accuracy">0</span>%</p>
            <p style="margin: 16px 0; color: #666;">请复制以下结果码发回飞书：</p>
            <div class="result-code" id="resultCode"></div>
            <button class="copy-btn" onclick="copyResult()">📋 复制结果码</button>
        </div>
    </div>

    <script>
        const questions = [
            { word: "likened", meaning: "比作，比拟", sentence: "Ryan Terao, PsyD, an esports and licensed clinical psychologist, ______ the power of esports and gaming to fire.", answer: "likened", options: ["likened", "prioritized", "mitigated", "merged"] },
            { word: "literacy", meaning: "读写能力，素养", sentence: "Professionals within esports psychology perform roles that combine high-performance coaching, clinical or counseling skills, and deep game ______.", answer: "literacy", options: ["literacy", "norms", "pipeline", "pillars"] },
            { word: "marginalized", meaning: "边缘化的", sentence: "Strobel views esports as widening accessibility for students who may be ______ in traditional sports, including neurodivergent youth.", answer: "marginalized", options: ["marginalized", "prioritized", "normalized", "navigated"] },
            { word: "merge", meaning: "合并，融合", sentence: "I've been spending outside the game to learn all these skills and ______ them with my passion for the game.", answer: "merge", options: ["merge", "mitigate", "navigate", "prioritize"] },
            { word: "mitigate", meaning: "减轻，缓解", sentence: "What we really need to do is track young people over their development to understand when gaming is good and when it is bad, and then how to ______ the bad and maximize the good.", answer: "mitigate", options: ["mitigate", "merge", "navigate", "prioritize"] },
            { word: "mound", meaning: "投手丘（棒球）", sentence: "This would be akin to a player committing a flagrant foul in basketball or rushing the ______ in baseball.", answer: "mound", options: ["mound", "pillar", "pipeline", "off-ramp"] },
            { word: "movember", meaning: "Movember（男性健康慈善机构）", sentence: "In 2024, the global men's health charity ______ recruited esports psychology researcher Dylan Poulus, PhD.", answer: "Movember", options: ["Movember", "multibillion-dollar", "nuanced", "normalizing"] },
            { word: "multibillion-dollar", meaning: "数十亿美元的", sentence: "Esports are a fast-evolving ______ industry that draws hundreds of millions of competitive video game players worldwide.", answer: "multibillion-dollar", options: ["multibillion-dollar", "nuanced", "marginalized", "neurodivergent"] },
            { word: "navigate", meaning: "导航，应对", sentence: "While elite players within formal organizational structures often have access to professional psychological services, non-elite players must rely on inconsistent online resources or ______ support systems on their own.", answer: "navigate", options: ["navigate", "mitigate", "merge", "prioritize"] },
            { word: "neurodivergent", meaning: "神经多样性者", sentence: "Strobel views esports as widening accessibility for students who may be marginalized in traditional sports, including ______ youth.", answer: "neurodivergent", options: ["neurodivergent", "nuanced", "normalizing", "multibillion-dollar"] },
            { word: "normalizing", meaning: "正常化", sentence: "Students gained access to an athletics-based sport psychologist, nutrition programming, and twice-weekly morning workouts aimed at ______ physical conditioning.", answer: "normalizing", options: ["normalizing", "neurodivergent", "nuanced", "marginalized"] },
            { word: "norms", meaning: "规范，准则", sentence: "Teams were also encouraged to develop their own ______ around culture, accountability, and conflict management.", answer: "norms", options: ["norms", "literacy", "pillars", "pipeline"] },
            { word: "nuanced", meaning: "细致入微的，微妙的", sentence: "However, a more ______ approach is necessary when esports competitors often require those hours to train and remain competitive.", answer: "nuanced", options: ["nuanced", "neurodivergent", "normalizing", "multibillion-dollar"] },
            { word: "off-ramp", meaning: "退出通道，出路", sentence: "Many pros go straight from an anonymous position on a ladder to a contract, with no Little League, no college team, and no ______ when it ends.", answer: "off-ramp", options: ["off-ramp", "mound", "pipeline", "pillar"] },
            { word: "pillars", meaning: "支柱，核心原则", sentence: "Poulus and colleagues convened game publishers, tournament organizers, International Olympic Committee representatives, and mental health experts to finalize nine ______ of mental health support.", answer: "pillars", options: ["pillars", "norms", "literacy", "pipeline"] },
            { word: "pipeline", meaning: "管道，人才输送渠道", sentence: "Esports is a sport without a childhood ______.", answer: "pipeline", options: ["pipeline", "pillars", "literacy", "norms"] },
            { word: "postgame", meaning: "赛后的", sentence: "He often prepares clients to expect a temporary dip in performance as they reconstruct habits around sleep, practice structure, and ______ review.", answer: "postgame", options: ["postgame", "pillars", "pipeline", "off-ramp"] },
            { word: "prioritized", meaning: "优先考虑的", sentence: "Gardner and his team ______ exercise, sleep routines, and intrinsic motivation, helping the Immortals players build healthier daily structures.", answer: "prioritized", options: ["prioritized", "marginalized", "normalized", "navigated"] },
            { word: "mindset-reappraisal", meaning: "心态重新评估", sentence: "A ______ intervention that encouraged players to view stress as beneficial lowered players' anxiety.", answer: "mindset-reappraisal", options: ["mindset-reappraisal", "multibillion-dollar", "postgame", "off-ramp"] },
            { word: "navigating", meaning: "应对，穿越", sentence: "EPPIC addresses communication, teamwork, leadership, health and wellness, and ______ online toxicity and hate speech.", answer: "navigating", options: ["navigating", "normalizing", "neurodivergent", "nuanced"] }
        ];

        let currentIndex = 0;
        let correctCount = 0;
        let selectedAnswer = null;
        const results = [];

        function renderQuestion() {
            const q = questions[currentIndex];
            const area = document.getElementById('questionArea');
            
            area.innerHTML = `
                <div class="question">
                    <div class="question-num">第 ${currentIndex + 1} 题</div>
                    <div class="meaning">释义：${q.meaning}</div>
                    <div class="sentence">${q.sentence.replace('______', '<span class="blank">?</span>')}</div>
                    <div class="options" id="options">
                        ${q.options.map((opt, i) => `<div class="option" onclick="selectOption('${opt}')">${String.fromCharCode(65 + i)}. ${opt}</div>`).join('')}
                    </div>
                    <button class="btn submit-btn" id="submitBtn" onclick="submitAnswer()" disabled>提交答案</button>
                    <div class="answer-box" id="answerBox">
                        <h3>✅ 正确答案：${q.answer}</h3>
                    </div>
                    <button class="btn next-btn hidden" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
                </div>
            `;
            
            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('progressBar').style.width = `${(currentIndex + 1) / 20 * 100}%`;
            selectedAnswer = null;
        }

        function selectOption(option) {
            selectedAnswer = option;
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
            document.getElementById('submitBtn').disabled = false;
        }

        function submitAnswer() {
            const q = questions[currentIndex];
            const isCorrect = selectedAnswer === q.answer;
            if (isCorrect) correctCount++;
            
            results.push({ word: q.word, correct: isCorrect });
            
            document.getElementById('correctCount').textContent = correctCount;
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                if (opt.textContent.includes(q.answer)) {
                    opt.classList.add('correct');
                } else if (opt.classList.contains('selected')) {
                    opt.classList.add('wrong');
                }
                opt.onclick = null;
            });
            
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('answerBox').classList.add('show');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('result').classList.add('show');
            document.getElementById('finalScore').textContent = correctCount;
            document.getElementById('accuracy').textContent = Math.round(correctCount / 20 * 100);
            
            const resultData = { round: 12, total: 20, correct: correctCount, results };
            const resultCode = 'ENGRESULT:' + btoa(JSON.stringify(resultData));
            document.getElementById('resultCode').textContent = resultCode;
        }

        function copyResult() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ 已复制！请粘贴到飞书发给我。');
            });
        }

        renderQuestion();
    </script>
</body>
</html>
