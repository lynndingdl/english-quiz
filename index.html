<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词复习 - 第24轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 16px; color: #666; }
        .progress { background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 24px; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; border-radius: 8px; transition: width 0.3s; }
        .question { padding: 24px; background: #f8f9fa; border-radius: 12px; margin-bottom: 24px; }
        .question-num { font-weight: bold; color: #667eea; margin-bottom: 16px; font-size: 16px; }
        .sentence { font-size: 18px; line-height: 1.8; margin-bottom: 20px; }
        .blank { color: #667eea; font-weight: bold; text-decoration: underline; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .option:hover { border-color: #667eea; background: #f0f4ff; }
        .option.correct { border-color: #4CAF50; background: #c8e6c9; }
        .option.wrong { border-color: #f44336; background: #ffcdd2; }
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
        .next-btn { background: #4CAF50; color: white; }
        .next-btn:hover { background: #45a049; }
        .answer-box { display: none; padding: 24px; background: #f0f7f0; border-radius: 12px; margin-top: 20px; border-left: 4px solid #4CAF50; }
        .answer-box.show { display: block; }
        .answer-box.wrong-answer { background: #fff5f5; border-left-color: #f44336; }
        .answer-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .answer-title.correct { color: #4CAF50; }
        .answer-title.wrong { color: #f44336; }
        .answer-item { margin-bottom: 16px; line-height: 1.6; }
        .answer-label { color: #666; font-size: 14px; margin-bottom: 4px; }
        .answer-value { font-size: 16px; }
        .word-title { font-size: 20px; font-weight: bold; color: #667eea; }
        .full-sentence { font-size: 16px; line-height: 1.8; color: #333; background: #e8f5e9; padding: 12px; border-radius: 8px; }
        .full-sentence .answer-word { color: #4CAF50; font-weight: bold; text-decoration: underline; }
        .options-meaning { margin-top: 12px; }
        .option-meaning-item { padding: 8px 12px; margin: 6px 0; background: #fff; border-radius: 6px; font-size: 15px; }
        .option-meaning-item.correct-opt { background: #c8e6c9; border-left: 3px solid #4CAF50; }
        .option-label { font-weight: bold; color: #666; margin-right: 8px; }
        .option-word { font-weight: bold; color: #333; }
        .option-meaning { color: #666; margin-left: 8px; }
        .result { display: none; text-align: center; padding: 32px; }
        .result.show { display: block; }
        .result h2 { color: #333; margin-bottom: 16px; }
        .result-score { font-size: 48px; font-weight: bold; color: #667eea; margin: 16px 0; }
        .result-code { background: #333; color: #4CAF50; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 20px 0; font-size: 12px; }
        .copy-btn { padding: 14px 28px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .copy-btn:hover { background: #5a6fd6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 英语单词复习 - 第24轮</h1>
        <p class="subtitle">选择题（4选1）| 全部错题 | 原句出题</p>

        <div class="progress-info">
            <span>进度: <span id="currentNum">1</span> / 20</span>
            <span>正确: <span id="correctCount">0</span></span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width: 5%"></div></div>

        <div id="questionArea"></div>

        <div class="result" id="result">
            <h2>🎉 第24轮复习完成！</h2>
            <div class="result-score"><span id="finalScore">0</span> / 20</div>
            <p>正确率: <span id="accuracy">0</span>%</p>
            <p style="margin: 16px 0; color: #666;">请复制以下结果码发回飞书：</p>
            <div class="result-code" id="resultCode"></div>
            <button class="copy-btn" onclick="copyResult()">📋 复制结果码</button>
        </div>
    </div>

    <script>
        const wordBank = {
            "shorthand": "简写，速记",
            "recruit": "调动，招募，利用",
            "portals": "门户，平台，入口",
            "bypasses": "绕过，避开",
            "underlying": "潜在的，根本的",
            "numerosity": "数量效应，数值感知",
            "credential": "资格，证书",
            "debilitating": "使人虚弱的，令人衰弱的",
            "boost": "提升，增强，促进",
            "accuracy": "准确性，精确度",
            "literacy": "读写能力，素养",
            "navigate": "导航，应对",
            "nuanced": "细致入微的，微妙的",
            "prioritized": "优先考虑的",
            "curriculum": "课程",
            "dearth": "缺乏，短缺",
            "deliberate": "故意的，深思熟虑的",
            "immortals": "不朽者（电竞战队名）",
            "leveraging": "利用，借助",
            "suboptimal": "次优的，不理想的"
        };

        const questions = [
            { word: "shorthand", meaning: "简写，速记", sentence: "That verbal ______ persists in modern professional settings as jargon.", answer: "shorthand", options: ["shorthand", "curriculum", "dearth", "literacy"], translation: "这种口头简写在现代职业环境中作为行话持续存在。" },
            { word: "recruit", meaning: "调动，招募，利用", sentence: "We can ______ cognitive mechanisms to focus on remembering what is important and interesting.", answer: "recruit", options: ["recruit", "bypasses", "underlying", "numerosity"], translation: "我们可以调动认知机制来专注于记住重要和有趣的事情。" },
            { word: "portals", meaning: "门户，平台，入口", sentence: "Some of these older partners are struggling not only to learn how to support a family member with a neurocognitive disorder, but also to navigate health care ______, telehealth visits, transportation, and other details for the loved one.", answer: "portals", options: ["portals", "credential", "debilitating", "boost"], translation: "这些年长的伴侣不仅在学习如何支持患有神经认知障碍的家庭成员，还要努力应对医疗保健门户、远程医疗访问、交通以及其他细节。" },
            { word: "bypasses", meaning: "绕过，避开", sentence: "Buy now, pay later financing ______ a number of cognitive and physical barriers to impulse buying, heightening the risk of financial and psychological stress for many people.", answer: "bypasses", options: ["bypasses", "accuracy", "prioritized", "dearth"], translation: "先买后付融资绕过了许多冲动购物的认知和物理障碍，增加了许多人面临财务和心理压力的风险。" },
            { word: "underlying", meaning: "潜在的，根本的", sentence: "Behavioral scientists and applied practitioners can help by continuing to research the real-world impacts of the cognitive mechanisms ______ these behaviors.", answer: "underlying", options: ["underlying", "leveraging", "nuanced", "deliberate"], translation: "行为科学家和应用从业者可以通过继续研究这些行为背后的认知机制的现实世界影响来提供帮助。" },
            { word: "numerosity", meaning: "数量效应，数值感知", sentence: "Presenting an installment amount rather than the full price lowers a consumer's perception of the cost. This is due to the ______ effect.", answer: "numerosity", options: ["numerosity", "shorthand", "immortals", "curriculum"], translation: "呈现分期付款金额而不是全价会降低消费者对成本的感知。这是由于数量效应。" },
            { word: "credential", meaning: "资格，证书", sentence: "The Certified Mental Performance Consultant (CMPC) ______ has emerged as a pathway into the field for master's-level clinicians.", answer: "credential", options: ["credential", "navigate", "boost", "underlying"], translation: "认证心理表现咨询师（CMPC）资格已成为硕士学位临床医生进入该领域的途径。" },
            { word: "debilitating", meaning: "使人虚弱的，令人衰弱的", sentence: "It is a distressing and often ______ disorder.", answer: "debilitating", options: ["debilitating", "recruit", "portals", "bypasses"], translation: "这是一种令人痛苦且常常使人衰弱的疾病。" },
            { word: "boost", meaning: "提升，增强，促进", sentence: "Psychology researchers are developing cognitive interventions to help adults ______ their brain health rather than being affected by harmful stereotypes about aging.", answer: "boost", options: ["boost", "accuracy", "literacy", "prioritized"], translation: "心理学研究人员正在开发认知干预措施，帮助成年人提升大脑健康，而不是受到关于衰老的有害刻板印象的影响。" },
            { word: "accuracy", meaning: "准确性，精确度", sentence: "Getting players to reconceptualize stress as being beneficial improved shooting ______, attentional control, and cognitive effort during high-pressure performance.", answer: "accuracy", options: ["accuracy", "debilitating", "credential", "shorthand"], translation: "让选手重新认识压力的益处，提高了高压表现下的投篮准确性、注意力控制和认知努力。" },
            { word: "literacy", meaning: "读写能力，素养", sentence: "Professionals within esports psychology perform roles that combine high-performance coaching, clinical or counseling skills, and deep game ______.", answer: "literacy", options: ["literacy", "numerosity", "boost", "underlying"], translation: "电竞心理学专业人士的角色结合了高性能教练、临床或咨询技能以及深厚的游戏素养。" },
            { word: "navigate", meaning: "导航，应对", sentence: "While elite players within formal organizational structures often have access to professional psychological services, non-elite players must rely on inconsistent online resources or ______ support systems on their own.", answer: "navigate", options: ["navigate", "recruit", "portals", "bypasses"], translation: "虽然正式组织结构中的精英选手通常可以获得专业心理服务，但非精英选手必须依赖不一致的在线资源或独自应对支持系统。" },
            { word: "nuanced", meaning: "细致入微的，微妙的", sentence: "However, a more ______ approach is necessary when esports competitors often require those hours to train and remain competitive.", answer: "nuanced", options: ["nuanced", "accuracy", "literacy", "prioritized"], translation: "然而，当电竞选手通常需要这些时间来训练并保持竞争力时，需要更细致入微的方法。" },
            { word: "prioritized", meaning: "优先考虑的", sentence: "Gardner and his team ______ exercise, sleep routines, and intrinsic motivation, helping the Immortals players build healthier daily structures.", answer: "prioritized", options: ["prioritized", "debilitating", "credential", "shorthand"], translation: "Gardner和他的团队优先考虑运动、睡眠规律和内在动机，帮助Immortals选手建立更健康的日常结构。" },
            { word: "curriculum", meaning: "课程", sentence: "Garden State Esports developed the Esports Personal and Performance Improvement ______ (EPPIC).", answer: "curriculum", options: ["curriculum", "numerosity", "boost", "underlying"], translation: "Garden State Esports开发了电竞个人和表现提升课程（EPPIC）。" },
            { word: "dearth", meaning: "缺乏，短缺", sentence: "There is a ______ of appropriate evidence-based practices and ethical and professional standards.", answer: "dearth", options: ["dearth", "recruit", "portals", "bypasses"], translation: "缺乏适当的循证实践以及道德和专业标准。" },
            { word: "deliberate", meaning: "故意的，深思熟虑的", sentence: "A study with Counter-Strike: Global Offensive and League of Legends players found that ______ practice did not meaningfully predict long-term rank.", answer: "deliberate", options: ["deliberate", "accuracy", "literacy", "prioritized"], translation: "一项针对反恐精英：全球攻势和英雄联盟玩家的研究发现，刻意练习并不能显著预测长期排名。" },
            { word: "immortals", meaning: "不朽者（电竞战队名）", sentence: "In 2018, he built what he describes as the first player development department in North American professional esports for the ______ organization.", answer: "immortals", options: ["immortals", "debilitating", "credential", "shorthand"], translation: "2018年，他为Immortals组织建立了他描述的北美职业电竞中的第一个选手发展部门。" },
            { word: "leveraging", meaning: "利用，借助", sentence: "The rise of livestreaming platforms like Twitch, Discord, and YouTube—and the charismatic personalities of some of the athletes ______ these platforms—has fueled this growth.", answer: "leveraging", options: ["leveraging", "numerosity", "boost", "underlying"], translation: "Twitch、Discord和YouTube等直播平台的兴起，以及一些运动员利用这些平台的魅力个性，推动了这一增长。" },
            { word: "suboptimal", meaning: "次优的，不理想的", sentence: "Researchers are also examining tilt—strong negative emotions that lead to ______ decisions during games.", answer: "suboptimal", options: ["suboptimal", "nuanced", "curriculum", "portals"], translation: "研究人员还在研究心态失衡——强烈的负面情绪导致游戏中做出次优决策。" }
        ];

        let currentIndex = 0;
        let correctCount = 0;
        const results = [];
        let startTime = null;

        function renderQuestion() {
            if (currentIndex === 0 && !startTime) {
                startTime = new Date().toISOString();
            }

            const q = questions[currentIndex];
            const area = document.getElementById('questionArea');

            area.innerHTML = `
                <div class="question">
                    <div class="question-num">📖 第 ${currentIndex + 1} / ${questions.length} 题</div>
                    <div class="sentence">${q.sentence.replace('______', '<span class="blank">______</span>')}</div>
                    <div class="options" id="options">
                        ${q.options.map((opt, i) => `<div class="option" onclick="selectAndSubmit('${opt}')">${String.fromCharCode(65 + i)}. ${opt}</div>`).join('')}
                    </div>

                    <div class="answer-box" id="answerBox">
                        <div class="answer-title" id="answerTitle"></div>
                        <div class="answer-item">
                            <div class="answer-label">单词</div>
                            <div class="answer-value word-title">${q.word}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">中文释义</div>
                            <div class="answer-value">${q.meaning}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">完整句子</div>
                            <div class="full-sentence">${q.sentence.replace('______', `<span class="answer-word">${q.answer}</span>`)}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">句子翻译</div>
                            <div class="answer-value">${q.translation}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">所有选项释义</div>
                            <div class="options-meaning">
                                ${q.options.map((opt, i) => {
                                    const isCorrect = opt === q.answer;
                                    return `<div class="option-meaning-item ${isCorrect ? 'correct-opt' : ''}">
                                        <span class="option-label">${String.fromCharCode(65 + i)}.</span>
                                        <span class="option-word">${opt}</span>
                                        <span class="option-meaning">- ${wordBank[opt] || '（释义缺失）'}</span>
                                        ${isCorrect ? '<span style="color: #4CAF50; margin-left: 8px;">✓ 正确答案</span>' : ''}
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>

                    <button class="btn next-btn hidden" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
                </div>
            `;

            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('progressBar').style.width = `${(currentIndex + 1) / questions.length * 100}%`;
        }

        function selectAndSubmit(option) {
            const q = questions[currentIndex];
            const isCorrect = option === q.answer;
            if (isCorrect) correctCount++;

            results.push({ word: q.word, correct: isCorrect });

            document.getElementById('correctCount').textContent = correctCount;

            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                const optText = opt.textContent.split('. ')[1];
                if (optText === q.answer) {
                    opt.classList.add('correct');
                } else if (optText === option && !isCorrect) {
                    opt.classList.add('wrong');
                }
                opt.onclick = null;
                opt.style.cursor = 'default';
            });

            const answerBox = document.getElementById('answerBox');
            const answerTitle = document.getElementById('answerTitle');

            if (isCorrect) {
                answerTitle.innerHTML = '✅ 回答正确！';
                answerTitle.className = 'answer-title correct';
            } else {
                answerTitle.innerHTML = '❌ 回答错误';
                answerTitle.className = 'answer-title wrong';
                answerBox.classList.add('wrong-answer');
            }

            answerBox.classList.add('show');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const endTime = new Date().toISOString();

            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('result').classList.add('show');
            document.getElementById('finalScore').textContent = correctCount;
            document.getElementById('accuracy').textContent = Math.round(correctCount / questions.length * 100);

            const resultData = {
                round: 24,
                total: questions.length,
                correct: correctCount,
                results,
                startTime,
                endTime
            };
            const resultCode = 'ENGRESULT:' + btoa(JSON.stringify(resultData));
            document.getElementById('resultCode').textContent = resultCode;
        }

        function copyResult() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ 已复制！请粘贴到飞书发给我。');
            });
        }

        renderQuestion();
    </script>
</body>
</html>
