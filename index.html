<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第22轮英语单词复习 - 50题</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 32px; max-width: 600px; width: 100%; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .title { font-size: 22px; font-weight: 700; color: #333; }
    .progress { font-size: 14px; color: #666; background: #f0f0f0; padding: 6px 14px; border-radius: 20px; }
    .question-box { background: #f8f9fa; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .sentence { font-size: 18px; line-height: 1.8; color: #333; word-break: break-word; }
    .blank { display: inline-block; background: #4a90d9; color: white; padding: 2px 12px; border-radius: 4px; min-width: 80px; text-align: center; font-weight: 600; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; cursor: pointer; transition: all 0.2s; background: white; text-align: left; }
    .option:hover:not(.disabled) { border-color: #4a90d9; background: #f0f7ff; }
    .option.correct { border-color: #28a745; background: #d4edda; color: #155724; }
    .option.wrong { border-color: #dc3545; background: #f8d7da; color: #721c24; }
    .option.disabled { cursor: default; opacity: 0.7; }
    .option.disabled.correct { opacity: 1; }
    .hidden { display: none; }
    .result-box { text-align: center; }
    .result-icon { font-size: 64px; margin-bottom: 16px; }
    .result-word { font-size: 28px; font-weight: 700; color: #333; margin-bottom: 8px; }
    .result-meaning { font-size: 16px; color: #666; margin-bottom: 20px; }
    .result-sentence { font-size: 17px; line-height: 1.7; color: #333; margin-bottom: 12px; word-break: break-word; }
    .result-sentence .highlight { background: #fff3cd; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
    .result-cn { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.6; }
    .options-review { text-align: left; margin-bottom: 20px; }
    .options-review-title { font-size: 14px; color: #666; margin-bottom: 10px; }
    .option-review { padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; font-size: 15px; background: #f0f0f0; }
    .option-review.correct { background: #d4edda; color: #155724; }
    .option-review .check { margin-right: 6px; }
    .btn { display: inline-block; padding: 14px 32px; background: #4a90d9; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #3a7bc8; }
    .speaker-btn { background: none; border: none; cursor: pointer; font-size: 20px; padding: 8px; margin-bottom: 16px; }
    .end-screen { text-align: center; }
    .end-title { font-size: 26px; font-weight: 700; color: #333; margin-bottom: 20px; }
    .end-stats { font-size: 18px; color: #666; margin-bottom: 24px; line-height: 1.8; }
    .end-stats strong { color: #4a90d9; }
    .copy-btn { background: #28a745; margin-right: 12px; }
    .copy-btn:hover { background: #218838; }
  </style>
</head>
<body>
  <div class="container">
    <div id="quiz">
      <div class="header">
        <div class="title">📝 第22轮英语单词复习</div>
        <div class="progress" id="progress">1/50</div>
      </div>
      <div class="question-box">
        <div class="sentence" id="sentence"></div>
      </div>
      <div class="options" id="options"></div>
    </div>
    <div id="result" class="hidden">
      <div class="result-box">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-word" id="resultWord"></div>
        <div class="result-meaning" id="resultMeaning"></div>
        <button class="speaker-btn" id="speakerBtn" title="播放发音">🔊</button>
        <div class="result-sentence" id="resultSentence"></div>
        <div class="result-cn" id="resultCn"></div>
        <div class="options-review" id="optionsReview"></div>
        <div>
          <button class="btn" id="nextBtn">下一题</button>
        </div>
      </div>
    </div>
    <div id="endScreen" class="hidden end-screen">
      <div class="end-title">🎉 测验完成！</div>
      <div class="end-stats" id="endStats"></div>
      <div>
        <button class="btn copy-btn" id="copyBtn">复制结果码</button>
        <button class="btn" id="restartBtn">重新开始</button>
      </div>
    </div>
  </div>

<script>

  {"word": "mandate", "meaning": "授权；命令", "pos": "n./v.", "sentence": "The new government received a clear mandate from voters to implement healthcare reforms.", "sentenceCn": "新政府从选民那里获得了明确的授权，实施医疗改革。"},

  {"word": "nebula", "meaning": "星云", "pos": "n.", "sentence": "A nebula is a vast cloud of gas and dust in outer space.", "sentenceCn": "星云是外太空中巨大的气体和尘埃云。"},
  {"word": "negotiable", "meaning": "可商议的", "pos": "adj.", "sentence": "The terms of the contract are negotiable and open to discussion.", "sentenceCn": "合同条款是可以协商的，可以公开讨论。"},
  {"word": "nostalgia", "meaning": "怀旧", "pos": "n.", "sentence": "Looking at old photographs filled her with nostalgia for her childhood days.", "sentenceCn": "看着旧照片，她对童年时光充满了怀念。"},
  {"word": "notable", "meaning": "显著的；著名的", "pos": "adj.", "sentence": "The scientist made a notable contribution to the field of renewable energy.", "sentenceCn": "这位科学家对可再生能源领域做出了显著贡献。"},
  {"word": "notary", "meaning": "公证人", "pos": "n.", "sentence": "A notary public is authorized to witness and certify legal documents.", "sentenceCn": "公证人被授权见证和认证法律文件。"},
  {"word": "notorious", "meaning": "臭名昭著的", "pos": "adj.", "sentence": "The notorious criminal was finally captured after years on the run.", "sentenceCn": "这个臭名昭著的罪犯在逃亡多年后终于被捕。"},
  {"word": "notwithstanding", "meaning": "虽然；尽管", "pos": "prep./adv.", "sentence": "Notwithstanding the challenges, the team completed the project on time.", "sentenceCn": "尽管面临挑战，团队还是按时完成了项目。"},
  {"word": "nurture", "meaning": "养育；培育", "pos": "v./n.", "sentence": "Parents have a responsibility to nurture their children's talents and abilities.", "sentenceCn": "父母有责任培养孩子的才能和能力。"},

  {"word": "observation", "meaning": "观察；言论", "pos": "n.", "sentence": "Scientific observation requires careful attention to detail and objectivity.", "sentenceCn": "科学观察需要仔细关注细节和客观性。"},
  {"word": "observatory", "meaning": "天文台；气象台", "pos": "n.", "sentence": "The observatory provides valuable data about celestial bodies and space phenomena.", "sentenceCn": "天文台提供有关天体和太空现象的宝贵数据。"},
  {"word": "obsess", "meaning": "使痴迷", "pos": "v.", "sentence": "He tends to obsess over minor details, which delays his work.", "sentenceCn": "他倾向于纠结于细枝末节，这会延误他的工作。"},
  {"word": "obsolete", "meaning": "过时的；荒废的", "pos": "adj.", "sentence": "Typewriters have become obsolete in the age of computers and smartphones.", "sentenceCn": "在电脑和智能手机时代，打字机已经过时了。"},
  {"word": "obstruct", "meaning": "阻碍", "pos": "v.", "sentence": "The fallen tree obstructed the road, blocking traffic for hours.", "sentenceCn": "倒下的树挡住了道路，阻塞交通数小时。", "actualWord": "obstructed"}
];

let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let startTime = '';
let currentOptions = [];
let userAnswers = {};
let shuffledData = [];

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getActualWord(item) {
  return item.actualWord || item.word;
}

function generateOptions(correctItem) {
  const correct = correctItem.word;
  const others = vocabData.filter(item => item.word !== correct);
  const shuffledOthers = shuffle(others).slice(0, 3);
  const options = shuffle([correctItem, ...shuffledOthers]);
  return options.map(item => ({
    word: item.word,
    meaning: item.meaning,
    isCorrect: item.word === correct
  }));
}

function renderQuestion() {
  const item = shuffledData[currentIndex];
  const actualWord = getActualWord(item);
  const sentence = item.sentence;

  // Create blank by replacing the actual word (case-insensitive)
  const escapedWord = actualWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regexWithBoundary = new RegExp('\\b' + escapedWord + '\\b', 'gi');
  let displaySentence = sentence.replace(regexWithBoundary, '<span class="blank">_______</span>');

  // If no replacement was made, try without word boundary
  if (displaySentence === sentence) {
    const regexNoBoundary = new RegExp(escapedWord, 'gi');
    displaySentence = sentence.replace(regexNoBoundary, '<span class="blank">_______</span>');
  }

  document.getElementById('sentence').innerHTML = displaySentence;
  document.getElementById('progress').textContent = `${currentIndex + 1}/${shuffledData.length}`;

  // Generate and store options globally
  currentOptions = generateOptions(item);

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  currentOptions.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt.word;
    btn.onclick = () => handleAnswer(idx);
    optionsEl.appendChild(btn);
  });

  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
}

function handleAnswer(selectedIdx) {
  const item = shuffledData[currentIndex];
  const actualWord = getActualWord(item);
  const selected = currentOptions[selectedIdx];
  const isCorrect = selected.isCorrect;

  userAnswers[item.word] = isCorrect;

  // Disable all options and show correct/wrong
  const buttons = document.querySelectorAll('.option');
  buttons.forEach((btn, idx) => {
    btn.classList.add('disabled');
    if (currentOptions[idx].isCorrect) {
      btn.classList.add('correct');
    } else if (idx === selectedIdx && !isCorrect) {
      btn.classList.add('wrong');
    }
  });

  if (isCorrect) {
    correctCount++;
  } else {
    wrongCount++;
  }

  setTimeout(() => showResult(item, selected, isCorrect), 600);
}

function showResult(item, selected, isCorrect) {
  const actualWord = getActualWord(item);

  document.getElementById('resultIcon').textContent = isCorrect ? '✅' : '❌';
  document.getElementById('resultWord').textContent = item.word + ' (' + item.pos + ')';
  document.getElementById('resultMeaning').textContent = item.meaning;

  // Highlight the answer in the sentence
  const escapedWord = actualWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regexWithBoundary = new RegExp('(' + escapedWord + ')', 'gi');
  let highlightedSentence = item.sentence.replace(regexWithBoundary, '<span class="highlight">$1</span>');
  if (highlightedSentence === item.sentence) {
    const regexNoBoundary = new RegExp('(' + escapedWord + ')', 'gi');
    highlightedSentence = item.sentence.replace(regexNoBoundary, '<span class="highlight">$1</span>');
  }
  document.getElementById('resultSentence').innerHTML = highlightedSentence;
  document.getElementById('resultCn').textContent = item.sentenceCn;

  // Options review with Chinese (use stored currentOptions, not regenerated)
  const optionsReview = document.getElementById('optionsReview');
  optionsReview.innerHTML = '<div class="options-review-title">所有选项：</div>';
  currentOptions.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'option-review' + (opt.isCorrect ? ' correct' : '');
    div.innerHTML = `<span class="check">${opt.isCorrect ? '✓' : ''}</span>${opt.word} — ${opt.meaning}`;
    optionsReview.appendChild(div);
  });

  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');

  // ⭐ 关键：点击选项后立即自动播放正确答案发音
  speakWord(actualWord);
}

function speakWord(word) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = 'en-US';
    utterance.rate = 0.9;
    speechSynthesis.speak(utterance);
  }
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= shuffledData.length) {
    showEndScreen();
  } else {
    renderQuestion();
  }
}

function showEndScreen() {
  const endTime = new Date().toISOString();
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');

  const stats = document.getElementById('endStats');
  stats.innerHTML = `
    共 <strong>${shuffledData.length}</strong> 题<br>
    答对 <strong>${correctCount}</strong> 题<br>
    答错 <strong>${wrongCount}</strong> 题<br>
    正确率 <strong>${Math.round(correctCount / shuffledData.length * 100)}%</strong>
  `;

  // Build result code: 轮次|答对数|错误数|开始时间|结束时间|单词1:true,...
  const resultCode = `22|${correctCount}|${wrongCount}|${startTime}|${endTime}|${Object.entries(userAnswers).map(([w, v]) => `${w}:${v}`).join(',')}`;
  document.getElementById('copyBtn').onclick = () => {
    navigator.clipboard.writeText(resultCode).then(() => {
      alert('结果码已复制！');
    });
  };
}

function init() {
  startTime = new Date().toISOString();
  shuffledData = shuffle([...vocabData]);
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  userAnswers = {};
  renderQuestion();
}

document.getElementById('speakerBtn').onclick = () => {
  const item = shuffledData[currentIndex];
  speakWord(getActualWord(item));
};

document.getElementById('nextBtn').onclick = nextQuestion;

document.getElementById('restartBtn').onclick = init;

init();
</script>
</body>
</html>
