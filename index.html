<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词复习 - 第32轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
            margin-bottom: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #333; font-size: 24px; margin-bottom: 8px; }
        .header .subtitle { color: #666; font-size: 14px; }
        .progress { 
            background: #f0f0f0; 
            border-radius: 10px; 
            height: 8px; 
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            transition: width 0.3s ease;
        }
        .question-text { 
            font-size: 18px; 
            color: #333; 
            margin-bottom: 20px; 
            line-height: 1.6;
        }
        .sentence { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px;
            font-style: italic;
            color: #555;
            border-left: 4px solid #667eea;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            text-align: left;
        }
        .option:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }
        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }
        .option.wrong {
            background: #f8d7da;
            border-color: #dc3545;
        }
        .option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }
        .result {
            display: none;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .result.show { display: block; }
        .result.correct { background: #d4edda; border: 2px solid #28a745; }
        .result.wrong { background: #f8d7da; border: 2px solid #dc3545; }
        .result-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .result.correct .result-title { color: #28a745; }
        .result.wrong .result-title { color: #dc3545; }
        .result-detail { margin-bottom: 10px; }
        .result-detail strong { color: #333; }
        .word { font-size: 22px; font-weight: bold; color: #667eea; }
        .translation { color: #555; font-size: 16px; }
        .answer-sentence { 
            background: #fff3cd; 
            padding: 12px; 
            border-radius: 8px; 
            margin: 10px 0;
        }
        .answer-sentence .highlight {
            background: #28a745;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .options-translation { margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        .options-translation h4 { font-size: 14px; color: #666; margin-bottom: 10px; }
        .option-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 12px;
            margin: 5px 0;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 14px;
        }
        .option-item .en { color: #333; }
        .option-item .cn { color: #666; }
        .option-item.correct { background: #d4edda; }
        .option-item.correct .en { color: #28a745; font-weight: bold; }
        .next-btn {
            display: none;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .next-btn.show { display: block; }
        .result码 {
            display: none;
            background: #333;
            color: #0f0;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
        }
        .result码.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>📚 英语单词复习 - 第32轮</h1>
                <div class="subtitle">点击选项即可答题</div>
            </div>
            <div class="progress">
                <div class="progress-bar" id="progressBar" style="width: 2%"></div>
            </div>
            <div id="questionArea">
                <div class="sentence" id="sentence"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
            </div>
            <div class="result" id="result">
                <div class="result-title" id="resultTitle"></div>
                <div class="result-detail">
                    <div class="word" id="word"></div>
                    <div class="translation" id="translation"></div>
                </div>
                <div class="answer-sentence" id="answerSentence"></div>
                <div class="options-translation" id="optionsTranslation"></div>
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
            </div>
        </div>
    </div>

    <script>
    const questions = [
        {"word": "shedding light on", "cn": "阐明，揭示", "sentence": "After realizing how much they actually owed, 1 in 4 Americans say they've regretted using BNPL, and a new study is shedding light on why these plans are so tempting.", "correct": "shedding light on", "options": ["shedding light on", "getting rid of", "looking after", "taking over"]},
        {"word": "tempting", "cn": "诱人的，有吸引力的", "sentence": "A new study is shedding light on why these plans are so tempting.", "correct": "tempting", "options": ["tempting", "boring", "confusing", "disappointing"]},
        {"word": "numerosity", "cn": "数量效应，数值感知", "sentence": "Presenting an installment amount rather than the full price lowers a consumer's perception of the cost. This is due to the numerosity effect.", "correct": "numerosity", "options": ["numerosity", "authority", "popularity", "regularity"]},
        {"word": "internalizing", "cn": "内化", "sentence": "With these installment plans, people may not be fully internalizing the cost of a purchase when deciding whether to buy or how much to spend.", "correct": "internalizing", "options": ["internalizing", "externalizing", "recognizing", "forgetting"]},
        {"word": "literacy", "cn": "读写能力，素养", "sentence": "Professionals within esports psychology perform roles that combine high-performance coaching, clinical or counseling skills, and deep game literacy.", "correct": "literacy", "options": ["literacy", "ignorance", "violence", "clarity"]},
        {"word": "nuanced", "cn": "细致入微的，微妙的", "sentence": "However, a more nuanced approach is necessary when esports competitors often require those hours to train and remain competitive.", "correct": "nuanced", "options": ["nuanced", "simple", "confusing", "useless"]},
        {"word": "prioritized", "cn": "优先考虑的", "sentence": "Gardner and his team prioritized exercise, sleep routines, and intrinsic motivation, helping the Immortals players build healthier daily structures.", "correct": "prioritized", "options": ["prioritized", "ignored", "delayed", "cancelled"]},
        {"word": "meteoric", "cn": "迅速的，流星般的", "sentence": "Its meteoric rise demonstrates the internet's power to propel fringe terms into the mainstream at warp speed.", "correct": "meteoric", "options": ["meteoric", "slow", "steady", "gradual"]},
        {"word": "fringe", "cn": "边缘的，非主流的", "sentence": "Its meteoric rise demonstrates the internet's power to propel fringe terms into the mainstream at warp speed.", "correct": "fringe", "options": ["fringe", "mainstream", "popular", "traditional"]},
        {"word": "rebellious", "cn": "叛逆的，反抗的", "sentence": "For young people, the appeal lies in its irreverent or rebellious qualities while also remaining opaque to adults.", "correct": "rebellious", "options": ["rebellious", "obedient", "passive", "calm"]},
        {"word": "opaque", "cn": "晦涩难懂的，不透明的", "sentence": "For young people, the appeal lies in its irreverent or rebellious qualities while also remaining opaque to adults.", "correct": "opaque", "options": ["opaque", "clear", "obvious", "transparent"]},
        {"word": "shorthand", "cn": "简写，速记", "sentence": "That verbal shorthand persists in modern professional settings as jargon.", "correct": "shorthand", "options": ["shorthand", "explanation", "conversation", "discussion"]},
        {"word": "jargon", "cn": "行话，术语", "sentence": "That verbal shorthand persists in modern professional settings as jargon.", "correct": "jargon", "options": ["jargon", "language", "silence", "laughter"]},
        {"word": "boost", "cn": "提升，增强，促进", "sentence": "Psychology researchers are developing cognitive interventions to help adults boost their brain health rather than being affected by harmful stereotypes about aging.", "correct": "boost", "options": ["boost", "reduce", "ignore", "destroy"]},
        {"word": "upfront", "cn": "预先的，事先的", "sentence": "For older workers to overcome barriers to learning, they often need to know upfront how training will benefit them.", "correct": "upfront", "options": ["upfront", "afterwards", "never", "sometimes"]},
        {"word": "adherent", "cn": "遵从的，坚持的", "sentence": "They were very adherent, and there was a low dropout rate.", "correct": "adherent", "options": ["adherent", "lazy", "careless", "irregular"]},
        {"word": "curriculum", "cn": "课程", "sentence": "Garden State Esports developed the Esports Personal and Performance Improvement Curriculum (EPPIC).", "correct": "curriculum", "options": ["curriculum", "vacation", "punishment", "celebration"]},
        {"word": "dearth", "cn": "缺乏，短缺", "sentence": "There is a dearth of appropriate evidence-based practices and ethical and professional standards.", "correct": "dearth", "options": ["dearth", "abundance", "variety", "quality"]},
        {"word": "deliberate", "cn": "故意的，深思熟虑的", "sentence": "A study with Counter-Strike: Global Offensive and League of Legends players found that deliberate practice did not meaningfully predict long-term rank.", "correct": "deliberate", "options": ["deliberate", "accidental", "random", "casual"]},
        {"word": "immortals", "cn": "不朽者（电竞战队名）", "sentence": "In 2018, he built what he describes as the first player development department in North American professional esports for the Immortals organization.", "correct": "immortals", "options": ["immortals", "amateurs", "beginners", "veterans"]},
        {"word": "leveraging", "cn": "利用，借助", "sentence": "The rise of livestreaming platforms like Twitch, Discord, and YouTube—and the charismatic personalities of some of the athletes leveraging these platforms—has fueled this growth.", "correct": "leveraging", "options": ["leveraging", "avoiding", "ignoring", "rejecting"]},
        {"word": "navigate", "cn": "导航，应对", "sentence": "While elite players within formal organizational structures often have access to professional psychological services, non-elite players must rely on inconsistent online resources or navigate support systems on their own.", "correct": "navigate", "options": ["navigate", "ignore", "avoid", "destroy"]},
        {"word": "likened", "cn": "比作，比拟", "sentence": "Ryan Terao, PsyD, an esports and licensed clinical psychologist, likened the power of esports and gaming to fire.", "correct": "likened", "options": ["likened", "separated", "combined", "confused"]},
        {"word": "marginalized", "cn": "边缘化的", "sentence": "Strobel views esports as widening accessibility for students who may be marginalized in traditional sports, including neurodivergent youth.", "correct": "marginalized", "options": ["marginalized", "centralized", "included", "prioritized"]},
        {"word": "merge", "cn": "合并，融合", "sentence": "I've been spending outside the game to learn all these skills and merge them with my passion for the game.", "correct": "merge", "options": ["merge", "separate", "divide", "ignore"]},
        {"word": "mindset-reappraisal", "cn": "心态重新评估", "sentence": "A mindset-reappraisal intervention that encouraged players to view stress as beneficial lowered players' anxiety.", "correct": "mindset-reappraisal", "options": ["mindset-reappraisal", "mindset-ignoring", "stress-avoidance", "pressure-induction"]},
        {"word": "mitigate", "cn": "减轻，缓解", "sentence": "What we really need to do is track young people over their development to understand when gaming is good and when it is bad, and then how to mitigate the bad and maximize the good.", "correct": "mitigate", "options": ["mitigate", "increase", "ignore", "create"]},
        {"word": "mound", "cn": "投手丘（棒球）", "sentence": "This would be akin to a player committing a flagrant foul in basketball or rushing the mound in baseball.", "correct": "mound", "options": ["mound", "field", "audience", "scoreboard"]},
        {"word": "movember", "cn": "Movember（男性健康慈善机构）", "sentence": "In 2024, the global men's health charity Movember recruited esports psychology researcher Dylan Poulus, PhD.", "correct": "movember", "options": ["movember", " november", "december", "october"]},
        {"word": "multibillion-dollar", "cn": "数十亿美元的", "sentence": "Esports are a fast-evolving multibillion-dollar industry that draws hundreds of millions of competitive video game players worldwide.", "correct": "multibillion-dollar", "options": ["multibillion-dollar", "penny-wise", "money-losing", "budget"]},
        {"word": "navigating", "cn": "应对，穿越", "sentence": "EPPIC addresses communication, teamwork, leadership, health and wellness, and navigating online toxicity and hate speech.", "correct": "navigating", "options": ["navigating", "avoiding", "creating", "ignoring"]},
        {"word": "neurodivergent", "cn": "神经多样性者", "sentence": "Strobel views esports as widening accessibility for students who may be marginalized in traditional sports, including neurodivergent youth.", "correct": "neurodivergent", "options": ["neurodivergent", "neurotypical", "unintelligent", "inactive"]},
        {"word": "normalizing", "cn": "正常化", "sentence": "Students gained access to an athletics-based sport psychologist, nutrition programming, and twice-weekly morning workouts aimed at normalizing physical conditioning.", "correct": "normalizing", "options": ["normalizing", "abnormalizing", "stopping", "destroying"]},
        {"word": "norms", "cn": "规范，准则", "sentence": "Teams were also encouraged to develop their own norms around culture, accountability, and conflict management.", "correct": "norms", "options": ["norms", "chaos", "disorders", "mistakes"]},
        {"word": "off-ramp", "cn": "退出通道，出路", "sentence": "Many pros go straight from an anonymous position on a ladder to a contract, with no Little League, no college team, and no off-ramp when it ends.", "correct": "off-ramp", "options": ["off-ramp", "on-ramp", "dead-end", "highway"]},
        {"word": "pillars", "cn": "支柱，核心原则", "sentence": "Poulus and colleagues convened game publishers, tournament organizers, International Olympic Committee representatives, and mental health experts to finalize nine pillars of mental health support.", "correct": "pillars", "options": ["pillars", "weaknesses", "problems", "obstacles"]},
        {"word": "pipeline", "cn": "管道，人才输送渠道", "sentence": "Esports is a sport without a childhood pipeline.", "correct": "pipeline", "options": ["pipeline", "obstruction", "barrier", "end"]},
        {"word": "postgame", "cn": "赛后的", "sentence": "He often prepares clients to expect a temporary dip in performance as they reconstruct habits around sleep, practice structure, and postgame review.", "correct": "postgame", "options": ["postgame", "pregame", "midgame", "during-game"]},
        {"word": "reckless", "cn": "鲁莽的，轻率的", "sentence": "Tilt can lead players to perform reckless and self-destructive actions, such as hurtling their character, unprotected, at an enemy.", "correct": "reckless", "options": ["reckless", "careful", "cautious", "slow"]},
        {"word": "reconceptualize", "cn": "重新概念化", "sentence": "Getting players to reconceptualize stress as being beneficial and a challenge to overcome rather than a debilitating threat improved shooting accuracy.", "correct": "reconceptualize", "options": ["reconceptualize", "misunderstand", "ignore", "forget"]},
        {"word": "recruited", "cn": "招募的", "sentence": "In 2024, the global men's health charity Movember recruited esports psychology researcher Dylan Poulus, PhD.", "correct": "recruited", "options": ["recruited", "fired", "ignored", "rejected"]},
        {"word": "relegated", "cn": "被降级", "sentence": "As a result, neurodivergent youth in esports get to be the captain of the team versus the helper role they are often relegated to in traditional sports.", "correct": "relegated", "options": ["relegated", "promoted", "celebrated", "praised"]},
        {"word": "resembled", "cn": "类似于", "sentence": "Researchers found 51 stressors, such as communication problems and pressures of competing before live audiences, resembled those affecting professional athletes in traditional sports.", "correct": "resembled", "options": ["resembled", "differed", "matched", "contradicted"]},
        {"word": "rigor", "cn": "严谨性", "sentence": "The evidence base is expanding rapidly, but it lacks the rigor necessary for evidence-based practice.", "correct": "rigor", "options": ["rigor", "chaos", "carelessness", "inaccuracy"]},
        {"word": "sanctioned", "cn": "认可的，批准的", "sentence": "Roose intentionally housed the program within the athletics department and adopted the NCAA's 20-hour rule for sanctioned activities.", "correct": "sanctioned", "options": ["sanctioned", "forbidden", "rejected", "ignored"]},
        {"word": "scrutiny", "cn": "审查，审视", "sentence": "Many esports players begin competing professionally in adolescence, facing intense pressure, unstable schedules, and public scrutiny while still developing emotionally and socially.", "correct": "scrutiny", "options": ["scrutiny", "privacy", "secrecy", "freedom"]},
        {"word": "self-efficacy", "cn": "自我效能感", "sentence": "However, mindset and self-efficacy are key.", "correct": "self-efficacy", "options": ["self-efficacy", "self-doubt", "self-pity", "self-criticism"]},
        {"word": "self-sufficiency", "cn": "自给自足", "sentence": "Teams were also encouraged to develop their own norms around culture, accountability, and conflict management, fostering self-sufficiency and leadership skills.", "correct": "self-sufficiency", "options": ["self-sufficiency", "dependence", "reliance", "helplessness"]},
        {"word": "semiprofessional", "cn": "半职业的", "sentence": "Players often compete as teams on digital platforms through systems run by amateur, semiprofessional, or professional leagues.", "correct": "semiprofessional", "options": ["semiprofessional", "unprofessional", "amateur", "fully-professional"]},
        {"word": "sharpen", "cn": "加强，提高", "sentence": "New studies on stress, tilt, practice demands, and attention will sharpen understanding of what drives performance in the digital game environment.", "correct": "sharpen", "options": ["sharpen", "blur", "confuse", "weaken"]}
    ];

    let currentIndex = 0;
    let correctCount = 0;
    let startTime = Date.now();
    let results = [];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderQuestion() {
        if (currentIndex >= questions.length) {
            showResultCode();
            return;
        }

        const q = questions[currentIndex];
        const progress = ((currentIndex + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = progress + '%';

        // 挖空句子
        const blankedSentence = q.sentence.replace(new RegExp('\\b' + q.correct + '\\b', 'gi'), '【______】');
        document.getElementById('sentence').textContent = blankedSentence;
        
        document.getElementById('questionText').textContent = `请选择正确的单词补全句子：`;

        // 随机打乱选项
        const shuffledOptions = shuffleArray([...q.options]);
        
        const optionsHtml = shuffledOptions.map(opt => 
            `<div class="option" onclick="selectOption(this, '${opt}', '${q.correct}', '${q.word}', '${q.cn}', '${q.sentence}')">${opt}</div>`
        ).join('');
        
        document.getElementById('options').innerHTML = optionsHtml;
        document.getElementById('result').classList.remove('show', 'correct', 'wrong');
    }

    function selectOption(element, selected, correct, word, cn, sentence) {
        // 禁用所有选项
        document.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled'));
        
        const isCorrect = selected === correct;
        
        // 标记正确和错误
        document.querySelectorAll('.option').forEach(opt => {
            if (opt.textContent === correct) {
                opt.classList.add('correct');
            } else if (opt.textContent === selected && !isCorrect) {
                opt.classList.add('wrong');
            }
        });

        // 记录结果
        results.push({
            word: word,
            correct: isCorrect,
            selected: selected
        });

        if (isCorrect) {
            correctCount++;
        }

        // 显示答案解析
        showResult(isCorrect, word, cn, correct, sentence);
    }

    function showResult(isCorrect, word, cn, correctAnswer, sentence) {
        const resultDiv = document.getElementById('result');
        const titleEl = document.getElementById('resultTitle');
        const wordEl = document.getElementById('word');
        const transEl = document.getElementById('translation');
        const answerEl = document.getElementById('answerSentence');
        const optTransEl = document.getElementById('optionsTranslation');
        
        resultDiv.classList.add('show');
        resultDiv.classList.add(isCorrect ? 'correct' : 'wrong');
        
        titleEl.textContent = isCorrect ? '✅ 正确！' : '❌ 错误！';
        wordEl.textContent = word;
        transEl.textContent = cn;
        
        // 高亮答案
        const highlightedSentence = sentence.replace(
            new RegExp('\\b' + correctAnswer + '\\b', 'gi'),
            `<span class="highlight">${correctAnswer}</span>`
        );
        answerEl.innerHTML = highlightedSentence;
        
        // 显示所有选项的中英文
        const q = questions[currentIndex];
        const allOptions = q.options.map(opt => ({
            en: opt,
            cn: getTranslation(opt),
            correct: opt === correctAnswer
        }));
        
        optTransEl.innerHTML = '<h4>所有选项：</h4>' + allOptions.map(opt => 
            `<div class="option-item ${opt.correct ? 'correct' : ''}">
                <span class="en">${opt.en} ${opt.correct ? '✓' : ''}</span>
                <span class="cn">${opt.cn}</span>
            </div>`
        ).join('');

        document.getElementById('nextBtn').classList.add('show');
    }

    function getTranslation(word) {
        const q = questions.find(q => q.correct === word || q.word === word);
        return q ? q.cn : '';
    }

    function nextQuestion() {
        currentIndex++;
        renderQuestion();
    }

    function showResultCode() {
        const endTime = Date.now();
        const duration = Math.round((endTime - startTime) / 1000);
        
        const resultCode = `ENGRESULT:round=32,total=${questions.length},correct=${correctCount},duration=${duration}s,startTime=${startTime},endTime=${endTime},results=${results.map(r => r.word + ':' + (r.correct ? 'T' : 'F')).join(',')}`;
        
        document.getElementById('questionArea').innerHTML = `
            <div style="text-align: center; padding: 40px;">
                <h2 style="color: #28a745; margin-bottom: 20px;">🎉 复习完成！</h2>
                <p style="font-size: 18px; margin-bottom: 10px;">正确率：${correctCount}/${questions.length} (${Math.round(correctCount/questions.length*100)}%)</p>
                <p style="color: #666; margin-bottom: 20px;">用时：${duration}秒</p>
                <div class="result码 show">
                    ${resultCode}
                </div>
            </div>
        `;
    }

    // 初始化
    renderQuestion();
    </script>
</body>
</html>
