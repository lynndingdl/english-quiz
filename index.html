    let currentIndex = 0, correctCount = 0, wrongCount = 0, startTime = Date.now();
    let currentQuestion = null, currentOptions = [];
    let results = [];
    
    function shuffle(a) { for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
    function getOptions(correct) { let opts = [correct]; let others = questions.filter(q=>q.word!==correct.word); shuffle(others); others.slice(0,3).forEach(o=>opts.push(o)); return shuffle(opts); }
    
    function showQuestion() {
        currentQuestion = questions[currentIndex];
        currentOptions = getOptions(currentQuestion);
        
        document.getElementById('progressFill').style.width = ((currentIndex+1)/questions.length*100)+'%';
        document.getElementById('progressText').textContent = `第 ${currentIndex+1} 题 / 共 ${questions.length} 题`;
        
        const blankSentence = currentQuestion.sentence.replace(new RegExp(currentQuestion.word,'gi'),'<span class="blank">【______】</span>');
        
        let html = `<div class="sentence">${blankSentence}</div><div class="options">`;
        currentOptions.forEach((o, idx)=>{
            html+=`<div class="option" data-index="${idx}"><span class="en">${o.word}</span><span class="cn">${o.meaning}</span></div>`;
        });
        html += '</div>';
        document.getElementById('questionArea').innerHTML = html;
        
        document.querySelectorAll('.option').forEach(btn => {
            btn.onclick = () => checkAnswer(parseInt(btn.dataset.index));
        });
        
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
    }
    
    function checkAnswer(selectedIdx) {
        const selected = currentOptions[selectedIdx];
        const correct = currentQuestion;
        
        document.querySelectorAll('.option').forEach(o=>o.style.pointerEvents='none');
        
        const isCorrect = selected.word === correct.word;
        results.push({word: correct.word, correct: isCorrect});
        
        if(isCorrect) { 
            correctCount++; 
            document.querySelectorAll('.option')[selectedIdx].classList.add('correct'); 
        } else { 
            wrongCount++; 
            document.querySelectorAll('.option')[selectedIdx].classList.add('wrong'); 
            currentOptions.forEach((o, idx) => {
                if(o.word === correct.word) {
                    document.querySelectorAll('.option')[idx].classList.add('correct');
                }
            });
        }
        
        const translation = translations[correct.word] || '';
        
        let resultHtml = `<div class="result ${isCorrect?'correct':'wrong'}"><div class="result-title">${isCorrect?'✅ 正确！':'❌ 错误！'}</div><div class="result-word"><strong>${correct.word}</strong> - ${correct.meaning}</div><div class="result-sentence"><div class="result-english">${correct.sentence.replace(new RegExp(correct.word,'gi'),'<strong>'+correct.word+'</strong>')}</div><div class="result-chinese">${translation}</div></div><div>`;
        currentOptions.forEach(o=>{
            const isC = o.word === correct.word;
            resultHtml+=`<div class="result-option ${isC?'correct':''}"><span class="en">${o.word}</span><span class="cn">${o.meaning}</span></div>`;
        });
        resultHtml += '</div></div>';
        document.getElementById('resultArea').innerHTML = resultHtml;
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('nextBtn').style.display = 'inline-block';
    }
    
    function nextQuestion() {
        currentIndex++;
        if(currentIndex >= questions.length) {
            showFinalResult();
        } else { showQuestion(); }
    }
    
    function showFinalResult() {
        const endTime = Date.now();
        const acc = Math.round(correctCount/questions.length*100);
        
        document.getElementById('questionArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('progressFill').style.width = '100%';
        
        let resultsStr = results.map(r => r.word + ':' + (r.correct ? 'T' : 'F')).join(',');
        let resultCode = `ENGRESULT:round=31,total=${questions.length},correct=${correctCount},wrong=${wrongCount},accuracy=${acc}%,startTime=${startTime},endTime=${endTime},results=${resultsStr}`;
        
        document.getElementById('statsArea').innerHTML = `<div style="text-align:center;margin:16px 0"><div style="font-size:20px;font-weight:bold">正确: ${correctCount} | 错误: ${wrongCount}</div><div style="font-size:28px;font-weight:bold;color:#4CAF50">${acc}%</div></div>`;
        document.getElementById('resultCode').textContent = resultCode;
        document.getElementById('resultCodeArea').style.display = 'block';
    }
    
    showQuestion();
    </script>
