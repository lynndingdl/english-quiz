<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词复习 - 第25轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 16px; color: #666; }
        .progress { background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 24px; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; border-radius: 8px; transition: width 0.3s; }
        .question { padding: 24px; background: #f8f9fa; border-radius: 12px; margin-bottom: 24px; }
        .question-num { font-weight: bold; color: #667eea; margin-bottom: 16px; font-size: 16px; }
        .sentence { font-size: 18px; line-height: 1.8; margin-bottom: 20px; }
        .blank { color: #667eea; font-weight: bold; text-decoration: underline; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .option:hover { border-color: #667eea; background: #f0f4ff; }
        .option.correct { border-color: #4CAF50; background: #c8e6c9; }
        .option.wrong { border-color: #f44336; background: #ffcdd2; }
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
        .next-btn { background: #4CAF50; color: white; }
        .next-btn:hover { background: #45a049; }
        .answer-box { display: none; padding: 24px; background: #f0f7f0; border-radius: 12px; margin-top: 20px; border-left: 4px solid #4CAF50; }
        .answer-box.show { display: block; }
        .answer-box.wrong-answer { background: #fff5f5; border-left-color: #f44336; }
        .answer-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .answer-title.correct { color: #4CAF50; }
        .answer-title.wrong { color: #f44336; }
        .answer-item { margin-bottom: 16px; line-height: 1.6; }
        .answer-label { color: #666; font-size: 14px; margin-bottom: 4px; }
        .answer-value { font-size: 16px; }
        .word-title { font-size: 20px; font-weight: bold; color: #667eea; }
        .full-sentence { font-size: 16px; line-height: 1.8; color: #333; background: #e8f5e9; padding: 12px; border-radius: 8px; }
        .full-sentence .answer-word { color: #4CAF50; font-weight: bold; text-decoration: underline; }
        .options-meaning { margin-top: 12px; }
        .option-meaning-item { padding: 8px 12px; margin: 6px 0; background: #fff; border-radius: 6px; font-size: 15px; }
        .option-meaning-item.correct-opt { background: #c8e6c9; border-left: 3px solid #4CAF50; }
        .option-label { font-weight: bold; color: #666; margin-right: 8px; }
        .option-word { font-weight: bold; color: #333; }
        .option-meaning { color: #666; margin-left: 8px; }
        .result { display: none; text-align: center; padding: 32px; }
        .result.show { display: block; }
        .result h2 { color: #333; margin-bottom: 16px; }
        .result-score { font-size: 48px; font-weight: bold; color: #667eea; margin: 16px 0; }
        .result-code { background: #333; color: #4CAF50; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 20px 0; font-size: 12px; }
        .copy-btn { padding: 14px 28px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .copy-btn:hover { background: #5a6fd6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 英语单词复习 - 第25轮</h1>
        <p class="subtitle">选择题（4选1）| 全部错题 | 按到期时间+错题次数排序</p>

        <div class="progress-info">
            <span>进度: <span id="currentNum">1</span> / 20</span>
            <span>正确: <span id="correctCount">0</span></span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width: 5%"></div></div>

        <div id="questionArea"></div>

        <div class="result" id="result">
            <h2>🎉 第25轮复习完成！</h2>
            <div class="result-score"><span id="finalScore">0</span> / 20</div>
            <p>正确率: <span id="accuracy">0</span>%</p>
            <p style="margin: 16px 0; color: #666;">请复制以下结果码发回飞书：</p>
            <div class="result-code" id="resultCode"></div>
            <button class="copy-btn" onclick="copyResult()">📋 复制结果码</button>
        </div>
    </div>

    <script>
        const wordBank = {
            "obscure": "模糊的，不为人知的",
            "neutralize": "中和，抵消",
            "perpetuate": "使持续，使永久化",
            "contamination concerns": "对污染的担忧，洁癖",
            "ego-syntonic thoughts": "自我和谐的想法",
            "contamination": "污染，污染恐惧",
            "scrupulosity": "道德完美主义，宗教性强迫",
            "hyperactivity": "多动症，过度活跃",
            "incentives tied": "挂钩的奖励，激励绑定",
            "accommodation": "顺应，配合",
            "compassionate": "富有同情心的，人道的",
            "prescribed": "开（药），处方的",
            "upstream": "上游的，从源头",
            "accountability": "问责制，责任",
            "finalize": "最终确定",
            "flagrant": "公然的，明目张胆的",
            "grappling": "努力解决，搏斗",
            "toughness": "坚韧，强硬",
            "underway": "进行中的",
            "unsupervised": "无人监管的"
        };

        const questions = [
            { word: "obscure", meaning: "模糊的，不为人知的", sentence: "Originating from a somewhat ______ rap song in late 2024.", answer: "obscure", options: ["obscure", "pervasive", "fringe", "opaque"], translation: "源自2024年底一首有些默默无闻的说唱歌曲。" },
            { word: "neutralize", meaning: "中和，抵消", sentence: "Helps patients learn to coexist with intrusive thoughts without trying to ______, avoid, or control them.", answer: "neutralize", options: ["neutralize", "perpetuate", "accommodate", "prescribe"], translation: "帮助患者学会与侵入性思维共存，而不是试图中和、避免或控制它们。" },
            { word: "perpetuate", meaning: "使持续，使永久化", sentence: "Sometimes getting treatments that ______ the condition.", answer: "perpetuate", options: ["perpetuate", "neutralize", "alleviate", "resolve"], translation: "有时接受的治疗反而使病情持续。" },
            { word: "contamination concerns", meaning: "对污染的担忧，洁癖", sentence: "From ______ and repeated checking to intrusive moral, sexual, or relationship-related concerns.", answer: "contamination concerns", options: ["contamination concerns", "scrupulosity", "hyperactivity", "ego-syntonic thoughts"], translation: "从对污染的担忧和反复检查到侵入性的道德、性或关系相关的担忧。" },
            { word: "ego-syntonic thoughts", meaning: "自我和谐的想法", sentence: "As opposed to ______ or urges, which feel acceptable or desirable.", answer: "ego-syntonic thoughts", options: ["ego-syntonic thoughts", "contamination concerns", "incentives tied", "scrupulosity"], translation: "与自我和谐的想法或冲动相反，后者感觉是可接受或可取的。" },
            { word: "contamination", meaning: "污染，污染恐惧", sentence: "______ (where a fear of germs or toxins leads to excessive cleaning).", answer: "contamination", options: ["contamination", "accommodation", "compassionate", "upstream"], translation: "污染恐惧（对细菌或毒素的恐惧导致过度清洁）。" },
            { word: "scrupulosity", meaning: "道德完美主义，宗教性强迫", sentence: "______ (excessive concerns about blasphemy or religious wrongdoing).", answer: "scrupulosity", options: ["scrupulosity", "hyperactivity", "accountability", "finalize"], translation: "道德完美主义（对亵渎或宗教不当行为的过度担忧）。" },
            { word: "hyperactivity", meaning: "多动症，过度活跃", sentence: "In children, OCD can be mistaken for attention-deficit/______.", answer: "hyperactivity", options: ["hyperactivity", "flagrant", "grappling", "toughness"], translation: "在儿童中，OCD可能被误诊为注意力缺陷/多动症。" },
            { word: "incentives tied", meaning: "挂钩的奖励，激励绑定", sentence: "Such as ______ to completing exposures.", answer: "incentives tied", options: ["incentives tied", "accommodation", "compassionate", "prescribed"], translation: "例如与完成暴露疗法挂钩的奖励。" },
            { word: "accommodation", meaning: "顺应，配合", sentence: "Providers also work closely with parents to reduce ______.", answer: "accommodation", options: ["accommodation", "upstream", "accountability", "finalize"], translation: "提供者还与父母密切合作，减少顺应行为。" },
            { word: "compassionate", meaning: "富有同情心的，人道的", sentence: "ERP is probably the most ______ thing you can do for someone who suffers from OCD.", answer: "compassionate", options: ["compassionate", "flagrant", "grappling", "toughness"], translation: "ERP（暴露反应预防疗法）可能是你能为OCD患者做的最富有同情心的事情。" },
            { word: "prescribed", meaning: "开（药），处方的", sentence: "They are typically ______ in higher doses than used to treat depression.", answer: "prescribed", options: ["prescribed", "underway", "unsupervised", "obscure"], translation: "它们的处方剂量通常高于治疗抑郁症的剂量。" },
            { word: "upstream", meaning: "上游的，从源头", sentence: "This metacognitive approach focuses ______ on how obsessions form.", answer: "upstream", options: ["upstream", "downstream", "sideways", "backward"], translation: "这种元认知方法从源头上关注强迫观念是如何形成的。" },
            { word: "accountability", meaning: "问责制，责任", sentence: "Teams were also encouraged to develop their own norms around culture, ______, and conflict management, fostering self-sufficiency and leadership skills.", answer: "accountability", options: ["accountability", "finalize", "flagrant", "grappling"], translation: "团队还被鼓励围绕文化、问责制和冲突管理制定自己的规范，培养自给自足和领导技能。" },
            { word: "finalize", meaning: "最终确定", sentence: "In November 2025, Poulus and colleagues convened game publishers, tournament organizers, International Olympic Committee representatives, and mental health experts to ______ nine pillars of mental health support.", answer: "finalize", options: ["finalize", "toughness", "underway", "unsupervised"], translation: "2025年11月，Poulus和同事召集游戏发行商、锦标赛组织者、国际奥委会代表和心理健康专家，最终确定了心理健康支持的九大支柱。" },
            { word: "flagrant", meaning: "公然的，明目张胆的", sentence: "This would be akin to a player committing a ______ foul in basketball or rushing the mound in baseball.", answer: "flagrant", options: ["flagrant", "grappling", "obscure", "neutralize"], translation: "这就像篮球运动员公然犯规或棒球运动员冲向投手丘一样。" },
            { word: "grappling", meaning: "努力解决，搏斗", sentence: "Research shows that elite esports players often experience poor mental health outcomes.", answer: "grappling", options: ["grappling", "toughness", "underway", "unsupervised"], translation: "研究表明精英电竞选手经常面临心理健康问题。" },
            { word: "toughness", meaning: "坚韧，强硬", sentence: "They found that traditional sport psychology measures, like mental ______ and resilience, do not significantly predict competitive achievement in esports.", answer: "toughness", options: ["toughness", "underway", "unsupervised", "obscure"], translation: "他们发现传统运动心理学测量，如心理坚韧和韧性，并不能显著预测电竞中的竞技成就。" },
            { word: "underway", meaning: "进行中的", sentence: "A major effort is ______ to develop international mental health guidelines tailored to esports.", answer: "underway", options: ["underway", "unsupervised", "obscure", "neutralize"], translation: "正在进行一项重大努力，制定针对电竞的国际心理健康指南。" },
            { word: "unsupervised", meaning: "无人监管的", sentence: "At the same time, if left ______, it can burn you and your house down.", answer: "unsupervised", options: ["unsupervised", "obscure", "neutralize", "perpetuate"], translation: "同时，如果无人监管，它可能会烧毁你和你的房子。" }
        ];

        let currentIndex = 0;
        let correctCount = 0;
        const results = [];
        let startTime = null;

        function renderQuestion() {
            if (currentIndex === 0 && !startTime) {
                startTime = new Date().toISOString();
            }

            const q = questions[currentIndex];
            const area = document.getElementById('questionArea');

            area.innerHTML = `
                <div class="question">
                    <div class="question-num">📖 第 ${currentIndex + 1} / ${questions.length} 题</div>
                    <div class="sentence">${q.sentence.replace('______', '<span class="blank">______</span>')}</div>
                    <div class="options" id="options">
                        ${q.options.map((opt, i) => `<div class="option" onclick="selectAndSubmit('${opt}')">${String.fromCharCode(65 + i)}. ${opt}</div>`).join('')}
                    </div>

                    <div class="answer-box" id="answerBox">
                        <div class="answer-title" id="answerTitle"></div>
                        <div class="answer-item">
                            <div class="answer-label">单词</div>
                            <div class="answer-value word-title">${q.word}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">中文释义</div>
                            <div class="answer-value">${q.meaning}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">完整句子</div>
                            <div class="full-sentence">${q.sentence.replace('______', `<span class="answer-word">${q.answer}</span>`)}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">句子翻译</div>
                            <div class="answer-value">${q.translation}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">所有选项释义</div>
                            <div class="options-meaning">
                                ${q.options.map((opt, i) => {
                                    const isCorrect = opt === q.answer;
                                    return `<div class="option-meaning-item ${isCorrect ? 'correct-opt' : ''}">
                                        <span class="option-label">${String.fromCharCode(65 + i)}.</span>
                                        <span class="option-word">${opt}</span>
                                        <span class="option-meaning">- ${wordBank[opt] || '（释义缺失）'}</span>
                                        ${isCorrect ? '<span style="color: #4CAF50; margin-left: 8px;">✓ 正确答案</span>' : ''}
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>

                    <button class="btn next-btn hidden" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
                </div>
            `;

            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('progressBar').style.width = `${(currentIndex + 1) / questions.length * 100}%`;
        }

        function selectAndSubmit(option) {
            const q = questions[currentIndex];
            const isCorrect = option === q.answer;
            if (isCorrect) correctCount++;

            results.push({ word: q.word, correct: isCorrect });

            document.getElementById('correctCount').textContent = correctCount;

            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                const optText = opt.textContent.split('. ')[1];
                if (optText === q.answer) {
                    opt.classList.add('correct');
                } else if (optText === option && !isCorrect) {
                    opt.classList.add('wrong');
                }
                opt.onclick = null;
                opt.style.cursor = 'default';
            });

            const answerBox = document.getElementById('answerBox');
            const answerTitle = document.getElementById('answerTitle');

            if (isCorrect) {
                answerTitle.innerHTML = '✅ 回答正确！';
                answerTitle.className = 'answer-title correct';
            } else {
                answerTitle.innerHTML = '❌ 回答错误';
                answerTitle.className = 'answer-title wrong';
                answerBox.classList.add('wrong-answer');
            }

            answerBox.classList.add('show');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const endTime = new Date().toISOString();

            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('result').classList.add('show');
            document.getElementById('finalScore').textContent = correctCount;
            document.getElementById('accuracy').textContent = Math.round(correctCount / questions.length * 100);

            const resultData = {
                round: 25,
                total: questions.length,
                correct: correctCount,
                results,
                startTime,
                endTime
            };
            const resultCode = 'ENGRESULT:' + btoa(JSON.stringify(resultData));
            document.getElementById('resultCode').textContent = resultCode;
        }

        function copyResult() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ 已复制！请粘贴到飞书发给我。');
            });
        }

        renderQuestion();
    </script>
</body>
</html>
