<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词复习 - 第18轮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 16px; color: #666; }
        .progress { background: #e0e0e0; border-radius: 8px; height: 8px; margin-bottom: 24px; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; border-radius: 8px; transition: width 0.3s; }
        .question { padding: 24px; background: #f8f9fa; border-radius: 12px; margin-bottom: 24px; }
        .question-num { font-weight: bold; color: #667eea; margin-bottom: 16px; font-size: 16px; }
        .sentence { font-size: 18px; line-height: 1.8; margin-bottom: 20px; }
        .blank { color: #667eea; font-weight: bold; text-decoration: underline; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .option:hover { border-color: #667eea; background: #f0f4ff; }
        .option.correct { border-color: #4CAF50; background: #c8e6c9; }
        .option.wrong { border-color: #f44336; background: #ffcdd2; }
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
        .next-btn { background: #4CAF50; color: white; }
        .next-btn:hover { background: #45a049; }
        .answer-box { display: none; padding: 24px; background: #f0f7f0; border-radius: 12px; margin-top: 20px; border-left: 4px solid #4CAF50; }
        .answer-box.show { display: block; }
        .answer-box.wrong-answer { background: #fff5f5; border-left-color: #f44336; }
        .answer-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .answer-title.correct { color: #4CAF50; }
        .answer-title.wrong { color: #f44336; }
        .answer-item { margin-bottom: 16px; line-height: 1.6; }
        .answer-label { color: #666; font-size: 14px; margin-bottom: 4px; }
        .answer-value { font-size: 16px; }
        .word-title { font-size: 20px; font-weight: bold; color: #667eea; }
        .full-sentence { font-size: 16px; line-height: 1.8; color: #333; background: #e8f5e9; padding: 12px; border-radius: 8px; }
        .full-sentence .answer-word { color: #4CAF50; font-weight: bold; text-decoration: underline; }
        .options-meaning { margin-top: 12px; }
        .option-meaning-item { padding: 8px 12px; margin: 6px 0; background: #fff; border-radius: 6px; font-size: 15px; }
        .option-meaning-item.correct-opt { background: #c8e6c9; border-left: 3px solid #4CAF50; }
        .option-label { font-weight: bold; color: #666; margin-right: 8px; }
        .option-word { font-weight: bold; color: #333; }
        .option-meaning { color: #666; margin-left: 8px; }
        .result { display: none; text-align: center; padding: 32px; }
        .result.show { display: block; }
        .result h2 { color: #333; margin-bottom: 16px; }
        .result-score { font-size: 48px; font-weight: bold; color: #667eea; margin: 16px 0; }
        .result-code { background: #333; color: #4CAF50; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 20px 0; font-size: 12px; }
        .copy-btn { padding: 14px 28px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .copy-btn:hover { background: #5a6fd6; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 英语单词复习 - 第18轮</h1>
        <p class="subtitle">选择题（4选1）| 全部新词</p>
        
        <div class="progress-info">
            <span>进度: <span id="currentNum">1</span> / 20</span>
            <span>正确: <span id="correctCount">0</span></span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width: 5%"></div></div>
        
        <div id="questionArea"></div>
        
        <div class="result" id="result">
            <h2>🎉 第18轮复习完成！</h2>
            <div class="result-score"><span id="finalScore">0</span> / 20</div>
            <p>正确率: <span id="accuracy">0</span>%</p>
            <p style="margin: 16px 0; color: #666;">请复制以下结果码发回飞书：</p>
            <div class="result-code" id="resultCode"></div>
            <button class="copy-btn" onclick="copyResult()">📋 复制结果码</button>
        </div>
    </div>

    <script>
        const wordBank = {
            "a linguistic quirk": "语言怪癖，语言特色",
            "secrecy and informality shapes": "秘密性和非正式性塑造了",
            "promote in-group solidarity and cohesiveness": "促进群体内部团结和凝聚力",
            "lexical": "词汇的，词汇层面的",
            "obsolescence": "废弃，过时，淘汰",
            "enduring and influential sources": "持久且有影响力的来源",
            "incorporating colloquialisms": "纳入口语表达，融入俗语",
            "illustrative users": "示范性使用者，偶尔使用者",
            "signal authenticity": "传递真实性，表明真实身份",
            "social inferiority": "社会地位低下，社会劣势",
            "leveraging neuroplasticity": "利用神经可塑性",
            "boost": "提升，增强，促进",
            "implement": "实施，执行，贯彻",
            "prolong": "延长，延续",
            "internalized ageism": "内化的年龄歧视",
            "demographic": "人群，人口群体",
            "immersed": "沉浸的，全身心投入的",
            "competent": "有能力的，胜任的",
            "proficient": "熟练的，精通的",
            "sudoku": "数独"
        };

        const questions = [
            { word: "a linguistic quirk", meaning: "语言怪癖，语言特色", sentence: "Slang, however, is more than ______ for people of all ages.", answer: "a linguistic quirk", options: ["a linguistic quirk", "lexical", "obsolescence", "demographic"], translation: "然而，俚语对所有年龄段的人来说不仅仅是语言特色。" },
            { word: "lexical", meaning: "词汇的，词汇层面的", sentence: "It serves as ______ metadata that enables listeners to determine the speaker's affiliations.", answer: "lexical", options: ["lexical", "obsolescence", "demographic", "proficient"], translation: "它作为词汇元数据，使听众能够确定说话者的归属。" },
            { word: "obsolescence", meaning: "废弃，过时，淘汰", sentence: "Slang terms often cycle rapidly from popularity to ______, rarely staying in use for more than a few years.", answer: "obsolescence", options: ["obsolescence", "boost", "implement", "prolong"], translation: "俚语通常从流行迅速走向淘汰，很少能使用超过几年。" },
            { word: "enduring and influential sources", meaning: "持久且有影响力的来源", sentence: "African American Vernacular English has been one of the most ______ of slang.", answer: "enduring and influential sources", options: ["enduring and influential sources", "social inferiority", "lexical", "demographic"], translation: "非裔美国人英语一直是俚语最持久且有影响力的来源之一。" },
            { word: "signal authenticity", meaning: "传递真实性，表明真实身份", sentence: "Illustrative users adopt slang occasionally to ______ to others.", answer: "signal authenticity", options: ["signal authenticity", "boost", "implement", "prolong"], translation: "示范性使用者偶尔使用俚语来向他人表明真实身份。" },
            { word: "social inferiority", meaning: "社会地位低下，社会劣势", sentence: "Slang can also carry the risk of stigma, suggesting a lack of professionalism or ______.", answer: "social inferiority", options: ["social inferiority", "lexical", "demographic", "proficient"], translation: "俚语也可能带有污名的风险，暗示缺乏专业性或社会地位低下。" },
            { word: "boost", meaning: "提升，增强，促进", sentence: "Researchers are developing cognitive interventions to help adults ______ their brain health.", answer: "boost", options: ["boost", "implement", "prolong", "demographic"], translation: "研究人员正在开发认知干预措施，帮助成年人提升大脑健康。" },
            { word: "implement", meaning: "实施，执行，贯彻", sentence: "Interventions that help aging adults ______ new behaviors have been shown to improve cognitive health.", answer: "implement", options: ["implement", "boost", "prolong", "demographic"], translation: "帮助老年人实施新行为的干预措施已被证明可以改善认知健康。" },
            { word: "prolong", meaning: "延长，延续", sentence: "Interventions have been shown to improve and ______ cognitive health.", answer: "prolong", options: ["prolong", "boost", "implement", "demographic"], translation: "干预措施已被证明可以改善和延长认知健康。" },
            { word: "internalized ageism", meaning: "内化的年龄歧视", sentence: "Whereas ______ can lead older adults to believe that they can't learn.", answer: "internalized ageism", options: ["internalized ageism", "lexical", "demographic", "proficient"], translation: "内化的年龄歧视会导致老年人认为自己无法学习。" },
            { word: "demographic", meaning: "人群，人口群体", sentence: "Researchers hope to see communities increase access for this ______ to learn.", answer: "demographic", options: ["demographic", "lexical", "proficient", "boost"], translation: "研究人员希望看到社区增加这一人群学习的机会。" },
            { word: "immersed", meaning: "沉浸的，全身心投入的", sentence: "Older adults ______ in a supportive learning environment can significantly increase their cognitive abilities.", answer: "immersed", options: ["immersed", "competent", "proficient", "boost"], translation: "沉浸在支持性学习环境中的老年人可以显著提高他们的认知能力。" },
            { word: "competent", meaning: "有能力的，胜任的", sentence: "This internalized ageism can lead to beliefs that older adults are less ______.", answer: "competent", options: ["competent", "proficient", "boost", "demographic"], translation: "这种内化的年龄歧视会导致人们认为老年人能力较差。" },
            { word: "proficient", meaning: "熟练的，精通的", sentence: "Studies showed that people become ______ at that specific task but it does not help much with learning other skills.", answer: "proficient", options: ["proficient", "competent", "boost", "demographic"], translation: "研究表明，人们会在特定任务上变得熟练，但这对于学习其他技能帮助不大。" },
            { word: "sudoku", meaning: "数独", sentence: "These findings reminded Wu of people who were very good at playing brain games such as ______.", answer: "sudoku", options: ["sudoku", "demographic", "lexical", "proficient"], translation: "这些发现让Wu想起了那些非常擅长玩数独等大脑游戏的人。" },
            { word: "incorporating colloquialisms", meaning: "纳入口语表达，融入俗语", sentence: "Contemporary slang heavily reflects youth-driven pop culture while also ______ that originated from LGBTQ+ communities.", answer: "incorporating colloquialisms", options: ["incorporating colloquialisms", "signal authenticity", "social inferiority", "lexical"], translation: "当代俚语在很大程度上反映了青年流行文化，同时也融入了源自LGBTQ+群体的口语表达。" },
            { word: "illustrative users", meaning: "示范性使用者，偶尔使用者", sentence: "Primary users create and use slang in everyday speech, and ______ adopt slang occasionally.", answer: "illustrative users", options: ["illustrative users", "a linguistic quirk", "lexical", "demographic"], translation: "主要使用者在日常言语中创造和使用俚语，示范性使用者偶尔使用俚语。" },
            { word: "leveraging neuroplasticity", meaning: "利用神经可塑性", sentence: "Their findings suggest that ______ at any age can increase confidence and motivation.", answer: "leveraging neuroplasticity", options: ["leveraging neuroplasticity", "boost", "implement", "prolong"], translation: "他们的研究结果表明，在任何年龄利用神经可塑性都可以增加信心和动力。" },
            { word: "promote in-group solidarity and cohesiveness", meaning: "促进群体内部团结和凝聚力", sentence: "Linguists define slang as a tool to differentiate social groups and to ______.", answer: "promote in-group solidarity and cohesiveness", options: ["promote in-group solidarity and cohesiveness", "signal authenticity", "social inferiority", "lexical"], translation: "语言学家将俚语定义为区分社会群体和促进群体内部团结与凝聚力的工具。" },
            { word: "secrecy and informality shapes", meaning: "秘密性和非正式性塑造了", sentence: "That early association with ______ modern perceptions of slang.", answer: "secrecy and informality shapes", options: ["secrecy and informality shapes", "a linguistic quirk", "lexical", "demographic"], translation: "早期与秘密和非正式的联系塑造了现代对俚语的看法。" }
        ];

        let currentIndex = 0;
        let correctCount = 0;
        const results = [];
        let startTime = null;

        function renderQuestion() {
            if (currentIndex === 0 && !startTime) {
                startTime = new Date().toISOString();
            }
            
            const q = questions[currentIndex];
            const area = document.getElementById('questionArea');
            
            area.innerHTML = `
                <div class="question">
                    <div class="question-num">📖 第 ${currentIndex + 1} / ${questions.length} 题</div>
                    <div class="sentence">${q.sentence.replace('______', '<span class="blank">______</span>')}</div>
                    <div class="options" id="options">
                        ${q.options.map((opt, i) => `<div class="option" onclick="selectAndSubmit('${opt}')">${String.fromCharCode(65 + i)}. ${opt}</div>`).join('')}
                    </div>
                    
                    <div class="answer-box" id="answerBox">
                        <div class="answer-title" id="answerTitle"></div>
                        <div class="answer-item">
                            <div class="answer-label">单词</div>
                            <div class="answer-value word-title">${q.word}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">中文释义</div>
                            <div class="answer-value">${q.meaning}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">完整句子</div>
                            <div class="full-sentence">${q.sentence.replace('______', `<span class="answer-word">${q.answer}</span>`)}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">句子翻译</div>
                            <div class="answer-value">${q.translation}</div>
                        </div>
                        <div class="answer-item">
                            <div class="answer-label">所有选项释义</div>
                            <div class="options-meaning">
                                ${q.options.map((opt, i) => {
                                    const isCorrect = opt === q.answer;
                                    return `<div class="option-meaning-item ${isCorrect ? 'correct-opt' : ''}">
                                        <span class="option-label">${String.fromCharCode(65 + i)}.</span>
                                        <span class="option-word">${opt}</span>
                                        <span class="option-meaning">- ${wordBank[opt] || '（释义缺失）'}</span>
                                        ${isCorrect ? '<span style="color: #4CAF50; margin-left: 8px;">✓ 正确答案</span>' : ''}
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn next-btn hidden" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
                </div>
            `;
            
            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('progressBar').style.width = `${(currentIndex + 1) / questions.length * 100}%`;
        }

        function selectAndSubmit(option) {
            const q = questions[currentIndex];
            const isCorrect = option === q.answer;
            if (isCorrect) correctCount++;
            
            results.push({ word: q.word, correct: isCorrect });
            
            document.getElementById('correctCount').textContent = correctCount;
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                const optText = opt.textContent.split('. ')[1];
                if (optText === q.answer) {
                    opt.classList.add('correct');
                } else if (optText === option && !isCorrect) {
                    opt.classList.add('wrong');
                }
                opt.onclick = null;
                opt.style.cursor = 'default';
            });
            
            const answerBox = document.getElementById('answerBox');
            const answerTitle = document.getElementById('answerTitle');
            
            if (isCorrect) {
                answerTitle.innerHTML = '✅ 回答正确！';
                answerTitle.className = 'answer-title correct';
            } else {
                answerTitle.innerHTML = '❌ 回答错误';
                answerTitle.className = 'answer-title wrong';
                answerBox.classList.add('wrong-answer');
            }
            
            answerBox.classList.add('show');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const endTime = new Date().toISOString();
            
            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('result').classList.add('show');
            document.getElementById('finalScore').textContent = correctCount;
            document.getElementById('accuracy').textContent = Math.round(correctCount / questions.length * 100);
            
            const resultData = { 
                round: 18, 
                total: questions.length, 
                correct: correctCount, 
                results,
                startTime,
                endTime
            };
            const resultCode = 'ENGRESULT:' + btoa(JSON.stringify(resultData));
            document.getElementById('resultCode').textContent = resultCode;
        }

        function copyResult() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ 已复制！请粘贴到飞书发给我。');
            });
        }

        renderQuestion();
    </script>
</body>
</html>
